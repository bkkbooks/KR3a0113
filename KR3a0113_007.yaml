body:
  text: 雙橋隨筆卷七鳳縣知縣周召撰晉宋時人雖放誕不羈而情關父子處天性切摯亦可以觀如謝虎子嘗上屋燻䑕胡兒既無由知父為此事聞人道癡人有作此者戯笑之時道此非復一過太𫝊既了己之不知因其言次語胡兒曰世人以此謗中郎亦言我共作此胡兒懊熱一月中閉齋不出桓南郡船泊荻渚王大服散後已小醉往看桓桓為設酒不能冷飲頻語左右令温酒來桓乃流涕嗚咽殷仲堪父病虚悸聞床下蟻動謂是牛鬭孝武不知是殷公問仲堪有一殷病如此否仲堪流涕而起曰臣進退惟谷宋武帝嘗稱謝超宗有鳳毛右衛將軍劉道隆在座出候超宗曰聞君有異物欲覔一見謝曰懸罄之室何得異物耶道隆武人正觸其父諱曰方侍宴至尊説君有鳳毛謝徒跣還内此數公當日情事使今人處之未必如此唐人喜撰小説如雲溪友議之類誕妄不經其所載李羣玉一事罪過尤重羣玉題黄陵廟詩曰黄陵廟前春已空子規滴血啼松風不知精爽落何處疑是行雲秋色中李公自以春空便到秋色躊蹰欲改之乃有二女郎見曰兒是娥皇女英也二年後當與郎君為雲雨之逰李君遂悉其所陳俄而影㓕遂掣其神塑而去至潯陽見段成式具述此事成式戯之曰不知足下是虞舜辟陽侯也羣玉題詩後二年乃逝於洪井按帝堯釐降二女於溈汭所以觀厥型也非尋常女子可知且舜三十徴庸三十在位五十載陟方乃死是舜死時二后皆逾髦年矣後世竹淚之説比於紅顔形之咏歌極其猥媟如雲溪子所載汚衊難堪令人張目此皆立廟塑像者造孽非凡以至此讀明莊儼然之句可知矣然在村婦田氓尚不足怪號為文士而播㺯筆尖比於嬉戱䙝慢聖神莫此為甚此等紀載之書付之祖龍一炬可也吕文靖生四子公弼公著公奭公孺皆少時文靖與夫人語四兒他日皆繫金帶但未知誰作宰相吾將騐之他日四子居外夫人使小鬟持四寳器貯茶而往教令至門故跌而碎之三子皆失聲或走歸告夫人者獨公著凝然不動文靖謂夫人曰此子必作相元祐果大拜朱晦庵答或人論心之問曰心之虚靈無有限量如六合之外思之則至前乎千百世之已往後乎千萬世之未來皆在目前又曰人心至靈千萬里之遠千百世之上一纔發念便到那裡神妙如此却不去養自旦至暮只管轉展於利欲之中都不知覺此説論心極透内反者不可不知李紳在鎮有老僧詣謁願以因果諭之紳問阿師何處來答云貧僧從來處來遂决二十曰任從去處去待此等僧法應如此而雲溪友議謂其貧逰惠山寺屢以佛經為文稿被主僧毆打故終身憾焉抹却短李惡僧本意矣唐南中丞卓吳楚逰學十餘年衣布衣乘牝衛薄逰上蔡蔡牧待之似厚而為客吏阻難每宴集令召則云南秀才自以衣冠不整稱疾不赴南生羇旅窮愁似無容足之地惟城南鬻飯老媪待之無厭色後亦為蔡牧遂戮仇吏而報飯嫗焉明侍郎孔公鏞為諸生時家赤貧饔飱不給每詣學則買二飯充饑五聖閣有道媪見其旦晚經門一日迎入問故公以實告媪心憐之謂曰吾家晝則有齋夜則有燈秀才肯僑居此乎公從之遂得肆志於學後舉進士歸媪已死公斬衰冠送𦵏焉巾幗老婦中反多慧眼若此謝在杭曰唐武宗會昌投龍文自稱承道繼𤣥昭明三光弟子南嶽上真人宋徽宗羣臣上尊號為玉京金闕七寳元臺紫微上宫靈寳至真玉宸明皇天道君其上章青詞自稱奉行玉清神霄保仙元一六陽三五璇璣七九飛元大法司都天教主噫莫尊於天子百神皆受號令者也而反屈萬乘之稱從黄冠之號不亦兒戯狂惑之甚哉其後會昌既變起幕帷而宣和亦身膏沙漠九天道教何無感應若是哉又曰古今奉佛之主莫甚於梁武帝唐懿宗奉道之主莫甚於唐武宗宋徽宗求仙之主莫甚於秦始皇漢武帝然大則破國喪身小亦虚耗海内惟崇儒重道之主安富尊榮四海乂安而世之人君往往不以彼易此何也噫無論人君即士君子讀六經𫝊注以取科第而其後也不有非毁先儒棲心釋老者乎背本不祥反古不智是名教之罪人也先生此等議論有裨於世道人心不小然其論觀音真武及人死為閻羅王𤣥壇神以黑虎變蟋蟀等事若以為實有者又何淺鄙之甚也所見若此屠緯真苦談前生之説又何足怪其所載張真人治狐妖事尤屬荒唐張子韶九成射䇿集英殿直陳時事極其剴切髙宗感其言擢置第一曰九成文雖不甚工然上自朕躬下逮百執事之人無所迴避擢置首選誰謂不可當九成之對䇿也至晡未畢貂璫促之九成曰未也方談及公等其言劉豫則比之狐貍䲭鴞或傳以示豫豫不勝憤牓之康莊手劍以屬刺客衆為寒心九成曰欺天罔人惡積禍稔殆自斃矣後因陛對髙宗語之曰逆豫牓卿廷䇿謀以致害非卿有守豈能獨立不懼故制詞有逆賊聞風而悚懼之語九成慷慨論列讀其䇿至今凛凛猶有生氣在宋人制䇿中指難多屈也士大夫與人論事當心平氣和不可過激明道先生在熈寧之際惟異於好直者必欲力攻以取勝故王安石多為之動嘗被㫖赴中書議事安石方怒言者厲色待之先生徐曰天下之事非一家私議願公平氣以聽之安石愧屈又曰熈寧初介甫行新法並用君子小人君子正直不合介甫以為俗學不通世務斥去小人茍容謟佞介甫以為有才能知變通用之君子如君實不拜同知樞宻院以去范堯夫辭同修起居注得罪張天褀監察御史面折介甫被謫介甫性狠衆人皆以為不可則執之愈堅君子既去所用皆小人争為刻薄故害天下益深使衆君子未與之敵俟其勢久自緩委曲平章尚有聽從之理俾小人無隙以乘其害不至如此之甚也又曰新政之改亦是吾黨争之太過成就今日之事塗炭天下亦須兩分其罪可也此語極中言路之病石守道諸公所以不免壊事之譏也人之愛其妾也甚於妻故諺云妻不如妾夫妻子備而孝己衰况肯嚴於治妾以奉其親乎甚矣李于鱗先生之孝也先生生平極愛蔡姬蔡姬必侍太夫人匕箸一日手製小食上之太夫人不下箸先生目攝蔡姬叱令噉盡蔡姬即時跽而謝無狀先生稍解夫世之尊先生者但以其文耳而不知其孝也如是奈何不永其傳而使人有天道無知之嘆悠悠彼蒼安得叩關而問之往余過介休見郭外屋燬於火皆神廟也土木之像金身粉貎狼藉瓦礫場中不啻焦頭爛額而旁有字數行云本里擇某日祈神􅓙火云云余不覺失笑吾鄉目前之苦野廟叢祠皆罹兵燹村落有僅存者輙誇以為本境神明助佑之力盖四鄉所奉之神無非徐王令公姓名面貎皆一人也奈何靈於此而不靈於彼乎况在彼之廟貎血食尚有盛於此者乎或曰聞之某郡城東西門皆有關忠義祠東門迎過西門必投一侍教生帖而後去西門之迎也亦然然則關忠義可分為二霸王令公之不同也又何足怪陳眉公巖棲幽事云凡山具設經籍機杼以善俗訓家備藥餌方書以辟邪衛疾儲佳筆名繭以㸃繪賦詩留清醪雜蔬以供賔獨酌補破衲舊笠以犯雪當風蓄綺石竒墨古玉異書以排閒永日製桞絮枕蘆花被以連牀夜話狎黄面老僧白頭漁父以遣老忘機讀書須窻明几净時時拂拭案頭架上位置楚楚不可狼藉無次黄山谷誡子弟云吉蠲筆墨如澡身浴徳揩拭几硯如改過遷善敗筆浣墨曠子弟職書几書硯自黔其面惟弟惟子臨深戰戰此書室銘也敬以書紳庶不犯浣俗主人之意李及知杭州日市白集一部乃為終身之恨郎基清慎無營嘗曰任官之所木枕亦不須作况重於此乎惟頗令人寫書樊宗孟遺之書曰在官寫書亦是風流罪過基答曰觀過知仁斯亦可矣余性極嗜書及知鳳縣但有荒山确石耳無書可市亦無市書之具無書可寫亦無寫書之人欲學兩公而不能無恨并無罪過盖地方使然雖欲不爾不可得非敢自以為清也每以語客為發一粲孫莘老知福州時民有欠市易錢繫獄甚衆有富人岀錢五百萬葺佛殿請於莘老莘老徐曰汝輩所以施錢者何也衆曰願得福耳莘老曰佛殿未甚壊佛又無露坐者孰若以錢為獄囚償官逋使數百人釋枷鎖之苦其獲福豈不多乎富人不得已諾之即日輸錢囹圄遂空歸田錄云太祖初幸相國寺至佛像前焚香問當拜與不拜僧錄賛寧曰不拜問其何故對曰現在佛不拜過去佛帝微笑而頷之遂為定制至今行幸焚香皆不拜也議者以為得禮余以為并寢行幸焚香之舉為是而歐公亦僅以不拜為得禮耶董遐周吹景集中所徴糖字甚多多出僻書又馴雅後有補入唐以後事者更成後勁試閲之不但枵腹枯腸徒有望洋之嘆即滿架牙籖俱經寓目未能也人奈何輕言博覽趙子固至昇山下舟覆手擎定武榻立水中大呼曰帖在此他物盡失無妨也庾詵愛林泉嘗遇火止出書坐於池上曰惟恐損竹鍾情若此有似於癡然雅人深致千載如見董遐周謂其差勝悠悠者以七尺軀殉胡椒八百斛也信然范文正公鎮越民曹孫居中死於官其家大窘公乃以俸錢百緡賙之為具舟擇一老吏送其舟且題詩曰一葉輕帆泛巨川來時暖熱去凉天關防若要知名姓乃是孤兒寡婦船公好義若是麥舟之贈乃家教使然陳咸不聽教謟之言觸屏風睡崔烈子惡其銅臭貽謀不善至為其子所譏然世少象賢之子雖家言世範累牘連篇而終不能挽回其不肖者何也張士誠據吳中東南名士多投之不可致者惟楊廉夫一人士誠無以為計一日聞其來吳使人要於路廉夫不得已乃一至賔賢館中士誠聞廉夫至甚喜即命飲以受賜之酒酒未半廉夫作詩云江南歲歲烽烟起海上年年賜酒來如此烽烟如此酒老夫懷抱幾時開士誠知其不可屈不强留也士誠一販負人耳乃能折節下賢而不奪其志勝夫世之坑儒溺冠謾罵而蔑視之者多矣李笠翁一家言有辯煞説一篇其始以煞為必無而究主於調停則為筮期陳牲於庭以迓之此其説與子謂之姑徐徐云爾者何異余以為吾輩論事亦斷之以理而已人死而有煞此理之必無者也何也凡人與物之在天地間也得氣而生氣盛而壯氣衰而老氣竭而死故曰生寄也死歸也本義曰魂遊魄降散而為變鬼之歸也易曰原始反終故知死生之説記曰神氣歸於天形魄歸於地身既歸矣其生也自無而有其死也自有而無矣又何自有神焉而且分為雌與雄者依於其人以作祟哉此等不根之語皆僧道隂陽家造為題目以賺人如吾鄉遣煞關殮接七撞七判斛奔五方逰十殿之類無不可笑乃習俗相沿不行者必以為怪考之於古居喪之制何嘗有此而不聞讀禮之聲但守狥時之見往者余居太孺人暨伯氏之喪亦不得不踵而行之盖吾母吾兄而亦不獲用吾情矣盧承慶曰死生至理猶朝有暮吾死歛以常服葬勿卜日余與兒輩約凡世族荒唐之舉一槩屏絶此余生平所最惡而沾沾以為獨立不懼者萬勿徒畏人言反使泉下之人為之頓足而張眼金聖嘆説快云寒士來借銀謂不可啟齒於是唯唯亦説他事我窺其苦意拉向無人處問所需多少急趨入内如數給與然後問其必當速歸料理是事耶為尚得少留共飲耶不亦快哉此一快余初歸里時有之而未嘗待其來借也但諸君不能治生隨手散去數有買菜之益究亦無補安得吕純陽一指㸃石為金使天下寒士皆歡顔而余亦為之暢然無憾也哉作詩最難事也唐子西云吾於他文不至蹇澁惟作詩甚苦悲吟累日僅能成篇初讀之未見可羞處姑置之明日取讀瑕疵百出輙復悲吟累日反復改正比之前時循循有加焉復數日取出讀之疵病復出凡如此數四方敢示人然復不能竒也李賀母責賀曰是兒必欲嘔出心肝乃己非過論也今之君子動輙數百言畧不經意不甚可愧哉子西此言真悉作詩痛癢者世人刻燭扣銅盆計步又手但取㨗而語未工皆為曹温諸公所誤耳唐徳宗初政美處亦多齊總掌後務以刻剥求媚擢為衢州刺史給事中許孟容封還詔書曰衢州無他虞齊總無殊績忽此超奬殊駭羣情若有可錄願明書勞課然後超改以解衆疑詔遂留召孟容奬之吐突承璀盛修安國寺奏立聖碑先構樓請勅學士撰文欲以萬緡酬之帝命李綘為之綘言堯舜禹湯未嘗立碑自言聖徳惟秦始皇刻石髙自稱述未知陛下欲何所法且叙修寺之美豈所以光聖徳耶帝命曵倒碑樓承璀言樓大請徐毁撤帝厲聲曰多用牛曵之承璀乃不敢言凡用百牛乃倒自昔大家婦女有最賢者唐節度使李光進與弟光顔友善光顔先娶其母委以家事母卒後光進乃娶光顔使其妻奉管鑰籍財物歸於其姒光進反之曰新婦逮事先姑命主家事不可易也因相持而泣此雖係光進兄弟友于之愛甚篤然亦室中之婦皆能聽之無問言以視世人䦧牆之變多起於長舌為厲階者其賢不肖相去何如也至於光進恪遵母命其為孝子抑又可知矣嚴平子語錄士君子修身如塑像然形容既定時復增損脱換以求可觀於世薛諧孟評云三代以上多是追金琢玉各成模範三代以下則如泥塑塗金耳雖然亦有之孔明君實元晦金鑄長源子瞻輩玉刻故皆萬古韓退之木居士詩偶然題作木居士便有無窮祈福人盖當時以枯木類人形因以乞靈也今在衡州之耒陽縣北沿流三十里鰲口寺至今人祀之元豐初年旱暵縣令禱之不應為令拆而焚之主僧道符乃更刻木為形而祀之張芸叟南遷郴州過而見之題詩於壁云波穿火透本無竒初見潮州刺史詩當日老翁終不免後來居士欲何為山中雷雨誰宜主水底蛟龍睡不知若使天年俱自遂如今已復長孫枝予每憤南方滛祀之多所至有之陸龜䝉所謂有雄而毅黝而碩者則曰將軍有温而愿哲而少者則曰某郎有媪而尊嚴者則曰母有婦而容艶者則曰姑而三吳尤甚所主之神不一或曰太尉或曰相公或曰夫人或曰娘子村民家有病不服藥劑惟神是事必先禱之謂之問神茍許其請雖冒險以觸憲網必為之倘不諾其請卒不敢違也凡禱必許以牲祀謝所費不貲禱而不騐病者已殂猶償所許之祭曰勿償其禍必甚無知之俗以神之捍灾禦患為可畏惴惴不敢少懈也豈獨若是乎近者士大夫家亦習此風稍有識者心知其非而見女子之易惑故牽於閨幃之愛亦遂狥俗殊可駭嘆且神聰明正直而壹者也豈有以酒食是嗜而竊禍福以饕餮於愚魯之民豈所謂聰明正直者耶至於嶽也瀆也古先賢徳有功於人載在祀典血食一方者吾敢不欽奉之乎所謂郎者姑者安能禍福於忠信之士吾所未信也世豈無狄梁公為一革之居士既為令之所焚矣彼庸髠者復假託以惑衆則尤可笑云此宋張邦基墨莊漫錄中所載又載衢州一事云衢州㕔事下有土勢隆起篠本叢生相傳云古塜也舊有碑其文云五百年刺史為吾守墓以此前後相承皆畏而不敢慢紹聖元年齊安孫賁公素為守問之左右以是對公命毁去之官吏大恐闔府叩頭以諫公曰藉令土中有賢者骨當以禮法遷之乃為文自祭而除之了無他異但有二石峯長五六尺堅瘦泔潤又有大木之根盤踞其下羣疑遂定石上有刻云乾符五年五月三日安於此押衙徐諷龍山起此石刺史季彀題又刻云開寳七年重叠峨嵋山于㕔事前於郡齋文會閣移季公之石安置於此刺史慎知禮題時公素方修州治南韶光園重建清冷臺堂成乃移二石於堂下名曰雙石嗟乎慎公移石去季公之得石凡九十七年公素之破疑塜出石去慎公又一百二十一年物之顯晦抑自有數第不知峨嵋之廢及冒塜之名自何時也公素一旦嬉笑為之遂釋千百年之惑張芸叟有詩云芝蘭雖好忌當門何况庭前惡土墩畚鍤纔興雙劍出狐狸盡去老松蹲百年守塜真堪笑一日開軒亦可尊安得擲從天上去成都石笋至今存公素可謂剛毅正直自信之君子也張公所記二事皆可以醒世人之惑於邪説者所關非淺乃衢治古塜之悞不過一石已經孫公移置無復可疑矣後歴年稍遠又爾傳訛復以為郭璞墓也至明郡守李公遂始出其石發去而為之記曰衢治㕔事之前有封嶄然䕃以竹樹髙與堂等隔離中外莫可洞視即數十人聚論背立無覺也傳云郭璞墓發之者於守輙不利更數百年莫之决也嘉靖戊戌豐城李遂守郡事惡其當面如樹塞也祝之曰郭公忠而被戮捐軀江東不當與公從争出入為胥吏弊藪也乃啟視之中有錦川石二狀如笋髙可丈許且其碑云唐刺史得而翫之封以去後即其言封處植竹木因以為郭璞基云嗚呼禍福之移人也豈必庸衆人哉景純死地𦵏處學士類能言之而積疑習舛歴千百年愈益固則不利於守之語有以繫之耳是故自私自利之心勝而禍福之説售禍福之説行而是非謬即目前顯設猶復譸張矧地中之盖藏乎然李公愛石遺訛妨公惑聽亦可為玩物之戒也云云嗟乎一石之微耳自乾符迄於明嘉靖不為不久經數公移置著其事於詩與記不為不詳謂可以解愚人之惑而釋後世之疑矣乃終不能置而又建其祠於府署傍牓曰石將軍廟彼雄而毅黝而碩者為將軍猶有其形在也今則頑然二石且又發去而又忽謂之將軍立祠以祀出於何典耶人之可笑一至於此因讀木居士詩并及吾衢移石事備書之以竢世之能為孫李二公者唐太和中李徳裕鎮浙西有劉三復者少貧苦學有才思時中人齎御書至以賜徳裕徳裕試其所為謂曰子可為我草表能立就或歸以創之三復曰文理貴中不貴其速徳裕以為然三復又請曰漁歌樵唱皆傳公述作願以文集見示徳裕出數軸與之三復乃體而為表徳裕嘉之因遣詣闕求試果登第歴任臺閣三復沒後其子鄴勅賜及第登廟廊上表雪徳裕以朱厓神櫬歸𦵏洛中報其先恩也士大夫美之宋范延貴為殿直押兵過金陵張忠定公見為守因問曰天使延路來曾見有好官員否延貴曰昨過袁州萍鄉縣邑宰張希顔著作雖不識之知其好官員也忠定曰何以言之延貴曰自入萍鄉縣境内驛𫝊橋道皆完葺田菜墾闢野無惰農及至邑則㕓肆無賭博市易不敢喧争夜宿邸中聞更鼔分明以是知其必善政也忠定大笑曰希顔固善矣天使亦好官也即日同薦於朝此事載東軒筆錄中余閲之亦大笑曰忠定亦好官員也非延貴則不知希顔非忠定則又不知延貴矣使為官者皆能若是天下豈愁無好官員而百姓寧有不得其所者哉以子冠氏子者男子通稱孔子大聖孟子大賢例則稱子孔子復號夫子者邢昺孝經疏云孔子嘗為魯國大夫故弟子連官稱尊之以别餘人也後之尊師者因例曰夫子近時朱文公稱周程特曰子周子子程子復於姓上繋子按公羊傳其曰子沈子子司馬子何休釋云加子姓上名其為師也若非師而但有徳者不以子冠氏朱子於周程盖尊師之本朝以居士稱者實繁即孟子所謂處士也六經中惟禮記玉藻有曰居士錦帶注道萟處士也居士之名昉此此語載宋蕭參希道錄中乃後世似以喜尊二氏之教與緇黄相契者為居士林下尊宿多以自稱又非古昔命名之意矣李賀舉進士有名與賀争名者毁之曰賀父名晉肅賀不舉進士為是勸之舉者為非聽者不察唱而和之同然一辭宋郊為知制誥仁宗便欲大用有忌其先進者譛之謂其姓符國號名應郊天又曰郊者交也代替之名也宋郊其言不祥仁宗遽命改之韓退之為之辯其理始明仁宗為人所惑而郊名遂改世之小人雖極險惡以正理折之亦何能為然為辯者少而為所惑者多也奈何哉留青日札云吾鄉有田名白雲宗盖洪武初抄沒元僧之産也元有帕克斯巴號金童少長學富五明故又稱曰巴喇宻特及卒賜號皇天之下一人之上宣文輔治大聖至徳普覺真智佑國如意大寳法王西天佛子大元帝師至治間特詔郡縣建廟通祀泰定元年又頒各行省為之塑像二年西臺御史李昌言西畨僧佩金字圓符絡繹道途騶騎累百傳舍至不能容則假館民舍因迫逐男子奸汚婦女白雲宗白蓮宗頗通奸利云云盖僧之為害如此而有國者不知禁且崇事之不亦過甚矣乎傾嚢而付子難承養志之歡繼世而同居漸有䦧牆之隙四語透徹人情非身歴其境者不能道出儒教實以其實實天下之虚禪教虚以其虚虚天下之實陳白沙詩云六經皆在虚無裏是欲率古今天下而入禪教也豈儒者之學哉此楊升庵語也極切明時講學先生之病隆萬以來異學之害日熾武康程叔明送盧新庵集序中言之最詳其畧謂耿天臺言學楚中謂孔子素王釋氏空王合儒釋而並尊之天臺之作俑也李載贄師之専言隂隲之事止以其身為緇流害猶未甚管登之師之為之捭闔其説以為佛老二宗異吾夫子之身綱常同吾夫子之言性道性道難聞而於竺經聞所未聞當與周易詩書並傳者也嗟嗟自古惑世誣民有至此極者哉今其説浸淫宇内學士經生往往喜其不經之談争奔走之飯僧放生之事家傳而戸習之矣不佞菲才綿力恨不能息邪説以正人心不知將何底極心竊憂之云云其言痛切之甚可以為時氛一砥全篇載金華誌中雙橋隨筆卷七
