body:
  text: 雙橋隨筆卷一鳳縣知縣周召撰戶樞不轉則必腐鎖腹不開則必鏽人心不用則必灰蘇長公言人心不可縱放間散既久毛髮許事便自不堪筆疇云自小以讀書為業除把筆攻文外世故茫然不知才有毛髮事則蹙蹙不自寧矣蓋懶惰之害也如此陶侃豪傑士也朝運百甓於齋外暮運百甓於齋內豈無所用其心哉正以人心一懶則百骸俱怠百骸俱怠則心日荒而萬事廢矣訓子弟者不得不以讀書為急而世情不諳又多蒙然張口如坐雲霧中人况於玩日愒月而不自惜其年者可無猛省昔諸葛武侯與司馬仲達治軍渭水克日交戰宣王戎服蒞事使人視武侯獨乘素輿指揮三軍隨其進止宣王嘆曰諸葛君可謂名士矣仲達此評為卧龍寫照雋永堪思然必如武侯乃稱名士飲酒讀離騷輒冒此稱談何容易詩文皆不厭改杜子美云新詩改罷自長吟歐陽永叔作文先貼於壁時加竄定有終篇不留一字者黃魯直長年多改定前作張文潛云世以白樂天詩為得於容易嘗於洛中一士人家見白公詩草數紙點竄塗抹及其成篇殆與初作不侔是當時所傳每作詩令一老嫗解之問曰解否不解則又易之故唐末詩近於鄙俚云云樂天之詩實未嘗淺易若此也魏菊莊極言冷齋夜話之謬極是蜀先主臨終戒後主曰可讀漢書禮記歷觀諸子六韜商君書益人意智孫權嘗謂吕蒙及蔣欽曰卿今正當塗掌事宜學問以自開益蒙曰在軍中常苦多務恐不容復讀書權曰孤豈欲卿治經為博士耶但當令涉獵見往事耳北魏主問李光何事益人神智對曰惟有讀書陳眉公云小兒輩不當以世事分讀書當令以讀書通世事蓋書者神智所由以生而世事所由以達者也世有童而習之迄於白首而問以世務則蒙然張口如坐雲霧者是豈書之過也哉談隂陽風水而不為之惑雖賢智之人百無一二焉即先輩集中亦有暢言其非者然所言者理也而世人猶未悟請以情動之可乎今夫父母之於子自懷胎墮地以迄成人其間察其啼笑伺其飢飽候其寒暖疾痛疴癢詬噢抱持艱辛萬狀既離襁褓則又為之延師為之擇室在目下既營衣食之謀憂異日又悉田園之計生前之心血為兒孫作馬牛已盡枯矣既歸黃土似可以息肩矣乃一切得喪榮枯窮通夀天與夫至纎極細者仍無不歸其責於就木之人嗟乎父母欲受人子之報生未必能而人子不恤父母之勞死猶不免易不云乎幹父之蠱有子考無咎吾身幸為男子戴圓履方不能自立而欲邀庇於塜中之枯骨使有遷徙暴露之憂起訟破家之患不但不仁亦不智甚矣且風水之利聽之父母乎父母有知未有不愛其後者也不待風水也聽之地理乎則父母既無權矣但覔佳地而供奉之可矣不待葬吾父母也然使風水有靈夫塊然之土與人相隔非有手足耳目也何所施為何所營運能使其家獨蒙福利而無枯喪貧夭之憂哉不思及此而致父母不獲安於土甚矣世人之愚也子思曰君子居易以俟命孟子曰夭夀不二修身以俟之不能修己而妄意風水之可以庇人則已近於行險僥幸之計矣考亭而在吾將正言以問之立心清恕而體質穩重者乃福德貴人也開卷有益積善降祥常以此八字自勉并以此告知己此司馬溫公語也歐陽永叔不誇文章蔡君謨不誇書吕濟叔不誇棋柯公南李公素不誇飲酒司馬君實不誇清約大抵不足則誇也此范蜀公語也學者當以書紳可以陶汰性情變化氣質於進德修業之功所裨不淺黃金滿籯不如貽子一經所可恨者積書與子孫而子孫未必能讀且有鬻之以供衣食者矣至於先人手撰之書尤宜珍惜即不幸而罹兵火之厄必用心設法守之護之勿使遺燬乃有不肖子孫絶無手澤之念覆瓿投溷有若芻靈昔人制作因之不傳於世者不知凡幾矣更有甚者如宋司馬伋畏秦檜有私史害正之語遂言洓水記聞非其曾祖光所論者李光家亦舉光所藏書萬卷悉焚之嗟乎祖宗何罪且書亦何罪而為之後者止以權姦之焰恐為所纍而棄之惟恐不速子孫之不肖抑至於此秦熺恃其父氣焰薰灼手書移郡將欲取王姓之所藏書且許以官其子長子仲信苦學有守號泣拒之曰願守此書以死不願官也郡將以禍福誘脅之皆不聽熺亦不能奪而止有子若是司馬光李光兩家兒泉下有知能無愧死凡書之成帙者必不可纂韓栁歐蘇之文各自為篇拔其尤以便初學猶為近可若夫集有專名另成一種亦各摘其數條攟托為部以示博綜非窺豹斑實截鶴脛蹈此説者無如陶氏説郛草草拈出僅一二則亦標曰某書某書雖云多種但可謂之書目而已其所撰輟耕録則甚佳彚輯諸家所撰而無割裂冗碎之傷者古今逸史漢魏叢書稗海祕笈祕書九種諸子文歸紀録彚編漢魏名家諸刋其經刪訂而不害為全書則古文互刪為最他若陳明卿先生八編纂潛確類書皆足以饋貧拯亂士人案頭不可不備集古今經濟要務以成一書惟邱瓊山大學衍義補朱子撰古今治平略所謂一屋散錢而又有繩以貫之者真金科玉律之文也養生者不足以當大事惟送死可以當大事孟子此言豈願世人惟務繁文俗套而絶無人子悲哀痛苦之情哉古之為制殮葬有制哭踊有節服制有數祭奠有時子思曰喪三日而殯凡附於身者必誠必信勿之有悔焉耳矣三月而葬凡附於棺者必誠必信勿之有悔焉耳矣人子不幸而喪其親考之古制酌而行之合天理而審人情富貴貧賤各稱其家斂形懸棺可以無恨後世之人不知法古而惑於僧道因果之言隂陽風水之術罔極之哀置之局外以七日為超薦之期奉為玉律以十殿為回輪之地妄語隂司鐘鼓嘈雜梵唄紛紜習俗相沿有如兒戲其間以父母起見者十無一二或為體面宜糚支撑勉力發引之前延賔演劇笑語喧譁就道之辰結綵揚旌笙簫鼎沸當是時也弔客之帳少實多文孝子之容有聲無淚噫嘻異哉昔樂正子春之母死五日而不食曰吾悔之自吾母而不得吾情吾烏乎用吾情夫過於情而尚自以為悔况乎不用其情者哉余以為居親之喪宜考文公家禮稱貧與富斟酌行之而悉去時人之陋習庶不至遺恨於大事之不克襄耳因語兒輩即以此為余異日歸山之盟如背斯言是違父之命不孝莫大焉倘慮有招物議以為儉親者持此篇約略數語奉告姻朋鄉黨諸先生大人可也周世宗明達英果議論偉然即位之明年廢天下佛寺三千三百三十六是時中國乏錢乃詔悉燬天下銅佛像以鑄錢嘗曰吾聞佛説以身世為妄而以利人為急使其真身尚在茍利於世猶欲割截况此銅像豈有所惜哉由是羣臣皆不敢言即此一事三代以後之君幾人能及太平清話云先秦兩漢詩文具備晉人清談書法六朝人四六唐人詩小説宋詩餘元人畫與南北劇皆是獨立一代余謂秦漢詩文晉人書法唐人詩宋詞元畫尚矣至於清談四六小説南北劇開人疏狂靡麗荒誕淫哇之習為厲不淺人有宜束於髙閣而文有當付之冷灰者或但取其言與文供人耳目之玩則可耳顔之推家訓勉學篇文吾七歲時誦靈光殿賦至於今日十年一思猶不遺忘二十之外所誦經書一月廢置便至荒蕪矣桞子厚云賢者不得志於今必取貴於後古之著書者皆是也宋元近欲務此然才薄力劣無異能解雖欲秉筆覼縷神志荒耗前後遺忘終不能成章往時讀書自以不至抵滯今皆頑然無復省録每讀古人一傳數紙以後則再三伸卷復觀姓氏旋又廢失秦太虛云豫少時讀書一見輒能成誦疏之亦不甚失然負此自放喜從滑稽飲酒者遊旬朔之間把卷無幾日故雖有強記之力而常廢於不勤此數年來頗發憤自懲艾悔前所為而聰明衰耗殆不如曩時十一二每閲一事必尋數次終掩卷茫然輒復不省故雖有勤苦之勞而常廢於善忘嗟乎羲轂難停桑榆易晚有才之士回憶少年情猶如此中下子弟其何以堪蓋老而好學有如秉燭之明往日蹉跎雖悔何及所以禹惜寸隂而吾輩宜惜分隂尚恐坐荒歲月耳鄭玄自徐州還髙密道遇黃巾賊數萬人見玄皆拜相戒不敢入縣境孫期習京氏易古文尚書家貧不仕事母至孝饔膳莫供乃於大澤中牧豕以資奉養遠人從學者皆執經隴畔黃巾賊起適期里陌輒相飭約曰莫犯孫先生舍海冦黎盛犯潮州悉毁城堞且縱火至吳子野近居盛登開元寺塔見之問左右曰是非蘇內翰藏圖書處否麾兵救之吳氏歲寒堂民屋附近者賴以不毁甚衆嗟乎今之弄兵於萑苻者所在見告矣雖如鄭康成孫仲彧蘇和仲者甚少然亦豈無好善喜文之人戒不入境犯舍麾兵救火者乎世上如今半是君是所望於挂書投劍出緑林中而獨稱豪士者吾子彥書室中修行法心間手懶則觀法帖以其可逐事放置也手間心懶則治迂事以其可作可止也心手俱間則寫字作詩文以其可兼濟也心手俱懶則坐睡以其不強役於神也心不定宜看詩及雜短故事以其易於見意不滯於久也心間無事宜看長篇文字或經注或史傳或古人文集此又甚宜於風雨之際及寒夜也明胡維庸之獄有訴浦江鄭氏與惟庸交通者時四方仇怨相告許凡指為胡黨率相收坐重獄鄭氏素以孝義聞兄弟六人吏捕之急諸兄弟急欲行其弟鄭湜曰弟在乃使諸兄罹刑辟耶獨詣吏請行仲兄濓先有事京師暨弟至迎謂曰吾家長當任罪弟無與焉湜曰兄老吾往辨之萬一不直弟當服辜二人爭入獄太祖聞俱召至廷勞勉之謂近臣曰有人如此而肯從人為非耶即宥之此與孔褒一門爭死事同乃濂等幸遇聖明遂蒙鑒宥而褒生無道之世罪竟坐焉何所遭之異耶東魏髙歡西魏宇文泰並出一時梟雄權譎足以相抵沙苑邙山之戰機謀迭見勝負互分泰為彭樂所追身幾擒而幸逸歡為破胡所窘刃垂及而旋生至於李檦隱身鞍甲令貴血濺征裳李穆扶主背而追騎不疑蔡祐挾一矢而四面拒敵泰既仗用命之臣彭樂內腸復戰髙昂奮首示人興慶盡百箭而捐軀假韶射敵馬以救主歡亦多死綏之士兩虎相爭勢均力敵所謂棋逢敵手鼠鬭穴中勝敗死生之機轉在俄頃當異常急迫時槊下之危歡氣殆絶而泰亦驚不得睡枕蔡祐股而始安古來兩軍酣戰左傳所載秦晉齊楚為竒而此則巨鹿昆陽之後亦令人口呿舌嬌者矣古之用兵者如周瑜赤壁之焚謝玄淝水之捷韓世忠鎮江之戰虞允文采石之功皆能料敵出竒以少擊衆然而雖係人謀亦有天幸焉又未若嶽武穆兵不滿萬屢獲竒功如以八百人破羣盜王善等五十萬衆於南薰門以八千人破曹成十萬衆於桂嶺其戰烏珠於潁昌則以背嵬八百於朱仙鎮則以五百皆破其衆十餘萬王善曹成猶云烏合之衆摧之不難烏珠兵精力鋭所向無前而一遇嶽家軍輒謂撼山猶易用兵之善誠未有如武穆者也武穆御兵有取民麻一縷以束芻者立斬以徇卒夜宿民開門願納無敢入者軍號凍死不拆屋餓死不虜掠其嚴如此然在軍中卒有疾武穆親為調藥諸將遠戍武穆遣妻問勞其家死事者哭之而育其孤或以子婚其女凡有頒犒均給軍吏秋毫不取蓋撫循其下不異於家人婦子故能得衆心而法令所施毫不忍犯惟恩與威並行故也今之為將者平時不恤士卒刻薄寡恩驅之戰鬭人無固志則有縱之剽掠以悅其心而已矣孰肯出死力以赴敵而有不敢草菅民命之心哉東漢人爭尚節義後世所難梁冀誣李固下固於獄門生王調貫械上書證固之枉趙承等數十人亦要鈇鑕詣闕通訴太后明之乃赦焉及出獄京師市里皆稱萬歲冀聞之大驚畏固名德終為己害乃更奏前事遂誅之而露固尸於四衢令有敢臨者加其罪固弟子汝南郭亮年始成童遊學洛陽乃左提章鉞右持鈇鑕詣闕上書乞收固尸不許因往臨哭陳辭於前遂守喪不去夏門亭長呵之曰李杜二公為大臣不能安上納忠而興造無端卿曹何等腐生公犯詔書干試有司乎亮曰亮含隂陽以生戴乾履坤義之所動豈知性命何為以死相懼南陽人董班亦往哭固而殉尸不肯去太后憐之乃聽得襚斂歸葬二人由此顯名曹節等矯詔下陳蕃黃門北寺獄即日害之徙其家屬宗族門生故吏皆斥免禁錮蕃友人陳留朱震時為銍令聞而棄官哭之收葬蕃尸匿其子逸於甘陵界中事覺繫獄合門桎梏震受考掠誓死不言故逸得免此數公者立地頂天目無姦佞千載而後死骨猶香蔡雍才名蓋代而知己之感乃付凶人瘐死獄中又何足惜所謂均為一死而有泰山鴻毛之異者非耶又固女文姬預匿其弟燮難作以付父門生王成成將燮入徐州令變姓名為酒家傭而成賣卜於市各為異人隂相往來燮從受學酒家異之意非恆人以女妻燮燮専精經學梁冀伏誅以赦還鄉里後王成卒燮以禮葬之感傷舊恩每四節為設上賔之位而祠焉後為河南尹先是潁川甄邰諂附梁冀為鄴令有同歲生得罪於冀亡奔邰邰偽納而隂以告冀即捕殺之邰當遷為郡守會母亡邰且埋母尸於馬屋先受封然後發喪邰還至洛陽燮行途遇之使卒投車於溝中笞捶亂下大署帛於其背曰諂貴賣友貪官埋母乃具表其狀邰遂廢錮終身其他廉方自守不愧其父卒之日時人感其忠正咸傷惜焉民間之害莫甚於盜盜起而大兵隨之荆棘生焉亂離之慘有不可言者昔周世宗與將相食於萬歲殿因言兩日大寒朕於宫中食珍膳深愧無功於民而坐享天祿既不能躬耕而食惟當親冒矢石為民除害差可自安耳旨哉斯言九重之上每念及此白波無警天下太平矣蓋世宗負英武之姿御軍號令嚴明人莫敢犯攻城對敵矢石落左右略不動容應機決䇿出人意表親冒矢石為民除害誠非虛語宜其登遐之日遠邇哀慕也蜀之富人輦金餽揚子雲乞附姓名於法言而子雲不許至於谷口鄭子真則津津樂道焉以視索米為作佳傳者人品何啻霄壤昔人疑劇秦美新非子雲之筆未為無見乃余更於富人有取焉子雲一官拓落寂寞自甘其所著撰俗物見之應取以覆醬瓿耳而若人乃慕一儋石不充之人欲乞數字以為榮嗟乎今之守錢積榖翁作夜郎王擁資自大其視負薪行吟織簾苦誦之輩方且厭而唾之以為不祥尚有若人在其目中哉是今之富人比古之富人其面目肺腸又不堪相對矣子雲無劇秦美新事史疑辨之甚悉余詠史詩未免輕訾古人書此以志率筆之悔昔人謂天下才共一石惟曹子建得八斗乃其與楊德祖書好人譏彈其文有不善者應時改定丁敬禮常作小文使之潤飾自以才不過若人為辭當時目子建者以為繡虎而欿不自足若是李本寧謂其弱志強骨虛心實腹故當時獨步鷹揚擅名振藻發迹髙視之儔無得而踰焉常見少年輩粗能握管或以帖括稍工輒至足髙氣揚不能自主蓋天下大矣身在井中而遽謂天在是何異蜩與鷽鳩之見乎常舉以戒兒輩稍有此心受病不淺大約多讀書廣聞見使器量日開性情日厚則神智日生而不入淺狹輕浮之陋習諸葛武侯訓子寧靜淡泊之言當書之座右時以自警司馬溫公家訓云吾記天聖中先公為郡牧判官客至未嘗不置酒或三行五行多不過七行酒酤於市果止於梨栗棗柿之類殽止於脯醢菜羮器用瓷漆當時士大夫家皆然人不相非也會數而禮勤物薄而情厚參政魯公為諫官真宗遣使急召之得於酒家既入問其所來以實對上曰卿為清望官奈何飲於酒肆對曰臣家貧客至無器皿肴果故就酒家觴之上以無隱益重之古人居家宴客其儉如此吾鄉邇來俗尚日侈祀神演劇之際為費不資余方以過盛為憂而今歲遂有三山之變城中廬舍蕩若丘墟居家器具如焚如洗偶與徐元公談及此後殘喘幸存我輩聚首但有汙樽抔飲而實以太羮元酒耳憶曩時設客稍豐真覺無謂東漢明帝時公車以反支日不受章奏帝聞而怪曰民廢農業遠來詣闕而復拘以禁忌豈為政之意乎遂蠲其制堯夫自號為安樂先生其西為甕牖讀書其中晡時飲酒三四甌微醺便止不使至醉喜吟詩作大字書然遇興則為之不牽強也大寒暑則不出每出則乘小車為詩以自詠曰花似錦時髙閣望草如茵處小車行司馬溫公贈以詩曰林間髙閣望已久花外小車猶未來堯夫隨意所之遇主人喜客則留三五日又之一家亦如之或經月忘返性雖髙潔而對客接人無賢不肖貴賤皆歡然相視自言若至重疾自不能支其有小疾有客對話不自覺疾之去體也後李卓吾亦喜髙潔而肆志不經至取怪民之禍倘以先生為師辭榮履素杜門著書弄月吟風自有樂地奈何讀孔孟書博帶峩冠為時命吏一旦披緇枤錫蔑棄倫常而又賦資褊急傲物氣髙以畔道離經致干國憲憤激自裁又將誰懟嗟乎若此公者真所謂自貽伊戚辜負盛世之民耳以視堯夫之平易近人翛然自得其度量相越何止霄壤陳后山詩云書當快意讀易盡客有可人期不來世事相違每如此好懷百歲幾回開又云俗子推不去可人期不來世事每如此我生亦何娛后山此語兩見於詩其胸中紆欎甚矣然以余思之此不諳人情世故之語也蓋后山端潔人也其家必淡漠而無招權行賄問舍求田經營阿堵之事是其門固俗人之望而却走者乃有人焉推之而不去則其淡於勢利愛戀后山而不忍遽别可知矣是后山所謂俗子者余疑其為可人也易不云乎同聲相應同氣相求以后山之人之文與詩大雅君子應不待謀而自合不待期而自集矣而乃至於費招呼期不來此必趨炎附勢之輩奔走不遑而懶與文士親近者也尚得謂之可人乎是后山之所謂可人者余疑其為俗子也故曰此不諳人情世故之語也惟快意書讀之易盡實為苦事雖然處今之時尚有讀易盡之書而不可得者其懷抱之惡又當何如哉是欲求如后山之所苦而不能矣豈不可嘆明朱君復有諸子斟淑一書歷數成周鬻熊以至於唐馬總凡五十一家俱有評論雖其間推揚彈射未必盡確而數行之內古人面目其大略俱已拈出其論王充之論衡也以為春秋戰國以後著書者皆嗜信異理甚舛者膠固前言守弗敢破仲任由千載之下而能獨砥狂瀾剗虛黜謬即意有過激辭間近瑣乃其精鑒卓識自當凌厲千古使在聖門必不居狂狷之後孔子之所必取也中郎子元之識豈其出後儒下而乃以迂腐酸見力詆豪傑甚為之扼腕其論劉向也以為向之忠悃直與三閭大夫後先掩映身為宗臣而數困於讒不改其操可謂社稷臣矣孟堅稱為直諒多聞古之益友似不足以盡之此其論又與東海何柘湖甚合其序説苑略云數千百年之後凡成學治古文者欲考見三代放失舊聞惟子政之書為雅馴今讀説苑二十篇自君道臣術而下即繼以建本極於修文終於反質蓋庶幾三王承敝易變之道又豈後代俗傳所得究其旨要哉余懼學者承誤習謬使子政之心不白於天下乃為之辨如此以此序及君復之論論衡者合而觀之則君復之自名其書以為快誰曰不可人但知欎林石故事而不知江革亦有之革自武陵王長史除都官尚書將還所給一舸舸艚偏欹不得安卧乃於西陵岸取石數片以實之其清貧如此士君子幸入仕版雖居下僚為百里長身去之後不可使人罵而宜使人思宋王元之韓魏公皆居於黃州黃州之民曰吾州雖小然王元之韓魏公皆辱居焉以誇於四方之人元之自黃遷蘄州沒於蘄然世之人稱元之者必曰黃州而黃人亦曰吾元之也魏公去黃四十餘年而思之不置至形於詩兩公去後之思若此竊謂黃州土風厚善其民寡求而不爭其士靜而文朴而不陋雖閭巷小民知尊敬賢者其私賢人君子以為寵也固宜若夫荒山小邑僻而遠僿而不文官此地者雖治行如卓魯龔黃無由自見僅博地方老幼幾滴淚垂而已或曰滴淚雖微勝於豐碑髙峙滿眼鋪張者何啻霄壤因述之以告夫世之願學王韓二公者人生在世惟五倫之屬乃係天常世人好異佛老外又有神仙荒誕不經惑人非淺東坡云世傳桃源事多過其實考淵明所記止言先世避秦亂來此則漁人所見似是其子孫非秦人不死者也又云殺雞作食豈有仙而殺者乎舊説南陽有菊水甘而芳民居三十餘家飲其水者皆夀或至百二三十歲蜀青城山老人村有見五世孫者道極險遠生不識鹽醯而溪中多枸杞根如龍蛇飲其水故夀從來所謂神仙者大約此等人耳而陳眉公謂道士侯道華喜讀書吕洞賔陳摶賀元施肩吾皆本書生宋譙定雍孝聞尹天民亦皆以儒士得道定百二十歲故在青城山中採藥人有見之者讀易尚不輟也此則負天姿喜讀書而為修煉之説以自竒者世以其蹤迹非常遂以神仙詫異之豈真有飛升騰舉之術哉雖然當此多故之時人如駭鳥驚魚棲身無地使有安土如桃源老人村者而託足焉理亂不聞而得以茍全其性命此即陸地神仙矣况以多夀之年優遊林壑者歟吾願世之言仙者皆作此想毋為怪民如左慈于吉之流應以左道伏誅也世説王子敬病篤道家上章應首過問子敬由來有何同異得失子敬云不覺有餘事惟憶與郗家離婚王敬美云此得入德行者見子敬生平無隱慝耳余謂子敬不如劉真長遠甚真長在郡臨終綿惙聞閣下祠神鼓舞正色曰莫得淫祠外請殺車中牛祭神真長答曰某之禱久矣勿復為煩如此方是士君子識力若子敬非不自隱惟過信鬼神之説不敢不言耳然首過止此則其為人可知以入德行未可盡非也文徴仲先生以布衣徴入史局同事諸公皆以其不由科目濫竽木天而嗤笑之乃江陵之敗家奴篋中無非翰林諸公題贈詩扇者而先生處劉瑾宸濠之際超然遠引二氏籍沒求其片紙隻字不可得以視翰苑諸公相去何如哉但以一時之遇為得意而不計其行與品不幾為腐鼠之嚇也夫仕途之難惟縣令為甚不難於剖繁理劇而難於承事上官昔杜祁公有門生為令者公戒之曰子之材品一縣令不足施然切當韜晦毋露圭角毁方瓦合求合於中可也不然無益於事徒取禍耳門生曰公平生以直諒忠信取重於天下今反誨某以此何也公曰衍歷任多年上為帝王所知次為朝野所信故得以申其志今子為縣令卷舒休戚係之長吏夫良二千石者固不易得若不相知子烏得以申其志徒取禍耳非欲子毁方瓦合求合於中也余忝鳳令五年謬為上臺所知以此自恃乃欲稍申所志而厲聲色於藩臺之走𨽻册遲之讒遂藴於此倘得罪於長吏其取禍又當何如耶祁公所示真歷盡仕途中險惡之語然所謂毁方瓦合者貴合於中耳若盡屈強項吏而為繞指柔亦非公告誡之旨矣文士驅筆縱橫而膽氣不副遂以毛錐安用為兜鍪所輕東魏髙歡將出兵拒西魏行臺郎中杜弼請先除內賊歡問內賊為誰弼曰諸勳貴掠奪百姓者是也歡不應使軍士皆張弓注矢按矟夾道羅列命弼冒出其間弼戰栗流汗歡乃徐諭之曰矢雖注不射刀雖舉不擊矟雖按不刺爾猶亡魂失膽諸勳貴人身犯鋒鏑百死一生雖或貪鄙所取者大豈可同之常人也弼乃頓首謝不及按史弼常為歡作檄移梁淋漓伉爽辭意並工歷數梁室禍敗如其所料讀者聳聽夫既張膽陳言當鼎鑊不避復何所憚而至於亡魂失膽戰栗流汗乎此言一出豪貴聞之勢將益肆是弼助之焰而使滋毒於民也悲夫詩之惡讒人也曰如鬼余以為人比於鬼尤甚也夫使世果有鬼焉其為物也天定之矣彼雖欲不為鬼焉而不得也猶之蛇與蝎然天與之毒彼雖欲不螫人而亦不得也若夫人天之所賦者仁義禮智其性也君臣父子兄弟夫婦朋友其倫也禮樂詩書其文也衣冠劍佩其儀也一旦而如鬼焉是天命之以人而彼乃自變而為鬼也其罪加於真鬼一等矣魏徴有言若人漸澆詭不復反朴今當為鬼為魅嗟乎此時世界竟多若是之人矣然使為鬼魅者并其形而亦變焉可以知其為鬼而避之矣乃五官四體猶人也聲音笑貌猶人也甚而文章議論猶人也猶然人而實則鬼人又烏得而知之而又烏得而避之甚矣天下惟人而鬼者為不可測也鬼神二字世人不解誤為妖邪幻異之物在兒童婦女市井村落中人猶不足怪乃讀書學道號為正人君子者亦復如是不知何故中庸不云乎鬼神之為德其盛矣乎程子曰鬼神天地之功用而造化之迹也張子曰鬼神者二氣之良能也朱子曰以二氣言則鬼者隂之靈也神者陽之靈也以一氣言則至而伸者為神反而歸者為鬼其實一而已易曰精氣為物遊魂為變是故知鬼神之情狀本義云隂精陽氣聚而成物神之伸也魂遊魄降散而為變鬼之歸也陳紫芝曰天命無妄之理聚於人心者有情有性散於天地者為鬼為神性情者人心之鬼神也鬼神者天地之性情也鬼神之義略盡於此可謂深切著明矣而人皆夢夢何也然則孔子所謂敬而遠之者非歟曰孔子敬而遠者謂所當祭之鬼神即天子之天地諸侯之社稷大夫之五祀士之先庶人之寢是也而今之謂鬼者判官獄卒木客山魈之類非孔子之所謂鬼也今之謂神者天尊大王將軍夫人之類非孔子之所謂神也蓋巫覡僧道禳災懴過等事初不見於有道之時至於衰世而始盛大約不善之人多而畏禍之心急故惟求庇於彼之所謂鬼神者而跪之拜之耳噫嘻使鬼神果如人所謂而又可市以顛倒其福善禍淫之柄則天且譴而責之不能自保矣又何暇徇人之情以相庇護哉此蓋必無之理而倡於惑世誣民者之所為有心世道者當進而希孟夫子反經之意可也余素持無鬼之論而詈人之為鬼是復有鬼矣不可以不辨士君子身價之重輕有不係於科名者韓退之三子綰衮皆擢第衮為狀元退之名若泰山北斗而狀元衮當時及後世皆無稱焉至於昶止以一字之差傳之至今人猶齒冷然則克家之子固有在此而不在彼者哉孟輔明嗜學行輒載書隨所坐之處不過容膝四面卷軸盈滿時人謂之書窟桞公綽自舉進士至方面嘗抄書不輟九經三史一抄南北史再抄雙橋隨筆卷一
