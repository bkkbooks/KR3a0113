body:
  text: 雙橋隨筆卷十二鳳縣知縣周召撰愛敬以養生哀戚以送死墓焉而葬位焉而祭皆本於禮而不可忽者先王教民之通法也喪而用浮屠之術墓而信葬師之説資㝠報於不可致詰之間徴休咎于無情難騐之川阜上以為親謀下以為身利者此古之所未聞也後世闇夫野人多趨信而甘心焉親没於床不於禮而於浮屠不哭泣擗踊而於鐘磬鐃鼔非是之務則人交笑以為簡時可葬矣泥於山川之利否而不即葬或至於終身或身死而遺槥於子孫甚者子孫恐葬之禍其身舉而棄之水火葬親以禮者世反非之為愚嗚乎是何其不察而至於此極乎彼浮屠之所謂輪廻者果可信耶天之生人物者二氣五行也其運也無窮其續也無端先者過而後者來未嘗相資以為用者二氣五行之常也自草木而觀之發榮於春盛壯奮長蔚乎而不可遏及乎戒之以凛風申之以霜露昔之沃澤茂長一旦飄而為浮埃化而為汙泥生理殫盡跡可窺矣其發生於明年者氣之始至者為之也豈復資既殞之餘榮惟人也亦然得氣而生氣既盡而死死則不復有知矣茍有焚炙刲割佚樂適意身且不有而何以受之形盡氣盡而魂升魄降無所不盡安能入人胷腹重生於世而謂之輪廻也哉天地至神之氣以其流行不窮故久而常新變而不同使必資已死之人為將生之本則造化之道息矣烏足為天地倘或有之人固不知之也浮屠亦人耳何自而獨知之彼以其茫昧不可揣索故妄言以誣世夫豈可信而事其教乎孔子謂祭之以禮為孝則事異端之妄棄聖典而不信者其為非禮也大矣不孝孰加焉而闇者固安之而不以為非胡可哉葬師之動人以禍福其說尤怪人之昌隆盛熾者其先必有厚徳之遺賤貧夭絶者必有餘惡之著山川何與焉誕者則不然聞有富貴之人於此則歸福於塋塚曰此某形也此某徴也於葬之法宜爾也聞有貧賤之人于此則曰此葬之罪也此於法宜至於斯者也信斯言也彼人之多財而力足者皆相率而為不善及乎死也求善地以葬其身則可免子孫於禍夫孰肯為善乎由大而論之係乎盛衰者莫大於國都殽函河渭無異也秦帝之亡漢帝之昌隋據之而促唐據之而長果在於善地乎帝王之尊家天下而役海内使地善而可興竭智以營陵廟奚求而不致而亡國敗主相屬則果不在乎此也審矣古之卜宅兆云者以神道定民志也非視岡阜之向背順逆臆度目斷如世之葬師之為也葬師祖晉郭璞書其書茍可信璞用之以葬其祖者宜有奇騐不誣而璞卒死於簒賊其身不能福而謂能福乎人其可信否耶世之人多信之不知自陷於不肖而莫之贖也嗚乎先王之禮一失而流於野再壊而化於異暨其大壊而不可為忽乎入於禽獸而不之覺也寧不哀哉自今而往吾不能知其所至矣其心浸淫膠固非空言所能革也吾獨以告吾族人親喪必以三年三年之制必循禮勿以浮屠從事違者生罰之死不祠於先祠葬卜吉凶而勿泥於葬師之説期必以三月三月不能至五月五月不能至七月過一嵗者如違喪禮之罰必刻壙誌墓銘力不足者刻其名俾後有考作方氏喪葬儀此明方正學先生宗儀九則之一也浮屠葬師之説余所深惡每欲暢言其謬而筆端庸薾不能盡先生此篇深切著明人人可曉真有家者所宜取法其有禆于人心風俗非淺鮮也九則其八曰尊祖曰重譜曰睦族曰廣睦曰務學曰謹行曰修德曰體仁余皆奉以為訓而另録是編於此者浮屠葬師之害浸淫膠固雖名流鉅公亦多信之而不以為非不揣於雜録中妄陳末議今得先生以為助則孤掌之鳴可不甚畏故載於筆者不憚再三耳已又得劉伯温先生書劉禹疇孝行𫝊後語亦可以見浮屠之謬並録焉閲之者當益信也浮屠之術果何道而能使人信奉之若是哉人情莫不好安樂而惡憂患故揣之必於其所恒懼誘之必於其所恒願然後不待驅而自赴浮屠設為禍福之説其亦巧於致人與夫四海之衆林林也而無不為其所致何哉彼固非止於惑愚昧已也人情無不愛其親親没矣哀痛之情未置而謂㝠㝠之中欲加以罪孰不惕然而動於其中哉間有疑焉則羣咻之若目見其死者拘於囹圄受箠撻而望救者故中材之人莫不波馳而蟻附雖有篤行守道之親則亦文致其罪以告哀於土偶木俑之前彼固自以為孝而不知其為大不孝豈不哀哉且彼謂戕物者必償其死故有牛馬羊豕蛇虺之獄謂天下之蠢動者舉不可殺也今夫虎豹鷹鸇搏擊飛走以食日不知其幾何而獨無罪也哉人之殺物有獄矣虎豹食人而無獄何其重禽獸而輕人也彼又謂婦人之育子者必有大罪故兒女子尤篤信其説以致恩於其母吾不知司是獄者誰與人必有母将舍其母而獄人之母歟将并其母而獄之歟獄其母不孝舍其母而獄人之母不公不孝不公俱不可以令二者必一居焉将見羣起而攻之矣雖有獄誰與治之宰天地者帝也彼則謂有佛焉至論佛之所為呴呴嘔嘔若老婦然有呼而求救不論是非雖窮凶極惡無不引手援之使有罪者勿懷刑是以情破法也夫法出於帝而佛破之是自獲罪於天也吾知其無是事也昭昭矣以劉子之賢其不為所惑無足怪者吾獨悲夫天下之為劉子者不多也故又為之言以悟夫知愛其親而不知道者雖然今之羣相尊奉而不知厭者又不過尚虚華粧體面及勉強支撑以了故事而已求其慮親於㝠㝠之中有加以罪而惕然動念者又不可得矣悲夫王百谷先生作呉社編顧文學雲龍又遺書補其所未偹盖皆憤俗憂時之語也吾鄉最稱寒瘠而邇來俗尚競趨華靡雖當兵燹之餘救死不贍而編中所嫉喜譌尚怪輕人道而重鬼神諸陋習亦皆有之舉國譸張若飲狂藥余無力挽囘不勝杞人之慮録編之前後語及顧書附雜記中冀兒輩省覽倘有欲正人心息邪説距詖行放淫詞以維持吾道如孟夫子者乎當不訾余以為忤俗也里社之説所以祈年榖祓灾祲洽黨里樂太平而已呉風淫靡喜譌尚怪輕人道而重鬼神舍醫藥而從巫覡毁宗廟而建淫祠黜祖禰而尊野厲嗚乎弊也乆矣每春夏之交妄言神降於是游手逐末亡賴不逞之徒張皇其事亂市井之聽惑稚狂之見朱門纓縷之士白首耄耋之老草莽鎛笠之夫建牙羆虎之客紅顔窈窕之媛無不驚心奪志移聲動色金錢玉帛川委雲輸百戯羅列威儀雜遝啟僣竊之心滋姦慝之行長爭鬭之風决奢淫之漸潰三尺之防廢四民之業嗟乎是社之流生禍也昔郭代公戮豕烏氏之妖亡西門豹沉巫河伯之害息今之長民者不是之問豈所謂魯人獵較孔子亦獵較歟不然是或一道也吾儕小人不可知也己王百谷呉社編序百谷信奇材也可畏哉呉社編之作非徒摛藻適情而已盖有憫時之懷先事之慮焉他日柄用其所設施而展布者具見之矣第編中一二未盡敢畧陳之出武庫之戈矛用公家之甲胄青衣行酒何等事乎而演之於承平之世昭君出塞胡爲然也而效之於熈靖之朝手搏爭勝何止數輩㑹首醵財不啻千金輿木偶而入人之門恣所要求假神威以懲人之慢僞張維縶甚者郡倅出遊迴車讓道幕僚入請行令戒途此有以滋無忌者之心而來欲逞者之計未幾則盗發附郭之民家禍作嚴城之宦室矣憶得往年嘗一舉之不旋踵既兆島夷之變此固有識者之所寒心也近者鄉達老成閉扄門巷不容入里是即百谷之心焉耳賤子慚無馬遷記事之才徒抱杞人憂天之戚幸以愚言轉致作者使潤色而増損之聞之當道必有讀未終篇推案而起者矣今夫儒服而賊夫儒者有三一曰畔儒樹二氏之幟以簧鼓喜名矜異之士謂其道𤣥妙無上而孔孟之言特詳於下學云爾此白晝大都操戈入室而無復忌憚者也一曰間儒以先聖之道不可易也二氏之説不可勝也合而一之姑以惑世使學者無深拒焉而且駸駸入於其中而不覺此策士所謂辭卑而進為二氏間者也一曰竊儒陽稱孔孟之學而隂宗二氏之㫖指之曰禪則深避其名而厭然掩之其徒從而推之曰此聖學正脉也二氏之道去聖學非逺也所異者幾希之間耳此以詩禮發冡行之暮夜而憎東方之明者也斯三者其説盈於天下矣春秋之作非惡儒也惡儒而異者也孔子曰攻乎異端斯害也已異端之害猶可言也儒而異異而儒其害何可言也語曰家有常業雖飢不餓夫無常業游民也豈惟不免於餓放僻邪侈無不至而刑戮隨之矣古之君子帶經而鋤負薪而讀固貧者之業也奚足恥也士而恥貧不足以為士矣貧而無業不可以為人也郁離子言人而不死則天地間無所容人矣死而皆為鬼則天地間無所容鬼矣乃人之言金丹不死者非獨庸人也高明名士多好之或傾家亡身而不悟淫祀求福非獨婦人也縉紳大夫篤信之乃願為僧巫輩嚆矢而不辭彼亦何至於是哉由學術不明人心不正而利之陷溺人一塵之眯目遂不見嵩華耳蘭江章文懿公天性朴誠其家居每嵗請門生二次清明一次冬至一次皆其祭先之福物也兩人共一席有不至者文懿自専一席狼餐而盡若門生續至則夫人自來益之夫人平日與門生皆相見文懿他時只蔬食初非矯強亦無意必其朴誠之性以為有則喫無則已順其自然適當如是而止耳以視後來仕宦之家其奢與儉何啻霄壤文懿移居城中宅後有天福山一日本縣有勾攝一罪犯經文懿門前過逕走入其家從天福山逸去差人在文懿家作閙謂藏匿此人文懿令其至内尋索差人直進臥房遍尋不見亦從後門上天福山追趕而去文懿與夫人畧不動色焉張安世家僮數百人皆有技業虞宗治家富殖以奴婢無游手可法哉余以為子弟甚多尚有賢與不肖之可慮况家僮數百乎省事不如省官必汰其狡黠而恣肆者用其謹朴而誠厚者可也唐徐敬業世勣孫也勣慮其狡猾必覆宗偵其出獵縱火焚之敬業即殺其所乗馬匿腹中浴血而出後以失職怨望起兵討武氏兵敗而死宋胡明仲寅康侯弟之子少桀黠難制父閉之空閣閣有雜木寅盡刻為人形康侯曰當有以移其心别著書數千卷於其上年餘寅悉成誦不遺一卷後為有宋名儒兩人皆以少年時駘宕不覊為祖父所憂而其後來結局相異如此所以然者寅為儒門子弟習見夫詩書禮義之容一變至道家訓使然若敬業目中惟乃祖軍中戰鬬攻取事耳而世勣阿㫖立武瞾為后幾覆唐宗雖病中以子孫付弟之言不為不正僨轅之報又何能免人生世上父兄之教盖可忽乎哉程明道兄弟游成都見治篾篐桶者挾冊就視之則易也篾者曰若嘗學此乎因指未濟男之窮以發問二程遜而問之曰三陽皆失位後閩人袁滋入洛問易於伊川伊川曰易學在蜀盍往求之滋入蜀見賣醤薛翁於卭眉間與語大有所得尚有郭曩氏及譙定與篾叟醤翁皆隱君子也李凝齋曰文與可畫竹是竹之左氏也子瞻却類荘子又有息齋李衎者亦以竹名所謂東坡之竹妙而不實息齋之竹真而不妙者是也梅道人始究極其變流傳既乆真贋雜錯徐文長云梅花道人畫竹如羣鳯為鶻所掠翎羽騰閃捎捩變滅之詭雖鳯亦不得而知余偶獲道人真蹟秘為至寳不意竟失於兵火令人悵恨無已兹録兩公評語當怦怦不釋時揭而讀之庶使當日淋漓走筆之状彷彿在吾目中聊以自慰耳造物之理有不可解者吾鄉航埠下洲一帶以木奴為利然必為之澆灌修剔其實始繁今秋其地鞠為茂草而蓬蒿滿目中仍有橙黄橘緑之景一可異也稻麦及菽不種而生穎而栗者至於如墉如櫛遺􅕗滯穗少為難民之利二可異也或以為上天好生無盡殺之故而余以為不然天果好生則意在不殺何待於盡且天果好生則宜止殺而止殺之道在多生好生之人而不生嗜殺之人盖嗜殺之人少則天下皆得其生矣好生之人多則天下皆免乎殺矣故曰願人常行好事願天常生好人不此之務而喜兵好亂實繁有徒聽其磨牙舕舌殺人如麻而莫之禁於是死者肝腦塗地生者家室流離然後乃出其奇以拯於燼消澌滅之餘天亦可謂惠而不知為政矣或又以為刼運所逢天亦無奈子何怨之深也余曰詩云昊天不傭降此鞠凶昊天不惠降此大戻又云謂天盖高不敢不跼謂地盖厚不敢不蹐盖人有疾苦未嘗不呼天也如其有路余将不避虎豹之關而問之奚其怨沈維時石田之子也性嗜古器物書畫遇名品摩撫諦玩喜見顔色往往傾槖購之菑畬所入足以資是縹囊緗帙爛然充室而襲藏惟謹對客手自展列不欲一示非人至尋核嵗月甄品精駮厯厯有據江南賞鑒家咸推之又喜積書讐勘勤劇曰後人視非貨財必不易散萬一能讀則吾所遺厚矣錢孔周所與遊唐伯虎徐昌榖湯子重王履約履結文徴仲室廬靚深嘉禾秀野性喜蓄書每併金懸購故所積甚富山經地誌稗官小説無所不有遇有所得隨手劄記積數巨帙文先生極重之冩贈碧梧高士圖兩公皆呉人雅人深致迄今相見如對清泉白石令人滓穢俱消黄山谷云世人惟俗不可醫余謂書兩公事為一紙燒成一劑用佳茗送下或可以療但恐已入膏肓縱有純灰十斛不能若頭風之易愈耳宋羅景綸先生有方寸地説取俗語但存方寸地留與子孫耕二句而衍之也其言親切而有味載所著鶴林玉露中併其全集皆堪諷覽西家之東即東家之西我往彼亡紂以甲子亡周不以甲子興乎卜以决疑不疑何卜事之可否當斷于心何以禱為為此言者胷如鏡眼如電膽如箕不假思維衝口而出有斬釘截鐡解牛破竹之力彼青烏赤庭家雖有百喙於何處更進一語帝王之興以德為瑞而不在於星雲海嶽鳥獸草木之奇自昔人好異而有流虹繞電麟遊鳯巢草生魚躍等語記事之家不能削去益滋後世虛誣誕妄之習而草澤之間且有假其事以惑愚民而成亂堦者善乎劉子𤣥史通之論書事也曰祥瑞之出非闗理亂盖主上所惑臣下所欺故德彌少而祥彌多政愈劣而祥愈盛是以桓靈受祉比文景而為豐劉石應符比曹馬而益倍史官徴其謬説録彼邪言真偽莫分是非無别其煩一也盖説瑞稱祥其謬易見而從古及今鮮有一斥其非者子𤣥之論豈非千古卓識黄山谷與其甥洪駒父書有云尺璧之隂常以三分之一治家以其一讀書以其一為棋酒公私皆辦矣黄長吉曰公私皆辦語殊近情使人躍從而余以為最易誤人之語也盖子弟資性中下者多終朝閉戸尚恐坐馳况於飲酒著棋乎邇有一擢高第者先是曽以優為戱一時少年輩不問其人學殖何似也棘闈乍蹶輒謂取科第無事嘔心但如某者止以豪華跌宕之氣掇若承蜩耳於是與卷帙漸踈至於流蕩而忘返而其蹭蹬不得志也日益甚然則山谷之意以駒父之天分髙而識力定雖分其功於棋酒而不受其累觀其目之為江南千里駒可見矣故其言如是茍非其人而又有家棅之責則一日之内繼之以夜以一分治家二分讀書棋酒之興偶一為之餘皆閉目與口勿貽濡首之悔可也張魯祖陵客蜀學道鵠鳴山中造作道書以惑百姓從受道者出五斗米故世號米賊陵死子衡行其道衡死魯復行之㨿漢中以鬼道教民自號師君孫恩世奉五斗米道叔父㤗師事杜子恭有秘術泰伏誅恩逃入海衆聞泰死皆以為蟬蜕登仙故就海中資給恩恩冦臨海為太守辛景所破窮蹙自投於海而死妖党及妓妾等皆謂之水仙從死者以百數隋宋賢善為幻術自稱彌勒出世每夜樓上有光明能變作佛形又懸大鏡於堂上素紙上畫為蛇為獸及人形有來禮謁者轉側其鏡遣觀來生形像或暎見紙上蛇形子賢輒告云此罪業也當更禮念又令禮謁乃更人形示之逺近惑信日數千百人遂潜謀作亂将為無遮佛㑹因舉兵欲擊乗輿事泄鷹揚郎将以兵捕之夜至其所遶其所居但見火坑兵不敢進郎将曰此地素無坑止妖妄耳及進無復火矣遂擒斬之以上諸賊自古及今往往有之而愚者為其所惑遂至狓猖有御民之任者所宜防微杜漸嚴行左道之禁止亂在於未形其功較易耳郎将惜不記其姓名三國志魏書所載濟隂王思盖濟隂人姓王名思也往見讀史快編以思為魏宗室而濟隂乃其所封之地遂以曹為姓而直曰曹思云云其誤甚矣吾鄉藏書之富如余四泉徐賓梧葉寅陽方孟旋徐魯人徐雲林諸先生余繩之式如昆季充棟汗牛不數惠車張乗雖余家無賜書而四十年間典衣縮食忍凍與飢而購之者大國壇坫之下稍足附江黄焉革代以來諸家所蓄散亡者不少然收合餘燼尚可成師不意此番之變雖有汲冡魯壁為之一空後來子弟誰復知有鄴架曹倉之盛者吾願繼起之彦拓開眼界雖力不能購亦效編蒲織栁日營未見之書慎勿以劒首一吷坐井觀天而口誦芝蔴通鑑自矜博覽也唐華原栁氏自公綽公權開家其後若仲郢若璞若桂若璧若玼皆有家法公權太醫箴玼家訓並宜録置座右使烏衣子弟讀之毋令以賣綾絹牙郎為其婢所笑明况鍾始由小吏㧞為郎宣德間以三楊特薦為蘇州守宣廟賜璽書假便宜治郡政聲赫然為明時郡守之最王晉溪曰司衡者要識㧞真才而用之甲未必皆優於科科未必皆優於貢而甲與科貢之外又未必無奇才異能之士必試之以事而後可見云云厯觀况公治蹟益知王公此論不甚河漢或曰甲與科貢之異途自文章始也然即以文論而科亦有優於甲貢亦有優於科與甲者又不待試之以事而後見也而以一日之遇遂判終身卒無見根知花越格以相視者何哉余不能答眉公云凡祖諱及名臣與鄉邦先達名字皆當牓帖壁上恐子孫奴𨽻有因而相仍者不可不慎楚昭王時有雲如衆赤鳥夾日以飛三日楚子使問諸周太史太史曰其當王身乎若禜之可移於令尹司馬王曰除腹心之疾而置諸股肱何益不榖不有大過天其夭諸有罪受罰又焉移之遂勿禜初昭王有疾卜曰河為祟王勿祭夫人請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不榖雖不徳河非所獲罪也遂弗祀孔子曰楚昭王知大道矣其不失國也宜哉𤣥㝠子曰不禳妖不祭河二事可見楚子于死生禍福理上看得十分透徹非惟可以破衆惑補世教進此便入死生不二之門矣此孔子之所以嘆為知道也左傳國語吳越春秋越絶書史記諸書所載吳越兩國君臣情事皆若冩生而國語中夫差刼盟文種倡謀伐吳数段古藻非常讀之令人驚心動魄尤為諸作之冠古人文字刻畫有若百錬千鎚握槧家對之如覩三代鼎彛六朝金粉一時無色松江徐養齋居鄉每過徃還之家見陳設過盛則惨然不樂遂不舉箸或勸之則曰吾今日心齋當茹素也里中從公之化稍稍崇儉葉文莊公水東日記云吾平日行李出入未嘗有意擇日每為同事將官中貴所懇留聞士大夫喜談星命者亦頗厭之近見富鄭公以禄命不利稱病歐陽公避五月不上官古人乃爾豈亦未能免俗耶余性多偏文莊公所云不擇日不談星命兩事亦頗有之然自謂古人今人中相合者甚少不意文莊公早已為之矣余之瑣瑣豈敢妄效前賢但得一二同心者差可以自堅耳明孝宗嘗問一内侍云今各衙門官每日早起朝叅日間坐衙其同年同僚與故鄉新舊亦湏燕㑹那得工夫飲酒内侍答云常是夜間飲酒孝宗曰各衙門差使缺人若是夜間飲酒騎馬醉歸那討燈燭今後各官飲酒回家逐舗皆要籠燈傳送兩京盡然雖風雪寒凜之夕半夜呌燈未嘗缺乏孝廟之體恤羣臣偹極如是然余以為當日各衙門官亦皆能體人主優恤臣下之意而兢兢守法則可耳倘因是而流湎無節則半夜呌呼民受其擾反為逐舖之累矣吾邑有廟奉景祐真君額曰忠烈幞頭金甲目睅而靣藍襍以白圏紅㸃如世所扮鬼王之狀相傳以為張睢陽也殊可駭異嘗見桂林辨疑三事其一以為桂林屬邑有周文王泰伯孟母漢髙祖張良韓信等廟莫究所以及觀建武誌邕州亦有髙祖廟云馬伏波征蠻酋長請降願朝漢天子于是立髙帝廟以祠之又父老相𫝊云宋胡穎守潭専毁淫祠惟前代帝王及忠臣烈士祠不毁後穎轉官廣西鄉人聞風皆以淫祠易以帝王名臣之號幸免一時相𫝊至今遂不能改以其所言近理彼溺于淫祠者尚當省哉云云以是觀之則忠烈之稱或假睢陽以為名亦未可知然邑北之項山有項王廟而四鄉野廟無不奉楚霸王像者又不知何故宋崇寜大觀間蔡京當國設元祐正人黨籍之禁蘇文忠公文辭字畫存者悉毁之人莫敢讀其文政和中建上清寳籙宫齋醮之儀偹極誠敬徽廟毎躬造焉一夕道士拜章伏地踰數刻乃起叩其故對曰適至帝所見奎宿奏事良乆方畢臣始能逹上帝頗嘆異問奎宿何如人其所奏何事曰所奏不可得聞言此星宿者故端明殿學士蘇軾也帝為之改容遂弛其禁友人偶談及此謂余不信隂陽者如此等事真耶否耶余曰此道士必能敬慕蘇公者故偽其事以動帝聽不覺聳然盡改前事耳時帝奉道教方極其誠而道士伏地狀及見帝而奎宿奏事等語皆易入其耳或在事之臣有隂為此計而囑道士為之亦未可知也又常州報恩寺僧堂新成以板為壁公題寫幾遍後黨禍作凡公之遺墨所在搜毁寺僧以厚紙糊壁塗之以漆字頼以全至紹興中詔求蘇黄墨跡時僧死久矣一老頭陀知之以告郡守除去漆紙字畫宛然臨本以進老頭陀得祠曺牒為僧盖公之片辭隻字人皆愛而䕶焉若是道人與此僧事皆可傳惜不記其名也雙橋隨筆卷十二
