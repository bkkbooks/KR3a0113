body:
  text: 雙橋隨筆卷八鳳縣知縣周召撰凡人作用可預卜於無事之日謝元之伐苻堅也論者以為必濟蓋觀其平時履屐之間皆得其任耳悠悠忽忽土木形體此輩人正當束之髙閣况曹蜍李志奄奄如在泉下者乎漏泄陽春爹娘搬販至今未休吐百種鄉談千般扭扮一生人我幾許機謀有限光隂無窮活計汲汲忙忙作馬牛何時了覺來枕上試聽更籌古今多少風流想蠅利蝸名誰到頭看昨日他非今朝我是三回拜相兩度封侯採菊籬邊種花圃內都只到邙山一土邱惺惺漢皮囊扯破便是骷髏此元吳仲圭畫骷髏而題其上者先生以畫為元四大家之一而又能詩能書讀此辭董𤣥宰稱為錚錚人物不虛也余慕先生久而於去歲幸獲其真蹟一卷前書篔簹谷記而以偃竹數種繼之咏以絶句真墨寶也余珍之甚而今春忽遭瑣尾之憂未卜可與趙子固水中褉帖共稱無恙否暑極讀先生見徹之語如身濯氷壺中因并記之以示後人之善收藏者明宣廟時兩宫火藏金流入銅中鎔而為爐故後世僞造者逈不能及余於漢中得宣爐一或以為真物也余不能辨當珍之以俟賞鑒家耳袁忠徹二壻一為盜死獄中一覆舟死於水二女皆寡忠徹每談相則妻必叱云莫訛言且相壻之目何在曰吾能人相不能天相也然則不能天相可見死生禍福權在於天而人不能與亦惟修身以俟之而已又何必紛紛然以風鑑鳴於當世也哉吕文穆公未第時薄逰一縣胡旦方隨其父宰是邑遇吕甚薄客有譽吕者曰吕君工於詩宜少加禮胡問詩之警句客舉一篇其卒章曰挑盡寒燈夢不成胡笑曰乃是一瞌睡漢耳吕聞之甚恨而去明年首中甲科使人寄語胡曰瞌睡漢狀元及第矣胡答曰待我明年第二人及第輸君一籌既而次榜亦首選兩人相見俱甚赧余謂此等氣量此等口吻殊為可笑如淺狹輕狂之輩時或有之胡旦不足惜豈有重厚如文穆而與人爭長論短不能自持若是哉凡記事之書如此類者不可輕信至寃却古人宋徽宗亦有明白處宣和元年十一月乙未知溫州蘇起奏臣昨謹將耕藉詔書刻石被以雲鶴安奉㕔事仍行下四縣依此施行自此風雨調順禾稼盛茂既已收穫枯荄又復生穗每畝得榖至一擔七八斗乞令諸路州縣效此施行帝覽奏不樂云起諂佞一至於此何以警在位其華飾手詔豈不是相侮可送吏部嗟夫稱祥說瑞借以媚君而其實以君為可誑相侮二字窺破小人之膽矣陳后山好苦吟每登覽得句即急歸卧一榻以被䝉首家人知之即猫犬皆逐去嬰兒稚子亦皆抱持寄鄰家待其起就筆硯即詩已成乃敢復常此等家人最是難得想亦盡知作詩甘苦者不然何以幫襯若是明賀公欽成化丙戌進士號醫閭先生與人言論侃侃白沙先生曰得毋鋒芒太露乎須涵養令深沉和平乃為美耳於是作書室於後圃遍書深沉和平向上之語於目前令有警惕必期至是乃已前輩之待相知諄諄告誡若此而受言如賀公則又遍書以自警皆非後人所能及陳子昻初入京不為人知有賣胡琴者價百萬豪貴傳視無辨者子昻突出顧左右曰輦千緡市之衆驚問答曰余善此樂皆曰可得聞乎曰明日可集宣陽里如期偕往則酒肴畢具置胡琴於前食畢捧琴語曰蜀人陳子昻有文百軸馳走京轂碌碌塵土不為人知此樂賤工之役豈宜留心舉而碎之以文軸遍贈會者一日之內聲華溢都下馮猶龍曰唐人重才雖一藝一能相與驚傳讃嘆故子昻借胡琴之價出竒以市名而名果成矣若今日不惟文軸無用處雖求一聽胡琴者亦不可得惜哉先生此語殊多感慨然余謂更有甚焉者子昻擕百軸文馳走京轂又有千緡碎琴酒肴畢具之力故能出竒市名耳若夫單寒之士交逰無計株守寒窗雖抱矕龍繡虎之才身坐井中何由自見然則世之工於文而苦湮沒不彰者欲裝文軸而買胡琴已不可得矣何暇冀人之一賞其技也哉吕需號水山唐栖人老而負俠骨徐文貞客也當新鄭與文貞修怨時嘗僞為徐使者持文貞書而謁新鄭新鄭與之酒食不敢以勺粒下口至哀泣號訴達於新鄭之內夫人乳媪以下無不感動垂涕者皆為文貞潜解之而新鄭之意亦倦遂得書以復文貞而其禍始解昔牛僧孺與李德裕交惡李氏客不敢言及李丞相門戶如吕需者肯為文貞持書而且哀泣號訴以致其事之獲解賢於李氏之客遠矣宋子京餘酲猶在而遽為極其詆斥晏公之制以視水山寧不愧耶戰國之士反覆傾險蔑棄彛倫不知孝弟為何物矣善乎趙諒毅之說秦王也秦王謂毅曰趙豹平原君數欺弄寡人趙能殺此二人則可若不能殺請率諸侯受命邯鄲城下毅曰趙豹平原君寡君之母弟也猶大王之有葉陽涇陽君也大王以孝治天下衣服之便於體膳啖之嗛於口未嘗不分於葉陽涇陽君葉陽涇陽君之車馬衣服無非大王之服御者臣聞之有覆巢毁卵而鳳凰不翔刳胎焚夭而麒麟不至今使臣奉大王之令以還報敝國之君畏懼不敢不行毋乃傷葉陽涇陽之心乎秦王曰諾受幣而厚遣之以虎狼之秦而毅乃獨陳孝弟之理根極人情以暢其說雖鷙如昭王亦心折焉孟子而後毅亦朝陽之鳴鳳也哉王無功有田十六頃在河渚間奴婢數十自課種黍春秋釀酒養鳬㕍蒔藥草自供與仲長子光服食養性欲見兄弟輒渡河還家逰北山東臯著書自號東臯子所享若是何假南面百城文人不可無品立心未端不覺形之紙上使旁觀者掩口能無顔甲金陵吳某詩人也有元日懷嚴分宜相國詩一友見之笑曰開歲第一日懷朝中第一人似此便做到臘月晦亦未懷及我輩也至今傳之以為笑柄蓋此等著作出以示人惟欲假之以增光寵耳充其肺腸何所不至但不知分宜平日亦曾念及此公否輕言輕諾輕信輕怒輕動輕交輕下筆總是一輕天下禍患皆自此起故穩重嚴慎者到底禍患不能及也閩中武夷山有小桃源居萬峯之中秀色環抱石門一徑可杜而絶其中豁然别一天地有田有水又有村落可為伴伍養蜂蒸楮可以為生鵝鴨雞豚可以自給山冦所不及海賊所不到謝在杭以為武陵避秦之地未必勝此吾鄉遭亂以來避冦之人窮谷深山奔匿殆遍而迄無一家免於剽掠者安得有如小桃源者暫為家室耶晉阮裕奉佛法敬信甚至大兒年未弱冠忽被篤疾兒既是偏所愛重為之祈請三寶晝夜不懈謂至誠有感者必當䝉祐而兒竟不濟於是結恨釋氏宿命都除欲以奉佛至誠免兒一死可謂愚甚然猶恨而知改世有己見其不靈而崇奉之心牢不可破者其惑溺尤在阮裕之上真可笑也多讀書而不受書障方得理路透明老涉世而不參世機方得人情爛熟人不可無道心不可作道貌人不可有世情亦不可忽世情此真深於明理之言薛文清曰為學不是虛談道理須於應事接物處隨在詳審每日不問大事小事處置合宜便是學問到處若泛觀天下之書而不知善處事物究於實何補吾衢先輩袁公采有世範一書所論物理人情齊家修己之事甚備其書不另見而刻於唐宋叢書中余才閲數則即斂襟起焚香讀之奉為桑梓典型方欲拈出以示兒輩而適遭世亂亦為有力者負之而趨矣不知何日尚能再購捧置案頭一誦否也金主雍在諸帝中最為賢主以夫人烏凌噶氏守節而死終身不立后雅尚儉素命宫中之飾勿得用黃金嘗謂近臣曰朕於宫室惟恐過度其或興修即損宫人歲費以充之至於佛法尤所未信梁武帝為同泰寺奴遼道宗以民戶賜寺僧復加以三公之官其惑深矣又曰亡遼日屠羊三百亦豈能盡用徒傷生耳朕每當食時嘗思貧民饑餒猶在己也彼身為惡而口祈福何益之有其他名言卓識有關治道者甚多中土之君有未能窺其一二者對之能無慚色吕文穆有知人鑒富言者文穆客也一日入白曰兒子十許歲欲令入書院事廷評太祝文穆許之及見驚曰此兒他日名位與吾相似而勳業遠過於吾令與諸子同學供給甚厚言之子即弼也後弼兩入相亦以司徒致仕果如其言眉公巖棲幽事有云不能卜居名山即於陵阜回復及林木幽翳處闢地數畝築室數楹插槿作籬編茒為庭以一畝䕃竹樹一畝栽花果二畝種瓜菜四壁清曠空諸所有畜山童灌園剃草置二三胡牀著亭下挾書研以伴孤寂攜琴奕以遲良友凌晨策杖抵暮言旋此亦可以娛老矣余無力買山惟願得境如此老眼婆娑足怡晚景而再遭離亂遠隔家園幸緣蔦蘿之芘假以書室數楹地處衆山之麓老樹參差鳥聲嚦嚦紙窗布幕净几無塵一編少倦則携鐺出就泉石箕踞長松下看友人對奕或拈險韻緩步搜詩與眉公所言相去雖遠亦避亂人一時佳境也但世故方殷家人婦子俱在量柴數米中時憂煎逼所謂俗物來敗人意無可奈何耳石才叔蒼舒與山谷從遊尤妙筆札家蓄圖書甚富文潞公帥長安從借所藏褚遂良聖教序墨蹟一觀潞公愛玩不已因令子弟臨一本休日宴僚屬出二本令坐客别之客盛稱公者為真反以才叔所收為僞才叔不出一語以辨笑啓潞公云今日方知蒼舒孤寒潞公大噱坐客赧然凡人身處富貴之地趨附者必多擇人而交甚不可濫潞公稱為賢者而坐客如此皆蠅營蟻附之徒耳非才叔冷語逼人公在熱閙場中想亦未能看破也語云教婦初來教子嬰孩北齊安德王延宗髙文襄第五子母陳氏魏廣王妓也延宗幼為文宣所養甚愛之年十二猶騎置腹上令溺己臍中抱之曰可憐止有此一個封定州刺史於上大便使人在下張口承之後為周武帝見擒誣反以椒塞口而死宣和間芒山有盜臨刑母來與之訣盜對母云願如小兒時一吮母乳死且無憾母與之乳盜嚙斷乳頭流血滿面母死盜因告刑者曰吾少也盜一菜一薪吾母見而喜之以至不檢遂有今日故憾殺之嗚呼孟母擇居近於學宫而後定而曾子不敢以言戲其子義方之訓必早豫於未雕未琢時而徒懷䑛犢之愛使之習與性成而不可救人子之不肖為父母者豈盡無過滇俗崇釋信鬼鶴慶元化寺稱有活佛歲時士女會集動數萬人爭以金泥其面林俊按鶴慶命焚之父老爭言犯之者能致雹損稼俊命積薪舉火果雹即止火發無他遂焚之得金數百兩悉輸之官馮猶龍曰五斗米白蓮教之禍皆以燒香聚衆為端有地方之責者不得不防其漸非徒醒愚救俗而已夫佛以清净為宗寂滅為教萬無活理且言犯者致雹此山鬼伎倆佛若有靈肯受人誣乎即果能致雹亦必異物慿之非佛所致也况邪不勝正異物必不能致雹火舉而雹不至大衆亦何說之辭哉云云余謂林公此舉極善而猶龍先生之論亦甚侃侃然尚有可慮蓋處天下事斷之以理而已若必待不雹而後可焚則事之偶然凑合者原不可必萬一方焚而雹適至則其令須寢而父老益將張大其威靈以為驚世駭俗之實據佛之為害於是乎愈不可挽矣善乎第五倫之治會稽張詠王曾之禁訛言與錢元懿之斬巫媪也第五倫為㑹稽守會稽多淫祀好卜筮民常以牛祭神百姓財産以匱其自食牛肉而不以薦神者發病且死先為牛鳴前後郡將莫敢禁倫到官移書屬縣曉告百姓其巫祝有依託鬼神詐怖愚民者案論之有妄屠牛者吏輒行罰民初頗恐懼以祝咀妄言倫案之愈急後遂斷絶百姓以安張詠知成都民間訛言有白頭老翁過食男女詠召其屬使訪市肆中有大言其事者但立擒解來明日得一人命戮於市即日帖然詠曰訛言之興沴氣乘之妖則有形訛則有聲止訛之術在於明决不在厭勝也天禧中民間訛言有妖起若飛帽夜搏人自京師以南人皆恐王曾令夜開門敢倡言者即捕之卒無妖錢元懿牧新定一日閭里間輒數起火居民頗憂恐有巫楊媪因之遂興妖言曰某所復當火皆如其言民由是競禱之元懿謂左右曰火如巫言巫為火也宜殺之乃斬媪於市自此火遂熄數公斬釘截鐵之手何等痛快吾里中士子異言異服婦女披緇持槵子修西方其老人年貌衰憊則問鼎器拜黃冠講嬰兒姹女養汞燒丹市井下戶炊半菽熟先飯沙門求福果而饑餓其父母與兒女家廟則奉佛修羅天神人鬼而黜祖考世教民風既至此矣足下勿更益薪改步而趨就平易使下里愚氓信足下無他則人我蕩蕩平平偕之大道希聖希天何以加此此郝楚望先生與田肖玉書也今日人心風俗之壞多坐此病焉得當事者刋布此書使家諭而戶曉乎林唐翁曰檜亡東周之始曹亡春秋之終夫子之刪詩也繫曹檜於國風之後檜之卒篇曰思周道也傷天下之無王也曹之卒篇曰思治也傷天下之無伯也觸情縱欲謂之禽獸茍可而行謂之野人安故重遷謂之衆庶辨然否通古今之道謂之士進賢達能謂之大夫敬上愛下謂之諸侯天覆地載謂之天子是故士服黻大夫黼諸侯火天子山龍德彌盛者才彌縟中彌理者文彌章也明仁宗好學右文詞翰兼精尤喜科舉之業在青宫已然踐阼猶不廢每得試録必指摘瑕病手標疏之以示臣工嘗戲語人曰使我應舉豈不堪作狀元天子憲宗受終日英宗遺言不用殉葬宫嬪故憲宗賔天亦有是命王敦如厠誤食甘棗澡豆王安石禁中與宴食釣餌盡楪仁宗言其詐仁和學師茹芮有人餽龍涎餅一盒不知為香每席各供一楪自既餐盡復勉强勸人食之衆皆掩口而不敢言止稱其美而袖之昔人一事不知以為深恥如王敦茹芮實為可笑若安石者豈有見釣餌而不識者乎乃終被仁宗看破何苦乃爾屏之張也直則不可立必也回而曲之輪之轉也方則不可行必也揉而圓之處世亦然故屏必有輻輪必有軸屏雖欲曲不可不齊輪雖欲圓不可不正君子自處也亦然此于榖山璅言也士君子不幸而處末流之世不曲不圓則出門有礙而天地為之不寬然圓曲之中而終不失其齊與正然後可以立身可以應物今日之人但求屏之立輪之轉耳後半截語置之腦後矣烏乎可唐𤣥宗御五鳳樓觀酺宴令三百里內刺史縣令各以聲樂集樓下時多以車載樂工數百皆衣文繡服箱之牛皆為虎豹犀象之狀魯山令元德秀惟遣樂工數十人聯袂歌于蒍而己于蒍者德秀所為歌也宋時聖夀日州縣皆集僧道誦經惟陸象山令儒生講洪範皇極錫福一章時議韙之載聲樂衣繡以逢君集僧道誦經以媚主一時情狀如戲如癡不復知有帝王賢聖之道矣得魯山象山兩先生差為儒臣吐氣屠長卿喜談𤣥馮開之每以為譏而已則溺於西方之教口角津津其與長卿書云談𤣥者紛紛甲乙可否迄無定論秦皇漢武竭天下以奉之不足徒為後世笑何况我輩請以一丸泥封户而專意無生之業云云其為人謀也如此然獨不思梁武帝奉佛至於捨身而不惜而其得禍也為更慘又豈止秦皇漢武為人所笑乎身在夢中而又笑他人之囈語以先生之人品學問文章亦復乃爾真不可解也三國志非僻書也而世人多以為演義雖以季長沙之學亦用明燭達旦等語以為文徐文長曾有書言之馮開之先生日記內有曰余以嘉善于丞之任有書相聞所寄三國志乃是俗本演義向在南都一北臺使者見問所刻三國志得非演義乎余微笑語其實何獨一丞云云蓋今之以演義為三國志者比比然矣又何止一丞哉噫桓榮讀書十五年不窺園何休十七年不窺門劉炫劉焯十年不出戶徐遵明六年不出門齊沈麟年過八十手寫書滿數十篋徐廣年過八十猶歲讀五經一遍陳瓉年踰九十猶勤筆硯著經史系華十卷拔巖徒而相恐其駴也夢以先之載釣叟而師恐其疑也卜以先之聖人不得已而喻愚俗也不知者以為真夢而娃嬴進矣筮而驪姬進矣常疑公家文移自上行下者用一仰字而不知其解偶見孔氏雜說謂北史時已有此語北齊孝昭皇帝紀詔定三恪禮義體式有仰議之語然亦未解其義也雙橋隨筆卷八
