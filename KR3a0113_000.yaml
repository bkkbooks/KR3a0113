body:
  text: 雙橋隨筆儒家類提要臣等謹案雙橋隨筆十二卷國朝周召撰召字公右號拙菴衢州人康熙初官陜西鳯縣知縣是編乃其甲寅乙卯間值耿精忠搆逆避兵山中所作雙橋者其山中所居地也卷端標曰受書堂集而以雙橋隨筆為子目殆全集中之一種歟前有自序稱老生常談誠不足採而藥石之言原以針砭兒輩與世無關所自矜者集中大意在于信道而不信邪事人而不事鬼言理而不言數崇實而不崇虗竊以為獨立之見若中流一砥云云雖自詡似乎太過而所言皆崇禮教斥異端于明末士大夫陽儒陰釋空談性命之弊尤言之深切于人心風俗頗有所禆惟其隨筆記録意到即書不免于重復冗漫又適逢寇亂流離奔走不免有憤激之詞往往歸怨于天是則其學之未粹耳乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀雙橋隨筆原序生平株守戶外罕窺鳳嶺賦歸則益杜門訪古以課兒輩為事兒鴻舉業外旁治詩歌古文辭姪暨幼孫初攻八股容膝數楹焚香篝燈咿唔聲丙夜不絶余從枕上聽之意甚適也無何閩警陡聞山魈蝟起一時訛言騰嚇闤闠之衆倉皇出城余未嘗為動而老稚相向驚啼勢不能止遂亦携至雙橋僦數椽棲焉雙橋在萬山中又有清流激湍茂林修竹之勝汲泉掃石儘堪自娛奈田廬榛莽糊口無資又在魚睨鹿駭時則終朝仰屋而嘆不復能唱渭城矣然而結習難拋窮鬼未送一門傖腐非作老蠧魚消此雙丸張口蒙然欠伸足愧此時圖書滿架已遭六丁攫去作烏有先生又無可以酬一鴟者乃搜索枯腸有平時記誦略皆上口者隨意録之參以管見而此身閲歷世故人情可悲可愕之事間亦贅焉自去夏迄今纊綃一周帙遂盈寸嗟乎當此炮火雷轟劍戟紛拿之際風聲鶴唳一夕數驚每一警聞女哭兒啼奔投無地而余猶戀戀負一破奚囊護兹數帙風雨踉蹌未嘗釋手蓋亦迂癡實甚供人嗢噱者矣惟是老生常談誠不足採而藥石之言原以針砭兒輩與世無關所自矜者集中大意在於信道而不信邪事人而不事鬼言理而不言數崇實而不崇虛竊以為獨立之見若中流一砥手畀兒輩以代籯金時置案頭勝飲清酒三升壯其膽識則於闡揚聖教扶進人心之際不無少補焉綴以為編意在乎此康熙十五年歲次丙辰仲冬月拙庵周召序
