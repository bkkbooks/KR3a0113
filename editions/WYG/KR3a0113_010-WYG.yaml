body:
  text: 雙橋隨筆卷十鳳縣知縣周召撰唐明皇其初英明之主也至天寳以後但見神魂惝恍終日做夢而已試一述之一山人王𤣥翼上言見𤣥元皇帝言寳山洞有妙寳真符命張均等求之一楊國忠奏有鳳凰見左藏屋一夢𤣥元皇帝云吾像在京城西南百餘里遣使求得之於盩厔迎置興慶宫一陳王府參軍田同秀言𤣥元皇帝告以藏靈符在尹喜故宅遣使求得之羣臣上表以寳符潛應年號請於尊號加天寳二字一清河人崔以清言見𤣥元皇帝云藏符在武城紫微山勅使徃掘亦得之一謂宰臣朕於宫中為壇為百姓祈福自草黄素置案上俄飛昇天聞空中語云聖壽延長又煉藥成置壇上及夜欲収又聞空中語云藥未須収此自守䕶羣臣表賀一云𤣥元皇帝降於華清宫之朝元閣一太白山人李渾等上言見神人言金星洞有玉版石記聖主福壽之符命王鉷求獲之一孫思邈廬峨嵋山聞鑾駕至蜀特來候謁求賜雄黄一羅公逺拄杖為橋請登月宫見仙女數百舞廣庭聽霓裳羽衣曲盖明皇之夢至馬嵬坡始覺世人之好神仙佛老者請細觀之庶免作癡人説夢作文之法譬如城市間物種種有之欲致而為我用有一物焉曰錢得錢則物皆為我用作文先有意則經史皆為我用此東坡教人作文法也自昔名賢嚴於輩行尤篤通家之好子弟見父執必拜或立受或答半禮或以排年或稱小字書問以從表兄叔自處今則拜禮施諸顯官則有佞貴之嫌為父執者亦恐憑藉而為我累通家之契替矣神慮淡則血氣和嗜慾勝則疾疹作唐處士張臯云是為養身之要宋范忠宣云惟儉可以助亷惟恕可以成德是為修身之要皆可銘於座右有䟦歐陽公小草者曰張湯逄君之惡賊殺不辜獨以推賢揚善有後於漢文忠公推賢揚善之功一時元宰鉅卿多出其門非湯所敢望其萬一而無湯之罪今其後止有選人三數軰又最困天之報施有時而爽可為慨嘆云云以余觀之文忠公生平詆佛而其子棐奉釋氏最嚴手持數珠念唄聲不絶客至輙謝以持齋不見有子如是極反其父之所為可謂肯構肯穫者乎宜其後之不競也然有謂文忠在時棐即有是僻而亦未嘗禁止之也殊不可解公存日夫人已持齋奉佛家人多效之而公不能禁天下事毎為婦人所壊宋孫莘老晩年病目乃擇卒伍中識字稍解事者二人使其子端取西漢左氏等書授以句讀每瞑目危坐室中命二人更讀於旁終一册則易一人飲之酒一杯使退其喜讀書也如是宋元豐末學者各崇虚誕章子厚極惡之嘗延一太學生在門下子厚一日適至書室見其講易略問其説其人縱以性命荒忽之言為對子厚大怒曰何敢對吾亂道亟取杖命左右擒欲擊之其人哀鳴乃得釋此一事在子厚未免太暴然待此等人亦當如是凡事變起於意外須靜以鎮之而緩為圖宋文潞公知成都偶大雪喜之連夕㑹客達旦帳下卒倦於應待有違言忿起拆其井亭共燒以禦寒守牙軍將以聞公曰今夜果寒更有一亭可拆以付餘卒復飲至常時而罷翌日徐問先拆亭者何人杖脊配之臨事若此始無意外之慮然非胆智器量裕於平時者倉卒之間不能無悞也晏元獻雖早富貴而奉養極約惟喜賓客未嘗一日不宴飲而盤饌皆不預辦客至旋營之初但人設一空案一杯既命酒果實􅂼茹漸至亦必以歌樂相佐談笑雜出數行之後案上燦然矣稍闌即罷遣歌樂曰汝曹呈藝已遍吾當呈藝乃具筆札相與賦詩率以為常前輩風流如是嗟乎後世之人得毋以冷淡生活為苦與斯選者有如矍相之圃乎士人應試當臨塲之際皆擬主司必命之題而預為之甚有盡録他人舊作不改一字而獲售者昔晏元獻為童子時張文節薦之於朝召至闕下適御試進士即令公就試公一見試題曰臣十日前已作此賦賦草尚在乞别命題及為館職時天下無事許臣僚擇勝宴飲當時侍從文館士大夫為燕集以致市樓酒肆徃徃皆供帳為遊息之地公是時貧甚不能出獨家居與昆弟讀書二事聞於上眷注日深仁宗朝卒至大用余不能拒里人之請為撰建三官廟䟽而謬以天地水之有禆於人為之辭所謂姑妄言之耳及聞菽園雜記其言三官所由始者曰漢熹平年間漢中有張修為太平道張角張魯為五斗米賊而魯尤盛盖其祖陵父衡造符書於鶴鳴山制鬼卒祭酒等號有疾者令其身書名氏及服罪之意其一上之天著山上其一埋之地其一沉之水謂之天地水三官三官之名實始於此又為之評曰水為五行之一生於天而附於地非外天地而為物也今以水與天地並列己為不通之論若其使民服罪之書水官者沉之水地官者埋之地矣天官者既云上之天則置之雲霄之上可也却云著之山上然則山非地乎其誣惑蚩蚩之氓甚矣云云由是觀之三官之稱其誕妄也明矣乃吾邑男婦之持三官齋且相率為㑹甚多人之至愚一至於此宋杜君懿以許敬宗風字硯為潤筆物而求誌於孫莘老莘老笑曰敬宗在正堪磔以飼狗耳何以其硯為盖硯無字而匣有敬宗名東坡以為敬宗為姦時非硯所能知而哀其所遭之不幸則欲存其硯而棄匣以去敬宗之累微東坡硯幾以無罪廢人可不務修德乎哉朝廷設科取士亦必斟酌而定乃稽之古昔有最為可異者唐時有士子奔馬入都見者問其何急如此答曰欲赴不求聞達科宋天聖中置髙蹈丘園科許本人於所在自投狀求試夫不求聞達矣而奔馬入都髙蹈丘園矣而投狀求試上以是求而下以是應有例相沿恬不知怪使後世指為笑端真不可解也哲宗時范祖禹為諫議大夫聞禁中覓乳媪以帝年十四非近女色之時與左諫議大夫劉安世上䟽勸進德愛身又乞太皇太后保䕶聖躬言甚切至太后謂曰乳媪之説外間虚傳也祖禹對曰外議雖虚亦足為先事之戒凡事言於未然則誠為過及其已然則又無所及言之何益陛下寜受未然之言勿使臣等有無及之悔太后深嘉之盖豫教子弟一事甚不可緩帝胄猶然而况於大夫士庶之家乎未然之言凡有家者皆宜時時講習可也書有十體古文者黄帝史蒼頡所造也大篆者周宣王太史史籀所作也籀文者亦周太史史籀所作也小篆者秦始皇丞相李斯所作也八分者秦羽人上谷王次仲所作也𨽻書者秦下邽人程邈所作也飛白者後漢左中郎將蔡邕所作也章草者後漢徴士張伯英所作也向敏中拜同平章事進右僕射是日學士李宗諤當對帝曰朕自即位未嘗除僕射今命敏中此殊命也敏中應甚喜又曰敏中今日賀客必多卿往觀之勿言朕意也宗諤既至敏中謝客門闌寂然宗諤與其親徑入徐賀曰今日聞降麻士大夫莫不歡慰相慶眷依殊越何以至此敏中唯唯又歴陳前世為僕射者勲德禮遇之重敏中亦唯唯卒無一言既退使人問庖中今日有賓親宴飲否亦無一人明日具以所見對帝曰敏中大耐官職以僕射之榮加自天子而自視欿然畧不動意非大受之器豈能如是世有少伸寸步而不能自持遂有張皇無限者其度量相去何如也不羞老圃秋容淡且㸔寒花晩節香韓魏公在北門重陽詩也公嘗謂保初節易保晩節難故晩節事事尤著力所立特全崔公孺韓魏公妻弟也公執政用監司非其人則曰公居陶鎔之地宜法造化之心造化者以蛇虎害人之物故置蛇於菹澤置虎於山林今公乃置於通衢使為民害可乎公孺此語直㨗痛快安得書之銓部堂中使司衡者時時聳聽耶唐崔祐甫才能應變斷决朝事甚中機權神策軍使王駕鶴者典衛兵乆權震内外帝將代之懼其變以問祐甫祐甫曰是無足慮即召駕鶴留語移時而代者白志貞已入軍中矣朱泚軍中貓鼠同乳表其瑞詔示宰相常衮衮率羣臣賀祐甫獨曰可弔不可賀詔使問狀對曰臣聞禮迎貓為其食田䑕以其為人去害雖細必録今貓受畜於人不能食䑕而交乳之毋乃失其性耶貓職不修其應若曰法吏有不觸邪疆吏有不捍敵臣愚以為當命有司察貪吏誡邊候勤徼廵則貓能致功鼠不為害淄青李正己畏帝威斷表獻錢三十萬緡以觀朝廷帝意其詐未能答祐甫曰正己誠詐陛下不如因遣使勞其軍以所獻就賜將士若正己奉承詔書是陛下恩洽士心若不用彼自歛怨軍且亂又使諸藩不以朝廷為重賄帝曰善正己慚服議者韙其謨謀謂可復貞觀開元之治焉人之生育本於血氣血氣有盈與絀而子息之多寡難易以分焉非人力所能為也世人不察以為可以求而得於是有未有子而祈之神者有既有孕而又祈神轉而為男者有既生男而寄於僧道為乾兒以祈無災病者此皆惑之甚者也昔崔慎由晩年無子遇異浮屠以術求乃生湜字緇郎及為相其季父安􅅗唶曰吾父兄刻苦以持門戸終為緇郎所壊後果如其言嗟乎藉於僧而得子雖佳兒不足貴也况如湜之身屠宗滅者乎晉元帝生子普賜羣臣殷洪喬謝曰皇子誕育普天同慶臣無勲焉而猥頒厚賚中宗笑曰此事豈可使卿有勲耶此雖戯語世之祈子與為人祈子者皆可以發一笑矣明天順間桂廷珪者嘗館于門達家刻私印曰錦衣西席後松陵驛丞甘某洗馬江朝宗之壻印曰翰林東床一時𫝊笑以為的對瀋王府長史王庭病大便下血勢瀕危殆一日昬憒中聞有人云服藥誤矣喫小水好庭信之飲溺一碗頃甦遂日飲之病勢漸退勿醫而愈輪廻酒即人尿也人有病者時飲一甌以酒滌口乆之有效跌撲損傷胸次脹悶者尤宜用之婦人分娩後即以和酒煎服無産後諸病南京吏侍章公綸在錦衣獄六七年不通藥餌遇胸膈不利眼痛頭痛輒飲之無不立效鎻鑰人無如忿與慾者慾動水滲怒甚火炎懲之心火下降腎水上滋此亦吾儒坎離交媾功法何必仙家環碧小言八月某日盗刦大侯嶺嶺在萬山中居民樸野而翁姓者有一女姿容端麗年十四為賊所得繫其臂驅之女啼呼攀楣楣折加箠焉遂大罵曰賊狗吾寧從汝者耶亟斫頭去何以箠為揮刃擬之則延頸受賊怒其戇也乃斷其喉而死悲夫此萎然者村閨弱質耳至性所激甘死如飴彼徒㦸鬚眉者曷用哉余憐其遇欽其烈而恐其事之不𫝊也因記其畧以俟採風者習尚之誤不獨晉人以清談廢務明之中葉士大夫喜參禪説更有甚焉盖六經四子之義其事最實其理最明而一時論文講萟者必欲鑿以竺乾柱下之說謬妄虚浮茫無真際浸淫日乆人心盡壊而天下之事隨之矣善夫艾千子之評儲紫虚君子戒慎一節文也曰湯霍林評云道只有不覩原無覩所道只有不聞原無聞所於所不覩不聞常若有所謂覩有所謂聞則寂感並融能所雙遣更於何處説𤣥説禪如此評文真孔孟程朱之罪人也亦儲紫虚之罪人也不覩不聞即末君子之所不可及者其唯人之所不見乎一意耳偽楞嚴拾晉人之清談為佛書以欺後世講道瞀儒又拾偽佛書之唾餘以解聖賢之書如此題者真可恨也不覩而敬則凡覩之時可知矣不聞而畏則凡聞之時可知矣確然經𫝊何可指禪入評嗟乎佛老之害甚於楊墨昔賢曽言之矣其與吾道之不相洽也若氷炭然湯喜讀書冠進賢為時鉅宿而評語若是皆溺於一時之習而不覺形之口吻耳倘無明眼者力排其謬一往狂瀾孰為之砥東鄉數語有功於孔孟程朱者非淺真吾道之干城也語水陸雯若評廣東蕭俊予一以貫之文云夫子生知尚自語好古敏求其教人也則以博文約禮又曰下學而上達自金溪只空理㑹一貫以為先立其大者其時教至姚江而其説更熾初則以一貫廢學識繼則遁辭以先尋一貫而後學識則是先上達而後下學先約禮而後博文節節顚倒恐無此聖賢也朱子謂但主生知安行而學知以下一切都廢却貫箇甚麽談空浩瀚引得一輩士人都顚狂嗟乎誰生厲階至今為梗可悲可痛也此文獨能於學識中指出一貫實義真可䆒講學之失而文之髙爽俊偉足以達之云云盖孔孟之書其尊於天下萬世而不可廢者惟所言皆實理實學實心實事故也明末講學家喜談𤣥奧濫觴而後流入空門一時鉅宿名流若飲狂藥遂不可挽此評極中其病備録之以為羽翼經𫝊之助臧榮緒以夫子庚子日生凡庚日必陳五經再拜黄省曽亦以五經奉髙架上朔望拜之有拜五經文余嘗怪明嘉隆以後士大夫相率佞佛若癡若狂稱佛為師而以弟子自稱捧唄持齋僧跪膜拜無所不至盖其始也藉四子五經為進取之計洎乎獲售則置之髙閣有若芻靈誰復認孔孟為吾師爇瓣香一拜其座者盖其皈依西氏謂之䕶法而不知孔孟為何人語以臧黄二公事能無汗下揚州天長道中有古塜土人呼為琉璃王塜馬氏嬾真子録辨為漢廣陵王胥謚厲後人悞以劉厲為琉璃耳長安董仲舒墓門人至皆下馬謂之下馬陵譌呼為蝦蟆陵雙橋隨筆卷十
