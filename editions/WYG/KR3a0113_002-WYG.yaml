body:
  text: 雙橋隨筆卷二鳳縣知縣周召撰宋趙子固不樂仕進隠居州之廣陳鎮時載以一舟舟中琴書尊杓畢具往往泊蓼汀葦崖看夕陽賦曉月為事嘗到縣縣令宣城梅黻到船謁公公飛棹而去梅佇立岸上言曰昔人所謂名可聞而身不可見殆謂先生與王匡劉均合兵十五萬擊鄧禹禹軍不利諸將皆勸禹夜去明日匡等以六甲窮日不出禹因得以治軍勒衆明旦匡悉軍出攻禹遂為禹所破皆棄軍走禹遂定河東田单使人每食必祭以致烏鳶又故為神師以事之皆近兒戯無益於事盖先以疑似置齊人心中則夜見火牛足以駭動取一時之勝此其本意也世之巫覡假神鬼以欺愚人者皆然使火牛之筭無人道破必皆以為神兵助陣矣昔王凝之守郡甚信張天師道敵至但閉門不出謂自有隂兵可以擊賊而不設備遂遇害殷仲堪信天師道禱請鬼神不吝財賄好為小惠以悦人而短於鑒畧鄼城之奔為桓𤣥將馬該所殺隋麯稜守冀州其壻崔履行自言有竒術可使攻者自敗稜信之履行命守城者皆坐毋得妄鬬曰雖賊登城爾曹弗怖吾將使賊自縛於是為壇夜設章醮然後自衣衰絰枤行登北樓慟哭又令婦女升屋四向振裙竇建徳攻之急稜將戰履行固止之俄而城䧟履行哭猶未已唐越王貞起兵豫州武后命麯崇裕攻之貞使道士及僧誦經以求事成左右及戰士皆帶避兵符已而兵潰及其妻皆自殺慕容彦超據兗州周主攻之先是術者紿彦超云鎮星行至角亢兗州之分其下有福乃立祠而禱之彦超貪吝人無鬭志將卒多出降官軍克城彦超方禱鎮星祠力戰不勝乃焚祠赴井死五代馬希廣信巫覡及僧語為其兄希萼所攻乃塑鬼於江上舉手以却希萼兵又作犬像於髙樓手指水西怒目視之兵敗被執臨刑猶誦佛書癡人之可笑如此武人斷事明白痛快有出於文吏之上者安重榮為成徳節度有夫婦訟其子不孝者重榮拔劍授其父使自殺之其父泣不忍其母從旁詬夫奪劍而逐其子問之乃繼母也重榮為叱其母出而從後射殺之文吏執筆而斷豈能如此直截可謂長鎗大㦸安用毛錐鷄猪魚蒜逢着便吃生老死病時至即行此達者居易俟命之言所謂素位而行不願乎外也世人吉凶禍福横於胸中而星相卜祝堪輿隂陽諸家遂巧為之説以應之已有方寸是非可否不能自决而委其柄於揺唇鼓舌談天説地之人何其不明於理也如諏日一端更為瑣瑣事無大小非吉不行焉蘇州徐檢庵侍郎老而無子晚年一妾懐孕臨蓐欲産徐預使日者推一吉時以其尚早勸令忍勿生逾時子母俱斃王莽敗張竦客睢陽知有賊當去㑹反支日不去因為賊所殺二事皆可笑騃癡者當以為鑒孫莘老以文字問歐陽公公曰無他惟勤讀書而多為之自工世人患作文字少又懶讀書每一篇出即求過人如此少有至者疵病不必待人指摘多作自能見之東坡謂公以嘗試者告人故尤有味然則世之學為文字者可不書公此語朝夕誦味之哉文有似乎滑稽而於人倫日用之間大有裨益者義山雜纂是也中如教子教女須貧必富有智能失本體數則堪與家訓並垂其他雖畧近於謔而可以玩世可以醒世可以警世可以喻世所謂嬉笑怒罵皆成文章也余謂義山詩人耳而不知其透徹世故人情乃能如是至於王君玉之雜纂續蘓子瞻之二續黄允文之三續慧心巧舌愈出愈竒然但可謂風流雅謔而於堂堂正正處似遜一籌明嘉靖大禮之役張羅峯議論實有當於天理人情而不可易諸賢羣起而攻之義雖嚴而情未合而又過於激毋怪乎世廟之震怒而眷注羅峯遂邀爰立之典也其後何淵請立世室崇祀皇考於太廟羅峯力辯其非其心事可以白於天下後世矣其他則奉祀孔子之禮易王號而稱先師改塑像而為木主尤為卓絶上下數千年誰能見及此者又不可謂非相業之光也王元美先生云公博洽典籍所撰對班班可據其所以合非偶然也天下迫於議禮而口非公者什之九公貴而刺之者什之九久而稱公是非公者半公沒而思之者更什九矣有人雌黄黄九烟於海昌張先生之前曰此公無所不佳但微嫌其傲耳先生曰渠豈但傲更有一大病痛在其人􅌶然改容急叩之先生徐應曰無他渠病痛在不做官耳任渠傴僂磬折人祇以為傲耳其人始憮然而退嗟乎世態炎凉數言道破然悠悠此輩正須白眼視之耳即待之以傲又何足怪孝經可以止訟兼可愈疾昔王漸作孝經義成五十卷事亦該備而漸性鄙朴凡鄉里有鬭訟漸即詣門誦義一卷反為慚謝後有病者漸即請來誦書尋亦得愈有謂但誦孝經而賊自退者雖迂腐可笑然地義天經變薄俗而起沉疴未為不可君子亦論其理而已矣見怪不怪其怪自壊此語極得夫子不語怪之㫖唐魏元忠未達時一婢出汲方還見老猿於厨下看火婢驚白之元忠徐曰猿愍我無人為我執爨甚善又嘗呼蒼頭未應狗代呼之又曰此孝順狗也乃能代我勞嘗獨立有羣䑕拱手立其前又曰鼠饑就我求食乃令食之夜中鵂鶹鳴其屋端家人將彈之又止之曰鵂鶹晝不見物故夜飛此天地所育不可使南走越北走燕將何所之其後遂絶無怪韋斌聞鴞鳴而流涕李泌笑曰若以好音聽之便不足傷請飲酒不聞鴞音者浮以大白斌遂終夕不厭明張莊簡公悦元旦拜竈有家犬坐於竈上衆大詫公具官服拜竈如故未幾犬下竈遂死衆又詫公又如故此數公者雖使墮入羅刹鬼國三頭六臂之形獰狰滿眼亦不過有限伎倆况區區䑕竊狗偷之類哉長公喜聽人説鬼辭以不能則曰姑妄言之然則言怪者大約是妄耳吾有无妄之理存於中邪不勝正不待禳祛而自滅矣又何足畏明嘉靖間倭亂江南崑山夏生為倭所獲自稱能詩倭將以竹輿乘之令從行日與倡和竟免害久之夏生乞歸厚贈而返此倭將又非毆王轂者可比既知詩能倡和又有厚贈善作詩者豈盡無益然為夏生者應説倭將諷其主悔禍歛軍入貢庶不負此畨相遇葉石林每夜必延諸子女兒婦列坐説春秋聽者不悦翁又請余謂與家人言理不如説孝經小學大學論語曲禮内則諸書深切著明人人易曉或不以公為厭耳雖然詞義之明白切近未有如聖諭十六條者乃朔望宣讀時有同矍相之圃揚觶之後與者寥寥如聽古樂而惟恐卧奈何哉趙韓王為樞宻盧多遜為翰林學士一日偶同奏事上初改元乾徳因言此號從古未有韓王從旁稱賛盧曰此偽蜀時號也帝大驚遽令檢史視之果然遂怒以筆抹韓王面曰汝争得如它多遜韓王經宿不敢洗靣翌日奏對帝方命洗去韓王自謂以半部論語佐帝治天下太祖已誤陛下豈容再誤之語豈亦論語中學來者耶不能佐主齊其家而謂能治天下乎韓王原是花臉一筆之抹為之添糚耳雖命洗去然萬世而下終須障以褚淵之扇羞面見人文人之筆有離經畔道而啟人以誕妄邪滛之習者如女仙劍俠述異搜神靈鬼暌車北里平康比紅兒小名錄之類是也唐李圖史補序云言報應叙鬼神述夢卜近帷箔悉去之記事實探物理辨疑惑示勸戒採風俗助談笑則書之陳眉公云著書上者羽翼聖道次者磨礲身心又次者陶汰俗氣又次者資輔聰明又次者摩挱歲月有心撰述者當以二公為法即太平廣記艷異等書尚應多削以付祖龍况於連篇累牘其害人心術尤在風雲月露之上者哉王鳳州贈人艶異編晚年令人於各處索還亦是善於改過處宋真宗東封之謬王旦不能諫止且為帝謀以朱能所獻天書令冦凖上之凖依違其間復召入相將發之日門生有勸凖者曰公若至河陽稱疾堅求外補此為上䇿倘入見即發乾祐天書詐妄之事此為次也最下則再入中書為宰相耳凖不能從遂為丁謂曹利用所螫成晚節之瑕此不學無術所以取譏當世而旦之披緇剃髮亦不足以洗景靈宫使之羞也宋李全之亂置帥不得其人如許國徐晞稷劉琸姚冲等皆齷齪庸流一籌莫展使賊弄之股掌之上狡詐百出塗炭生靈及用趙湘善趙葵趙范岳珂等遣將用兵始有次第新塘一戰遂辟全尸二十年梨花鎗不能撑拄至於賊黨請降朝論不可范曰若明諭朝㫖愈堅賊心不如陽許以誤之我自為必討之計乃諭賊以朝廷已許納降但令安撫交過北軍賊等報謝許獻玉帶犒軍黄金四千兩范曰我欲欵賊賊更來欵我乎賊等自知降亦不免始送欵於金至是金遣使來言曰此賊不降能為兩國患請與大國夾攻之各勿受降范怪其來無故而難於隂絶遣使報之六月大戰於河西三砦賊大敗賊先遣妻孥過淮軍争欲往斬之不能禁反有起殺頭目者復大戰淮安遂平得探報云宋師一日不攻城淮安即為金有矣當全之伏誅也露布以聞帝驚喜太后以手加額而史相彌遠猶以小冦就平止人入賀嗟乎彌遠當朝誤任將帥幾削宋祚豈止淮陽乃喪師辱國不以為羞而妬功嫉能心猶未死若非范等機權不失調度有方蜂目鋭頭助以妖婦疆場之事將有不可言者師中大任安危勝負豈不以人哉蘓子由晉論云劉聰石勒王敦祖約此其奸詐雄武亦一世之豪也譬如山林之人生於草木之間大風烈日之所咻雪霜饑饉之所勞苦其筋力骨節之所嘗試者亦已至矣而使王衍王導之倫清談而當其衝此譬如千金之家居於髙堂之上食肉飲酒不習寒暑之勞而欲以之捍禦山林之勇夫而求其成功此固奸雄之所樂攻而無難者也時至承平任事之人久於酖毒一旦多故而欲使肩宏任鉅其優游敗事未有切於子由所論者此經畧中原所以必屬之陶士行祖士雅諸公茍非其人正須束之髙閣耳唐太宗追宋金剛於鼠雀谷一日八戰皆破之俘斬數萬人太宗不食二日不解甲三日矣軍中止有一羊與軍士分食之為將如此那得不勝友人嘗言吾鄉一先輩苦學人也而性頗迂有盜穴而入其室發袖中焠室有光其僕亂喊呼有賊則亟止之曰謹閉爾口此魁星下視我故文光閃爍耳主僕遂如瘖而聽盜之所為乍明起將市香楮以謝神顧則室盡空矣至今相傳以為笑余撫掌曰今日乃疑天祿閣老人得毋為梁上君子友人亦大噱世𫝊楊椒山先生喜鴉而惡鵲以為鵲報喜近於諛不如鴉之示人以禍為甚直也余以為不然盖天之生人與物賦形有定鳥鳴之有異猶人聲音之有南北清濁重輕也鵲聲清故人聞而好鴉聲濁故人聞而惡好之甚而至於喜則必為福之兆也惡之甚而至於懼則以為禍之兆也人心自以喜懼為禍福與鴉鵲之鳴何與哉先生惡鵲而喜鴉是以鴉與鵲果能示人以禍福也必無此事大凡拘忌之人疑而多畏故事無大小必擇時日語言文字之稍涉不祥者眼不敢見耳不敢聞門墻籬壁之間必有迎祥戩榖福祿等字若此者謂可以致福耳聞之易曰積善之家必有餘慶積不善之家必有餘殃書曰作善降之百祥作不善降之百殃未聞終日稱祥説瑞揀厯占時可以彌灾集慶者也余一生不信隂陽毫無忌諱事至即行未嘗擇日多有相笑以為過於矯者余亦株守如故焉丹徒靳文僖貴之繼夫人年未三十而寡有司為之奏請旌典事下禮部而儀曹郎與靳有姻因力為之地禮部尚書吳山曰凡義夫節婦孝子順孫諸旌典為匹夫匹婦發􅇓徳之光以風世耳若士大夫何人不當為節義孝順者靳夫人既生受殊封奈何與匹夫争寵靈乎㑹赴直入西苑與大學士徐階遇階亦以為言山正色曰相公亦慮閣老夫人再醮耶階語塞而止馮猶龍曰今日孝順節義諸旌典只有士大夫之家可隨求隨得其次則富家猶間可力營致之匹夫匹婦絶望矣若存吳宗伯之説使士大夫還而自思所以求旌異其親者反以薄待其親庶乎干進之路稍絶而富家營求之餘或可波及卑賤世風稍有振乎王梅溪見人禮塔呼而告之曰汝有在家佛何不供奉所稱在家佛者謂父母耳哀哀父母生我劬勞欲報深恩昊天罔極今之為子者問安視膳之儀未嘗少念而歡呼狎暱敬而畏之者酒肉朋友衾裯夫婦與夫黄冠緇衣妄言禍福者也有子若是父母凄凉甚矣而况尚有甚於此焉者安得人人而告之曰汝今子也尋亦為人父母矣即以其人之道還治其人之身汝心必恨然則己所勿欲勿施於人奈何施於吾之父母哉伯俞受父杖而泣父怪之曰往日杖汝未嘗泣今泣何也俞曰往日兒受杖必痛今不甚痛知吾父筋力漸衰是以泣耳嗟乎今有子甘心受杖反以不痛而悲其親之無力者乎東坡云王彭嘗曰塗巷中小兒薄劣其家所厭苦輙與錢令聚坐聽講古話至説三國事聞劉先主敗顰蹙有出涕者聞曹操敗即甚喜以是知君子小人之澤百世不斬云云盖好善惡惡人之至性而小兒猶在未彫未琢之時觸處皆現每見其觀劇未有不快奸邪之受戮而惟恐孝子忠臣貞媛義士之不得其生者春秋滿腹發於自然鬚眉男子有靦面目而違其本性以㓕好惡之公對此小兒能不增愧王龜齡魁天下以書報其弟夢齡昌齡曰今日唱名䝉恩賜進士及第惜二親不見痛不可言嫂及聞詩聞禮可以此示之詩禮其子也於十數字中上念二親而不以科名為喜特報二弟而不以妻子為先孝友之意具見於此而章孝標孟郊輩得第至有時人洗眼春風得意之句王沂公狀元及第或誇之以為一生吃着不盡沂公曰平生志不在温飽而宋祁於上元夜㸃華燈擁歌妓醉飲達旦兄郊令人云相公寄語學士聞昨夜燒燈夜宴窮極奢侈不知記得那年上元同在州學吃齋煮飯否答曰寄語相公不知那年在州學吃齋煮飯為甚麽人之器量髙下不同如此此王謝家物汝輩不須捉此此言極中紈袴子弟習於閒放之病盖堂前舊燕非不戀巢常為烏衣巷中人揮塵尾逐去耳牧猪奴戱毋怪運甓翁盡投於水使竹頭木屑皆有用處也唐後主有看經發願文自稱蓮峯居士宋師攻金陵倉皇中作一疏禱於釋氏願兵退之後許造佛像若干身菩薩若干身齋僧若干萬員建宇殿若干所其數甚多梁武帝捨身奉佛當索蜜惟曰荷荷時無佛來救後主讀書多豈未之見耶癡獃若此不亡何待節祠張南軒謂黷而不敬朱子答南軒書云今之俗節古所無有故古人雖不祭而情亦自安今人既以此為重至於是日必具殽羞相宴樂而其節物亦各有宜故世俗之情至於此日不能不思其祖考而復以其物享之雖非禮之正然亦人情之不能巳者但不當専用此而廢四時之祭耳夫三王制禮因革不同皆合乎風氣之宜而不違乎義理之正正使聖人復起其於今日之義亦必有取矣愚意時祭之外各因鄉俗之舊以其所尚之時所用之物奉以大盤陳於廟中而以告朔之禮奠焉則庶合乎隆殺之節而盡乎委曲之情可行於久遠至於元日履端之祭禮亦無文今亦只用此例時祭用分至則冬至二祭相仍亦近煩凟改用卜日之制尤見聽命于神不敢自専之意俗節之祭非古禮然漢唐以來士庶不能廢朱子謂韓魏公處得好謂之節祠殺於正祭遂依而行之其門人記朔旦家廟用酒菓望日用茶重午中元九日之類皆名俗節大祭時每位用四味請出木主俗節小祭只就家廟止二味朔旦及俗節酒止一上斟一杯晦庵所謂依韓魏公而行之者大約是此類歟南軒欲廢俗節之祭晦庵問子端午能不食粽乎重陽能不飲茱萸酒乎不祭而自享於汝安乎陳淳問行時祭則俗節如何曰某家且兩存之問莫簡於時祭否曰是安得不行須是自家亦不飲酒始得此晦庵不敢死其親之心也他日淳問先生除夜有祭否曰無祭惟今人逢歲除宗族咸來宴㑹或當房妻子上夀為樂其隣里親識亦預有餽獻之儀而祖先乃寂寂焉其心亦烏能自安乎淳嘗記先生依婺源舊俗歲暮二十六日烹豕一祭家先就中堂三鼓行禮次日召諸生餕焉又記先生以歲前二十六日夜祭先生云是家間從來如此則晦庵於歲除無祭除夜豈得獨不飲酒不為樂哉殆前此曾有祭故耳我國朝亦於嵗除行祫祀禮今士庶家固不應無除夜祭也世俗侈於滛祀以凟神可謂極矣而為祖宗起見者固甚少也右節祠俗祭二議皆合乎天理當於人情録之使知昔賢之所尚者孝子慈孫之意世之妄凟上下鬼神而其心在於邀福而求庇其不為神之所吐者鮮矣洪武二十四年命禮部清理釋道二教勅曰今之學佛者曰禪曰講法曰瑜珈學道者曰正一曰全真皆不循本俗違教敗行為害甚大自今犬下僧道凡各府州縣寺觀雖多但存其寛大可容衆者一所併居毋雜處於外與民相混違者治以重罪親故相隠者流願還俗者聽其佛經翻譯已定不許增减詞語道士設醮亦不許拜奏青詞各遵頒降科儀民有效瑜珈稱善友假張真人名私造符籙者皆治以重罪天下僧道有創立庵堂寺觀非舊額者悉毁之二十七年榜示天下寺觀凡歸併大寺設砧基道人一人以主差税每寺觀道士編成班次一年髙者率領除僧道俱不許奔走於外及交搆有司以書冊稱為題疏强求人財其一二人於崇山深谷修禪及學全真者聽三四人不許毋得私創庵堂若遊方問道必自備路費毋索取於民所至僧寺必掲周知冊驗實不同者挐送有司民問充軍不許收留為僧違者并兒童父母皆坐以罪年二十以下願為僧者亦須父母具告有司具奏方許三年後赴京考試通經典者始給度牒不通者杖為民有稱白蓮靈寳火居及僧道不務祖風妄為議論沮令者皆治重罪永樂六年令軍民子弟僮奴自削髪為僧者并其父兄送京師發山做工畢日就留為民種田及盧龍牧馬寺僧擅留客者罪亦如之十年又以僧道多不守戒律諭禮部將洪武年中嚴禁掲榜申明違者殺不赦十六年定天下僧道府不過四十人州不過三十人縣不過二十人宣徳八年令天下有司闗津但遇削髪之人捕送原籍治罪如律成化十三年又禁約遊方僧人凡持道住持勅建寺觀許二人勅賜併在外寺觀各止許一人𢎞治十三年令凡漢人出家習學畨教不拘軍民曾否闗給度牒俱問發原籍各該軍衛有司當差若漢人冐作畨人者發邊衛充軍此餘冬序錄中所載明初之制以處釋道二教者其立法最善併録於此明楊文貞公遺囑吾在世已久踰越分願無所遺憾但官品崇重國恩未報雖死不能瞑目身後數事須示子孫此吾之治命其遵行之不可違也一只用幅巾深衣殮須用絞衾庶幾少輕經過閘壩可得稳當一吾平生不曾用過僧道死後亦勿用只依家禮祭祀祭物隨時所有不必豐但設我平日所用冠帶袍服於中行禮祭告之文亦用家禮不用新作一凡今喪家遇親朋來弔者皆散孝此是北方風俗南方素無此禮古禮亦無葢弔是常禮孝是凶物豈可進凶物請他人為己持孝大非禮吾死後切不可行或有縉紳大夫來弔待賔者明謝以非禮不敢䙝凟實非慢也一吾久病數數累公卿大夫垂問感愧甚矣今不能報煩院中一僚友干凂少保先生冢宰相公三大夫遍叩列位公卿大人一切遺祭遺賻並止不行至叩至叩同院僚友鄉里親交及歸途有相知者欲行祭賻皆謝却之此吾之中懇非矯情也力辭力辭一作急作書託徐尚書大人倘有馳驛上廣東者寄去報道令急急作墳楮原龍川隨擇一處乾燥平穏無凶禍者便選日興工切不可求子孫利達如此然後易成盖要利達須力學修徳不在風水也磚石石灰務要堅固於外只作一大饅頭必須省費不可吝慳庶得早完若延緩稍遲必累煩鄉里重吾過矣一柩到家可且安置於學後正㕔即擇日葬不可久停盖死者復土則安矣一啟行回去凡書籍文字並須逐一收拾包裹愛䕶舟中尤須謹避雨水漏濕片楮隻字不可損壊遺落圖畫亦然明于忠肅公之先世有顯官至其父㓜孤貧流落雖知家世之貴而不能詳所知者黄鶴山有先塋其兄弟名山夀海夀耳忠肅既長為董鏞先生壻先生藏書有元黄文獻公溍集三山大字本載湖南宣尉于九思行狀可考忠肅能知其先以得此文焉耳葉文莊以為人品家世託之名筆其效有如此盖董先生子中書舍人璵與文莊隣居間語及云有張巡檢者夜夢人告之曰明日有十二位佛來見汝可善待之能為汝度先祖佑汝一生富貴遲明果有十二僧來巡檢甚喜即語以夢留欵甚厚次日請作醮以度其先祖問之曰舟中更有何人請同齋答曰只二行童留看行李不必請也巡檢宻令其子至舟固請二行童告曰我非行童乃浙江天台人也父為某官考滿回鄉遇此十二和尚刼殺一家留我姊妹二人扮作行童帶來至此煩以此情愫達大人為雪此寃也其子告之巡檢宻㸃弓卒約二更醮完擒僧責問取二女証之皆服罪事見百可漫志中昔蘓長公有夢黄衣道士之事此十二僧想亦善為其術者幸巡檢以二童起疑宻令其子問之不然必中其計矣世之僧道往往能為幻術以欺人書之以告信邪而不信道者明宦官覃吉在東宫口授大學中庸等書導以動作威儀開説府部官守天下民情及宦官専權蠧國之弊一日東宫誦佛經吉適至驚曰老伴來矣急易孝經誦之吉詭曰得毋誦佛經乎曰非也孝經耳𢎞治間太監何文鼎以皇親入禁城觀燈諸事極言下錦衣衛雜治究所主者文鼎曰有兩人但不可執按曰姑言之曰孔子孟子也此二人者皆以閹而知誦法孔孟以輔導其主乃有名為大儒而沉溺於佛與道之説以背聖人之經者能無汗下明司禮監秦太監者為子弟訪師得舉人余洙初不就强而後可秦謁上坐左右驚訝既出秦喜曰此人司禮監太監也不怕况我子弟耶及就塾秦子弟皆襲錦衣職位者而余狀貎鄙陋頗䙝易之既而有惰者輙加跪責多不服余怒求去子弟輩大懼跪留乃止秦聞之嘆曰我家子弟不是這個先生如何教得益加敬禮焉後舉進士為顯官終不屈於人今世師道日衰余嘗聞劉上于所述毘陵二師事而記之然余所授者驕貴子弟秦又一寺人也而賔主無不盡其道其事則尤難矣世之為師與延師者誰能若是毘陵某先生致政里居延師訓二子事之甚謹晨起候於門門啟僂而入命童掃地驅塵手熱香入爐中乃請師出揖之坐相對啜茗一甌然後退以為常久之師謂先生過勞殊不安請以館童代辭謝再三始從之然亦必於書室傍數武拱立以竢視其童焚香掃地進茶滌溺器畢乃稍前向簾内一揖而去又一某先生亦居林下夫婦老矣僅一子掌上珠也延師訓之師頗嚴一夕與同舍生有所適半晌而至師大恚誚讓久之將有夏楚之儆館童馳報母夫人夫人遣婢傳語為匄免師怫然遂不責其子而留一刺為别竟怫衣去夫人急聞於先生踧踖無計則遍倩親朋為解不可則携其子隨兩人負荆以請願受責不可則夫婦皆跪於堂上必面師然後起於是所倩姻若友者相與讓曰君以師道自尊固當然奈何苦兩老人若是膝且腫矣師乃趨出掖兩人起登坐謝罪而後言曰某豈不知為已甚哉顧今日師道陵遲甚矣某所以為此將以愧夫依阿軟羙而據人之臯比者某終不可以再往然有某君者耿介方嚴君子也請以自代某得藉手以全在三之體幸甚敢固以辭於是先生夫婦暨其子知師意已决不可强則淚浹於眶久之言别猶逡巡不忍行也藥房主人曰記有之凡學之道嚴師為難師嚴然後道尊道尊然後民知敬學在三之義師居其一君之所不臣者二當其為師則勿臣也師之尊也如是時至末流而人之所以待師與師之所以自待有不可言者矣兩先生事聞之余友劉上于惜不記其姓氏然上于曾道兩家師弟皆相繼登第去毘陵科名甲海内觀其所以尊師若是則蟬聫鵲起之竒豈倖獲哉盖吾有子弟不可以無師有師矣不知敬且重之而師亦安焉師若此不如無師之為愈而亦不如不必延師之為愈也余慕兩先生風範欲效而未能聊為述之俾觀者有所取則焉明洪武四年太祖於被問管勾宇文桂嚢中得所藏書信百封内有嘉興登科舉人王軫父家書倩其轉達平凉任所者帝閲其書語言真切教以忠孝遂下詔畧云薄俗中有善於為人父者如此誰能出其右者勸善懲惡移風易俗實有國之善治令中書遣人齎詔諭往詣其家賜以白金百兩附子五枚川椒五斤絹十疋以旌其賢令有司除本戸雜役依舊應當里長其弓兵不須再役軫父具表稱謝其詔文謝表家書備載水東日記中今僅録其家書畧云家中上下俱無事倘欲挈家須在彼稍安詳度可否然後來取恐川途迢遞或遷轉不常跋涉勞頓我今稀年又一老景侵尋倘若朝廷容侍親則上章求歸父子相見以盡餘年若宛轉仕途則相見無日矣人説有分俸之例不審果否如得分祿以養亦足為榮若彼處關支則不必也凡事須清心潔巳以廉自守食貧處儉儒者之常慎勿以富貴為念古人云貧乏不能存此是好消息正當以此言為受用也治民以仁慈為心報國以忠勤為本處已當以謙敬學業更須勤力暇日即以性理之書及諸經留玩自然所思無邪更須熟讀新律自然守法不惑飲酒當以康節先生為範不可縱恣分俸之事律許則行否則不可干其紀也此後倘有的便可買附子一二枚川椒一二斤起税而來餘物非所覬也云云雙橋隨筆卷二
