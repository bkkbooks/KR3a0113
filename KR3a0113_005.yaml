body:
  text: 雙橋隨筆卷五鳳縣知縣周召撰徐勉王僧䖍顔之推司馬光皆有訓子語而之推勉學篇更為警切其中摹寫不學之人如云或因家世餘緒得一階半級便謂自足安能自苦及有吉凶大事議論得失䝉然張口如坐雲霧公私宴集談古賦詩塞黙低頭欠伸而已又云自荒亂以来諸見俘掠雖百世小人如讀論語孝經者尚為人師雖千載冠冕不曉書記者莫不耕田養馬若能常保數百卷書千載終不為小人也夫明六經之㫖涉百家之書縱不能増益徳行敦厲風俗猶為一藝得以自資父兄不可常依鄉國不可常保一旦流離無人庇䕃當自求諸身耳諺曰積財十萬不如薄技在身技之易習而可貴者無過讀書也云云其他字字透徹皆中時人之病盖公之後自其子思魯以博學善屬文官至學士𫝊至師古及真卿杲卿至真卿五世孫翊奕葉重光聨圭並笏者三十餘人謂非家訓所致不至此凡有家者全録一通勒之座右以視黄金滿籯之家真堪一噦事之吉凶本無先兆若在行軍之際人心易揺適值世俗所怪以為不祥者不得不為數言道破以解其疑凉謝艾禦趙引兵出振武夜有梟鳴於牙中艾曰六博得梟者勝今梟鳴牙中克敵之兆也進與趙戰大破之唐趙郡王孝恭討輔公祏将發與諸将宴集命取水忽變為血左坐皆失色孝恭舉止自若曰此乃公祏授首之徴也飲而盡之衆皆悅服其後遂平公祏夫梟鳴水變此人情所詫以為不祥者也使兩人稍生疑畏則羣心易沮甚非行軍之利惟故為吉語以定之而三軍鼔舞遂賀戰勝於一言矣然非平日見理明而不為奇衷所惑者豈能臨事鎮定乃爾黄九烟先生託人覔居問所欲曰但欲無兵無盜賊又須有酒有魚蝦所願如此先生當日以為聊可之詞耳以今觀之非極樂世界耶因憶眉公太平清話有曰余昔戊子隠居沈大夫園四周雜種花是小桃源時雨初晴負笠握鋤撥散土膏如灌園狀是小於陵教授諸生是小河汾橋斷水西不聞市喧是小考槃短舟徜徉池中一爐一琴可濯可釣是小五湖挟此數者視青天呼白鳥有談名利則揮手謝之不知其他是小神仙此等境地與九烟先生所願又若雲淵矣而眉公尚視以為小然則身處眉公之世者豈僅世所稱蓬壺閬苑中人哉吾邑爛柯山相𫝊為晉王質觀奕處好事者遂􅒇土為質與二仙像及枰奩之類置之巖下以為實有是人暨是事者然善乎晉陵鄒程村之為記也有曰古今来達人遺世壮士憤時其胸中類有不能恝然者不得已而逃為百年頃刻之說以憶記其事于靈奇恍惚之中此即詩人髙岸為谷深谷為陵之意也乃好事者從而誇述之又從而彷彿摹像之以兾其事或必然者其去芻童牧䜿之見㡬何哉斯言也足以醒夫世之惑于靈經怪牒而不自知者要之非僅柯山為然而程村之說尚有所未盡也今夫地之有山川洞壑江河嶽瀆也猶天之有日月星辰風雨雷電人之有眉髪頥頬耳目口鼻也一經開闢而或流或峙岌嶪玲瓏瀠洄漰湃之客賦之已定非有所為而後設而屬之山者其體静其骨清其致幽其神逺静則惡其動也清則惡其雜也幽而逺則惡其囂與偪也其與人不相涉也甚矣乃無端而有洞天福地佛祖道塲神仙窟宅之說于是一峯一巒之秀必曰此某佛某仙之所聚而逰也一巖一洞之奇必曰此某佛某仙之所託而棲也不但為之艷其事而且為之像其形不但為之撰其名而且為之立其𫝊與記播之歌與詩有缾鉢匙筯果攂鑼磬瓔珞袈裟之贈有珍幢金傘霓旌絳節佛光火焰之神有騎龍騎虎乗鳳乗鸞祥雲覆頂紫霧騰空之異囈言滿楮怪誕不經至于岱之金床玉几嵩之玉人金像赤室丹房廬之聖燈磚樓辟蛇童昇仙臺武當之金殿滴淚池磨針澗斗篷焦扇峨眉之煉丹竈淘米泉天台之僧人履仙石棺華山之老君犂洗頭盆仙人碁巨靈掌諸如此類悉數難終而古今又多有耳無目有目無心之人遂謂器具皆存神仙活現訛以𫝊訛牽合附㑹于是有宰官居士之稱䕶法檀那之舉羽流方士之屬青詞寳籙之儀進香之男女如蟻膜拜之鼔鐘若沸琳宫梵宇金碧輝煌緇服黄冠衣糧狼籍寃哉山也任人改名易姓波及杜公一云陳子昻而配十姨之夫伍相而變五髭之面蛇鬼鴉神亦圗血食小孤彭浪可訂婚姻紛紜沓嬲山之本来面目皆不能自主而無可告訴以自託於東撏西撦拖泥帶水之中矣或曰人之好異也使地不得安其位乃知天亦幸與人絶髙而不能至耳否則未免受其擾而余謂亦未盡然也今夫天之蒼蒼以氣上浮也其有日月星辰風雨雷電之屬非有婚姻男女之相生語言文字之相示也而好事之言至謂日姓張名表月姓文名申是以姓名誣日月也文昌而化為儒雅之人魁宿而忽成醜怪之狀是以形相䙝星辰也風稱伯為飛廉雨稱師為屛翳是以頭角扮風雨也謝師之長三尺鐡索之重六斤是以夫妻輕重狎雷電也宋祥符絳衣入夢孰為𫝊書唐天寳黄紙昇天誰為守藥是且以􅀈語欺上蒼也其談天之異若是雖幸不可近而不受其擾然亦豈盡安于無事哉或又曰凡人之鑿夫天與地固若是矣至于人或以同類而不相殘乎言至此而余不覺眉之攅而額之蹙也曰嗟乎人之所為又豈吾之所得而測者哉彼且矯揉造作其心思面貌耳目手足之用至于變幻詭異千態萬状而不可聞盖自鑿其混沌也久矣况其所以及于人者乎而又安能保其同類而不相殘乎余聞之夫子其不語者神與怪鬼神則敬而逺之老子曰有道之世其鬼不靈人奈何惑于異端邪說而不自知也余觀程村之語尚有所未悉故不揣而為不入耳之言饒舌至此世之見者得毋相詫而反以余為好異也夫嘉靖間倭患最劇山左邢子愿有條上當事書名曰罪言東鄉艾千子值流冦之亂亦有指陳時事之策一見於来禽館集一見於天慵子集頃又讀克正髙公馭倭議起云天下事任者一議者百知而議之者一臆而議之者百任之者心常苦而計無復之将無所辭於議者之口議者之策常當而身未嘗試反求多於任者之人故議事者在度任者之心而以吾議衡之今之議倭是也云云三公指畫當日情形皆鑿鑿可行而髙公首欲調劑任與議者之心尤為急着毋謂書生管見不足以抵掉鞅摩壘之人也文章根於人品而奸邪之徒亦為正人之言以欺世有陳以為戒而適所以自指者如李義府獻承華箴末云佞䛕有類邪巧多方其萌不絶其害必彰義府方諂事太子而又故若讜直者太子表之遂優詔賜帛嗟乎佞䛕邪巧孰有如義府者而反以為箴此亦不以人廢言耶義府以賍敗朝野相賀或作河間道元帥劉祥道破銅山大賊李義府露布榜于衢劉祥道司刑太常伯與三司雜訊義府獄者也嘗謂五倫之中惟朋友一途至于後世而其義遂廢數其情状有朱公叔劉孝標之論所未盡者余嘗欲作廣廣絶交論而未能也夫朋友之交以道義為主相與有成始有禆益至于今日不但無益而且有損以指天誓日簮合蘭芬之地反成翻雲覆雨蕕羶鮑臭之塲而市井勢利中之蠅營蟻附者又無論矣盖君臣父子兄弟夫婦合于天者也朋友定于人者也既得自主不能審擇而誤置其身于匪人之是比使十年有臭而不可聞焉此人情之最不可解者求為陳雷鮑管其人竟不可得也而况于道義中之最真最䔍者哉吾故曰朋友一途至于後世而遂廢也古之大臣剛正不阿非後世所能及申屠嘉為人廉直門不受私謁中大夫鄧通方愛幸時嘉入朝而通居上旁有怠慢之禮嘉奏事畢因言曰陛下愛幸羣臣則富貴之至于朝廷之禮不可以不肅上曰君勿言吾私之罷朝坐府中嘉為檄召通詣丞相府不来且斬通通恐入言上上曰汝第往吾今使人召若通至詣丞相府免冠徒跣頓首謝嘉嘉坐自如弗為禮責曰夫朝廷者髙皇帝之朝廷也通小臣戲殿上大不敬當斬吏今行斬之通頓首首盡出血不解上度丞相已困通使使持節召通而謝丞相此吾弄臣君釋之通既至為上泣曰丞相㡬殺臣宋𢎞薦沛國桓譚召譚拜議郎給事中帝毎讌輒令鼔琴好其繁聲𢎞聞之不恱悔于薦舉伺譚内出正朝服坐府上遣吏召之譚至不與席而譲之曰吾所以薦子者欲令輔國家以道徳也而今數進鄭聲以亂雅頌非忠正者也能自改耶将令相舉以法耶譚頓首辭謝良久乃遣之後大㑹羣臣帝使譚鼔琴譚見𢎞失其常度帝怪而問之𢎞乃離席免冠謝曰臣所以薦桓譚者望能以忠正導主而令朝廷躭恱鄭聲臣之罪也帝改容謝使反服其後遂不復令譚給事中宋孝宗時近習梁俊彥請稅兩淮沙田以助軍餉上大喜付外施行葉子昻為相奏曰沙田者乃江濱出沒之地水激於東則沙漲於西水激於西則沙復漲於東百姓知沙漲于東西而田焉是未可以為常也且辛巳兵興兩淮之田租盡復至今未征况沙田乎上大悟即詔罷之子昻退至中書令人逮俊彥至叱責曰汝言利求進萬一淮民怨咨為國生事雖斬汝萬段豈足塞責俊彥惶汗免冠謝久乃釋之𢎞與子昻固儒者嘉起材官蹶張而能持大體若是尤人所難然又皆不如諸葛武侯以黄皓之寵於後主而終侯之世不敢為非則誠所謂能格君心者其以嚴見憚又不待露之聲色之間也孔子曰君子不以言舉人不以人廢言時至戰國工于揣摩捭闔之術者莫過于蘇秦其言猶糞土也而有不盡然者其為趙合從以攻秦也列叙六國之形勝風俗靡不諳悉不啻躬履而目擊其才亦有足多者焉至說齊閔王以好戰之害而謂祖仁者王立義者霸用兵窮者亡惟以戢兵後事為主語語痛切又若不詭於道者惜乎不得見正于聖人使後世擯之以為傾覆險譎之徒也古今是個儀文世界若無文以相接則倫類酬酢之間蔑棄禮法與禽獸何異故曰周旋中禮盛徳之至棘子成質而已矣之論便以為非吾想家庭之間儀文更不可少盖放肆之人大約徑情直遂悍然不肯周旋以致父子兄弟尊卑上下之際日乖日戾同室之中遂成胡越此皆無文之所致也但不貴虚文耳文中有質是為真文愉色婉容有一種藹然可親之意方是真文世人以虚文為文者失之逺矣然虚文之人猶愈于放肆乖戾者也此聞鍾集之語極切家庭間徑遂無文之病余毎欲言之而不能如此之深切著明也佳子弟當以厚重恬静為尚昔王融自恃才地三十内望為公輔嘗歎曰作此寂寂使鄧禹笑人搥車壁曰車前無八騶何得稱丈夫以事被誅年僅二十七蕭恵開嘗謂人曰人生不得行胸臆雖百嵗猶為夭未㡬發病吐物如肺肝而死此二人者可以為輕狂躁動者之戒唐太宗詔奴告主者勿受仍斬之可為後世之法貧賤之交不可忘糟糠之妻不下堂人知宋𢎞有辭尚湖陽公主事而不知尉遲敬徳亦有之太宗嘗謂敬徳曰朕欲以女妻卿敬徳謝曰臣妻雖陋相與共貧賤久矣臣聞古人富不易妻此非臣所願也乃止武夫不肯為薄行事亦如此杜祁公衍清介不植私彥既退寓南都凡十年第室卑陋才數十楹居之裕如享客多用髹器客有稱歎者曰公常為宰相清貧乃爾耶公命侍人取白金燕器于前曰非乏此雅自不好耳然公好施亦卒不蓄也烏有反哺之孝此鴉之可喜者也唐竇參柄政毎事必詢于族子申申所至人目為喜鵲此鵲之可惡者也臣聞明於天地之性不可惑以神怪知萬物之情不可罔以非類諸背仁義之正道不遵五經之法言而盛稱竒怪神鬼廣崇祭祀之方求報無福之祠及言世有仙人服食不終之藥逺興近舉登遐倒景覽觀縣圃浮㳺蓬莱耕耘五徳朝種暮穫與山石無極黄冶變化堅水淖溺化色五倉之術者皆奸人惑衆挟左道懐詐偽以欺㒺世主聽其洋洋盈耳若将可遇求之盪盪如繫風捕影終不可得是以明王拒而不聽聖人絶而不語昔周史萇𢎞欲以鬼神之術輔尊靈王㑹朝諸侯而周室愈微諸侯愈叛楚懐王隆祭祀事鬼神欲以獲福助却秦師而兵挫地削身辱國危秦始皇初并天下甘心于神仙之道遣徐福韓終之屬多齎童男童女入海求神采藥因逃不還天下怨恨漢興新垣平齊人少翁公孫卿欒大等皆以仙人黄冶祭祀事鬼神使物入海求神采藥貴幸賞累千金大尤尊盛至妻公主爵位重絫震海内元鼎元封之際燕齊之間方士瞋目扼腕言有神仙祭祀致福之術者以萬數其後平等皆以術窮詐得誅夷伏辜至初元中有天淵玉女鉅鹿神人轑陽侯師張宗之奸紛紛更起夫周秦之末三五之隆已嘗専意散財厚爵禄竦精神舉天下以求之矣曠日經年靡有毫釐之騐足以揆今經曰享多儀儀不及物惟曰不享論語說曰子不語怪力亂神惟陛下距絶其類毋令奸人有以窺朝署臣聞妖言惑衆左道亂俗在昔之法皆殺無赦盖以奸臣逆節狂賊亂規多假鬼神揺動耳目漢之張角晉之孫恩偶失防閑遂至屯聚國家宜有嚴制以肅多方竊以當州東引七閩南控百粤編氓右鬼舊俗尚巫在漢欒巴已嘗翦理爰從近嵗𫝊習滋多假託禨祥愚弄黎庶勦絶性命規取貨財皆于所居塑畫魅魑陳列幡幟鳴擊鼓角謂之神壇嬰孺襁褓已令寄育字曰壇留壇保之類及其稍長則𫝊習妖法驅為童𨽻民之有病則門施符術禁絶往還斥逺至親屏去便物家人營藥則曰神不許服病者欲飲則曰神未聼餐率令疫人死於饑渴洎自亡者服用又言餘祟所憑人不敢留規以自分若幸而獲免家之所資假神而言無求不可其間有孤子單族首面幼妻或絶户以圗財或害夫而納婦浸淫既久習熟為常民被非辜了不為怪奉之愈謹信之愈深從其言甚于典章畏其威重于官吏奇神異像圗繪嵗増邪籙妖符𫝊寫入夥小則雞豚致祀斂以還家大則歌舞聚人食其餘胙婚葬出處動必求師刼盜鬬爭行須作水蠧耗衣食眩惑里閭設欲扇揺不難連結在于憲典具有章條其如法未勝奸藥弗瘳疾宜頒峻典以革妖風伏乞嚴賜條約屏除巨害保宥羣生少禆萬一右二疏論列邪教之害甚悉首篇出西漢谷永手永黨於王氏人不足貴而排黜異端乃能凜凜若是堪與韓昌黎佛骨表同垂後世矣因並録之吕東莱曰凡為學之道必先至誠不誠未有能至者也何以見其誠居處齋荘志意凝定不妄言不茍笑開卷伏讀必起恭敬如對聖賢掩卷沉思必根義理以閑邪僻行之悠久習與性成便有聖賢前輩氣象又曰為學之本莫先于讀書讀書之法須令日有課程句讀有未曉大義有未通不惜與人商確不惜就人授讀凡人多以此為恥曾不知不如是則有終身之恥也魏鶴山曰帝王不作而洙泗之教興微孟子吾不知大道之與異端果孰為勝負也聖賢既熄而關洛之學興微朱子亦未知聖𫝊之與俗學果孰為顯晦也韓子謂孟子之功不在禹下予謂朱子之功不在孟子下可謂確論宋尹和靖每赴經筵前夕必沐浴更衣設香案以来日所當講書置案上朝服再拜拈香又再拜齋于燕室初夜乃寢次日入侍經筵學者問焉曰必欲以所言感悟君父安得不盡敬人君之尊如天必須盡已之誠意又曰以吾所言得入則天下蒙其利不能入則反之安得不盡誠敬宋趙隣㡬官知制誥卒子東之亦死塞下家貧三女皆幼無田以養無宅可居僕趙延嗣者久事舎人義不忍去竭力營衣食以給之勞苦不避如是者十餘年三女皆長延嗣未嘗見其面至京師訪舎人之舊謀嫁三女見宋翰林知白楊侍郎徽之發聲大哭具道所以二公驚謝曰吾被衣冠且與舎人友而不恤其孤不逮汝逺矣即迎三女歸京師求良士嫁之三女皆有歸延嗣乃去石守道為之𫝊以勵天下此等事求之近世不但趙延嗣不可得并宋楊二公亦難屈指姚現聞先生與其長公書云楓樹堂中時時洒掃庶不愧名士風流吳梅村序翁季霖詩云余嘗訪友過翁氏之廬見其堂廡深靚夾窗助明雷尊蜼鼎犀籖縹帙以為之陳雕茵髹几文竹異石以為之飾問其家曰先人之所遺也没十餘年矣琴瑟在前罍洗居右部分而不亂無纎翳焉大抵儒門子弟貴于恬静和雅雖環堵之居僅堪容膝入其門几榻無塵位置楚楚主人出揖客韻致可觀而毫無鄙俚之状乃不愧儒素家風朝議大夫李觀字夢符史𫝊諸書一過目即成誦文章如元次山登第厯官知䖍州不就請監衡州南嶽廟以歸建王溪洞洞中有抱一堂水仙亭有梅處曰香雪塢有衆花處曰錦繡谷貯書史處曰文之藪終日醉于漢上于世味淡如也排斥釋教至老不衰鄉人嘗請作修崇聖觀殿記其間曰天子愛民至渥也使供租稅若有難色至奉異方之教則倒廩竭槖忻然無辭施者頗慚其後多寳塔成有求記於公者公於是又曰今之人父母甘㫖之養往往未能錙銖惟惑報應捨萬金唾如也衆益慚故二文至今不果刻石宋羅誘宜春𫝊信録浙江通志載用賔胡公二禁約最有禆于俗尚一禁異端正禮俗本縣俗尚鬼巫崇信佛老比有喪葬藐棄家禮率用浮屠雜以黄冠鐘磬之聲達於旦夕甚乖舊稱鄒魯之意仰鄉約長訓諭摠甲人等訪查呈舉究治一禁溺女裁婚禮本縣淹女不舉舊習不遷雖有前令著殺女之文申優免之令往往良心滅沒視如泛常致令十人之中八無家室生育鮮寡民物漸稀計其将来大可危懼審其弊源實在傾貲嫁女以悅婚家茍或不然必成仇害女喪訟連遂致子孫無所倚藉此所以父母輕殺其女而忍心不顧也今照前規三女之家優免一丁仍酌議婚姻之禮其嫁女上户不得用珠綺中户不得用金紵下户不得用銀帛娶婦上户不過用金環雙縀中户不過用銀環雙絹下户銀環雙布鄉約長副長里長摠甲立簿二扇逐日問名報嫁娶另簿呈送有溺女及僣侈者究治盖移風易俗應藉當事之權登髙而呼其勢必應無奈不合時宜者之鮮有其人也安得起此公於今日而畀以臨民之任哉古人心事大公至正有如白日青天豈若後世之人處心積慮惟為身家子孫計非望之利終日尋風水多忌諱揀日推命而天理人心居易以俟之功悉置不問愚亦甚矣偶讀劉子政說苑李仲章制義中語可以闢邪說拒詖行尊經衛道之助因節録之劉子政說苑至公篇云辛櫟見魯穆公曰周公不如太公之賢也穆公曰子何以言之辛櫟對曰周公擇地而封曲阜太公擇地而封營丘爵土等其地不若營丘之美民不如營丘之衆不徒若是營丘又有天固穆公心慚不能應也辛櫟趨而出南宫邊子入穆公具以辛櫟之言語南宫邊子南宫邊子曰昔周武王之卜居成周也其命龜曰予一人兼有天下辟就百姓敢無中土乎使予有罪則四方伐之無難得也周公卜居曲阜其命龜曰作邑乎山之陽賢則茂昌不賢則速亡季孫行父之戒其子也曰吾欲室之便於兩社間也使吾後世有不能事上者使其替之益速如是則曰賢則茂昌不賢則速亡安在擇地而封哉或示有天固也辛櫟之言小人也子無復道也李来泰周雖舊邦制藝云周之邦未易言矣不窋墮播種之勤棄邰之舊而邦一變慶節誌周瑶之雅棄戎之舊而邦一變亶父避狄荒闢周原棄邠之舊而邦又一變至髙山天作荒之幸矣而謂岐陽百里足兼五岳之封此又文王所不願及也周之命抑又多故矣元妃之裔宜王摯立而稷不受命帝嚳之裔宜嗣崇禪而邰不受命公劉用光之緒當夏政頽廢之朝子興而姬又不受命至玉門讒謫不誅為幸矣而謂河洛六州足遷九鼎之奉尤文王所不忍言也二段文字寫出聖賢心緒何等明白而有謂其圖謀風水等于貪癡隂險之人者地下有靈能不髪指余有與唐翼修辨風水文得此二說可以為助信鬼神者失謀信日者失時何以知其然夫聖賢周知能不時日而事利敬法令貴功勞不卜筮而身吉謹仁義順道理不禱祀而福故卜筮擇日潔齋戒肥犧牲飾圭璧精祠祀而終不能除悖逆之禍以神明有知而事之乃欲背道妄行而以祠祀求福神明必違之矣天子祭天地五嶽四瀆諸侯祭社稷大夫祭五祀士祭門户庶人祭其先祖聖王承天心制禮分也古之卜日者将以輔道稽疑示有所先而不敢専也非欲以顛倒善惡而幸安全孔子曰非其鬼而祭之諂也是以泰山不享季氏之旅易稱東隣殺牛不如西隣之禴祭盖重禮不貴牲也敬實而不貴華誠有其徳而推之則安往而不可是以聖人見人之文必考其質此說苑反質篇語也說明聖人卜日心事可解愚人之惑東坡云聖人之所以絶人者不可以常情疑其有無孔子為魯司㓂墮郈費三桓不疑其害己也非孔子能之乎伊尹去亳適夏既醜有夏復歸于亳伊尹為政于商既貳于夏矣以桀之暴厲納其執政而不疑往来兩國之間而商人父師之非聖人能如是乎是以放太甲而不怨復其位太甲不疑不可以常情斷其有無也後世惟諸葛武侯近之𤣥徳将死之言乃真實語也使孔明據劉禪位蜀人豈異詞哉羅景綸曰朱文公云豪傑而不聖賢者有之矣未有聖賢而不豪傑者也陸象山深以其言為確論如周公兼夷狄驅猛獸滅國者五十孔子却莱人墮三都誅少正夘是甚手段非大豪傑乎其次如諸葛孔明議論見識力量規模亦真豪傑云云兩公之議皆天下後世所不能易者也乃關中王穉欽則以孔明之不能一天下者在于自炫其能而阻人以進用之路其事業不能如蕭何以失大體故也而余以為不然善乎王元美之為蕭何諸葛優劣辨也曰是非王楨維之言而揚雄氏之言也曰漢屈羣策羣筞屈羣力楚憞羣策而自屈其力夫曷故焉以語夫相臣之道㡬矣非所以語于二子之優劣也夫孔明非不善用才者今夫大匠之為宫室也其梁棟欂櫨必貰夫楩楠豫杞之良者充焉斲而小之弗勝也或用夫黯然而中腐者匠之罪也其無楩楠豫杞者非匠之罪也孔相之相蜀也屬炎精之漸涸天下固已忘劉氏而又從而㬰之故以龎統之智焉而死法正之敏焉而死關張之悍鷙焉而死於是乎孔明之志窮勢屈不得不獨身而力幹之然猶日孳孳焉舉蒋費董向之徒以善其後以忌愎之李嚴浮誕之馬謖𥚹淺之楊儀暴肆之魏延不得已而拾其長以充牛溲馬勃之用令是時而有子房者出而街亭之役必復以帷幄付幼良有韓信者出而祁山之役必復以旗鼔付文長有平陽侯出而五丈原之役必復以畫一付公儀則可是三君子無一焉而奈之何其以鄼侯望諸葛也哉孔明逆知其身之可以滅魏又逆知其身亡而蜀不得中原矣蒋費亡而蜀不蜀矣故及其身一用焉而卒不遂也且出師表何與于天下之為文者木牛流馬何與于天下之為藝者八陣圗何與于天下之為兵者茍聲至而響合氣同而類應則奚不可之有孔明之言曰開誠心布公道集衆思廣忠益其為獨用長者乎哉云云先生此語使千載以上鞠躬盡瘁之苦衷歴歴紙上與蘇羅二公皆可謂卧龍知己而關中之議殊失其倫矣人皆謂東坡佞佛而實不然其議學校貢舉書斥士大夫主佛老之為非又策别云天子有七廟今又飾佛老之宫為之祠固已過矣又使大臣兼官以領之嵗給費以鉅萬計此何為者又賀坤成節表放億萬之羽毛未若消兵以全赤子飯無數之僧褐不如散廩以活飢民又作勝相院記謂治其學者大抵設械以應敵匿形以逃敗窘則推墮滉漾中不可捕捉如是而已矣此數句盡古今禪學自欺欺人之病楊升菴云東坡于禪學深入𠖇契而其言如此何也盖其與世不合姑以消其不平荘子云因之以曼衍所以窮年也殆東坡之謂乎大抵東坡天分最髙聰明絶世故文章學問外旁及于西氏之理而一時又有參寥佛印輩機鋒相對口頭話皆堪作偈所謂㳺戲三昧耳其與明季畔道離經驅儒入禪者甚異東漢書為方士立𫝊如左慈之事妖怪特甚君子所不道而乃大書特書之何其陋也曺子建辨道論曰世有方士吾王悉所招致甘陵有甘始廬江有左慈陽城有郄儉善辟榖悉號數百嵗所以集之魏國者恐此輩挟姦宄以欺衆行妖惡以惑民豈復欲觀神仙于瀛洲求安期於邊海釋金輅而顧雲輿棄文驥而求飛龍哉云云其識過范曄逺矣吾鄉先輩修郡志至另立釋氏為一門而大書特書之曰翼教所載諸事跡極為揚詡殊可歎異余僣筆削之而僅存其人於人物志後此從来誌書之體也然見之而張目者在所不免偶閱羅景綸論范曄史語因節録之而并及余臆見之妄以俟髙明剖斷焉宋宣和間崇尚道教黄冠出入禁闥號金門羽客氣燄赫然林靈素為之宗主一日有詔兩學之士問道于其座下且遣親近中貴監蒞靈素陞座首詔太學博士王俊乂久而不出既出乃昌言吾先聖與老聃相為師友豈有摳衣禮黄冠者哉聞者駭然各逡巡而罷王海陵人衣冠内有此稍為吾輩生色余極怪世人好為不根之語穿鑿附㑹雖以天之蒼蒼所謂六合内外宜不論不議者而亦為之辭如日月星辰風雲雷雨之屬皆有男女姓名等事不一而足此皆聖人視以為怪而不語者何剽目傭耳者之紛紛也昔後燕慕容農年九嵗問太史黄紘曰俗稱參辰相見萬人相食各自一宿何為如是紘曰昔髙辛氏有二子長曰伯閼主辰次曰實沈主參日尋干戈自相征討後帝不臧使伯閼主參實沈主辰别而離之相見則爭故代𫝊言然農曰天有定宿以人甄之而成憎愛二子之前參辰云何紘不能對以自古未决之疑片言道破而其年僅九嵗也録之以質胷無定見之人喜崇荒謬以駭聴聞者雙橋隨筆卷五
