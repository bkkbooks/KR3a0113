body:
  text: 雙橋隨筆卷六鳳縣知縣周召撰凡人立身行己待人接物處常履變皆宜以中庸二字為主中者心至當而無所偏庸者道有常而不可易惟祈愜乎天理合乎人情而止而易之所謂易簡大學之所謂齊家治國平天下者皆在乎此矣世人性善無恆其流於異端邪教者不必論即人倫日用間每多僻戾乖舛詭異執拗之纍茍無師友之力學問之功以陶鎔其氣質而涵養其性情將有日錮於後來之習而不可救者不至如昔人所謂化為鬼魅不止也悲夫唐曺華為沂海觀察使引兵赴鎮討王辨之亂將士迎候者華皆以好言撫之衆皆不疑華視事三日大饗將士伏甲士千人於幕下諭之曰天子以鄆人有遷徙之勞特加優給宜令鄆人處右沂人處左既定沂人皆出因閣門謂曰王常侍以天子之命來帥于此將士何得輒害之語未畢伏者出圍而殺之死者千二百人血流殷渠赤氣冒門髙丈餘海沂之人重足屏息華惡沂地褊請治兗許之自李正己為盜齊魯俗益悍驁華下令曰鄒魯禮義鄉不可忘本乃身見儒士春秋祀孔子之祠立學官講誦斥家資贍給人乃知教成就諸生仕於朝當海內弄兵人心桀驁之際不但談笑間亂軍伏法而又能興起儒教以復成禮義之邦真揆文奮武才也今逺近多事安得如華者分理重地俾奸徒屏息儒生吐氣乎有議其殺人太濫者然在討亂之時不得不爾所謂宜用重典也隂雨連朝掩扉獨立壁隙苦風射入凛冽侵人適借得方孟旋先生青來閣初集急置案頭整襟披讀未竟數幅而不覺寒威之避舍身如挾纊也先生以制義樹幟詞壇操觚之家靡然向風奉盤匜而奔走者幾遍宇內自言於世無他嗜亦無他長不知何緣于八股文字氣息纒綿了靡解脫略知動筆以來歷三十年豈惟不蹈時趨之先路亦不能馳先輩之後塵片言得失自參自賞占金占玉不與為欣欣呼馬呼牛不與為惙惙三十年來貧與俱貧病與俱病老與俱老不特此也庚子之嵗至于丙午病而死者至再至三矣形神劃爾相離昏憒之中搖筆為時文矻矻不已非天錮夙業何以有此又言吾輩討究典籍分其句讀必字字氣腥抒勒藝文瀝其穎端必絲絲血滴始稱真讀書子我與古人精神始合併為一吾之胸中淵淵浩浩內朗外映八萬四千毛孔一時放大光明與我朝夕周旋者自然應接不暇亦曠久彌新又言文章一技道未為尊特不可概吾制藝越自先師倡道四子六籍時晦時明漢人訓其語而失其義宋儒求得其義矣未盡模其神情與象貌也并神情象貌肖之者制藝耳嘗以為學此道者必如先師學文王之操三日而見其􅉳然者始一寓之文而後稱合作也夫摹秦漢古文詞耳矜理諦語録義疏耳按之當日之精氣而纍黍不必其合也即工何當於制藝哉又言文章之妙必至一想便得捉筆便至乃可以操造化之柄此必有一段絪氲之氣鬱媾於未運想未命筆之先如子瞻所謂有成竹于胸中然後乃如兔起鶻落直追其所見可耳平時不豫蓄用志不分凝神之専詣當幾不妙講躊躇四顧批卻導窽滿志之通解恐郢人無所騁成風之技宜僚無所見纍丸之巧矣嗟乎世有攻舉子業而劌心鉥骨矢以生殉言之津津有味如是之至真至篤者哉宜乎一時有不與他一個會元要㑹元何用之語也雖然此但言其制藝而未及其古文詞也今其集具在沈雄奧衍之句原本經術而持滿以出但覺鏗金戞玉字字皆香使當日分其鑽研八股之嵗月以致力於古其稱雄藝苑者當不止此然具是亦可以見先生矣嗟乎以先生之時之才之學之名與遇而尚不能自見於當世則夫雖有其文而掩抑于坎壈牢騷流離顛沛之際而不得一人為知己者又何足怪哉先生集成序之者甚多而艾東鄉一篇以為盡倫之書則於先生之學問性情尤盡其藴越數十年吾師李僖平夫子復搜其逸在人間者悉梓之名曰合集而先生未墜之文益彰於後世矣贑縣劉忠甫先生生平不佞佛見縉紳墨行儒冠終年關說有司而以放禽魚為慈悲本末乖謬者取訓諸子以為戒居母喪屏斥佛事隆萬以來士君子所難宋晏原叔聚書甚多每有遷徙其妻厭之謂之乞人搬漆碗余謂此等碗勝於金鑲玉琢者幾千萬倍但恐無錢多置使之充棟汗牛耳雖然世人眼孔惟為黃白所眩不薄書以為漆碗者少矣出之婦人口吻又何足怪原叔有戲為漆碗詩雋永堪味載墨莊漫録中蘇長公謂王子立有致窮之具而與子瞻為親又欲往求魯直其窮蓋未易瘳也袁中郎謝于楚歷山草引云詩能窮人似有之管城親而牙籌疏一不合也氣髙語華令人自逺二不合也富者惡其厲緡仇之若敵貴者忌其厲官避之若祟三不合也有一於此皆足以窮而况兼之故云一日執管二日廢餐妻子之所羞而宗黨之所怒也又云于楚不能忍窮幸且焚筆硯余亦從此改業焉兩公之言固亦帶謔而情理最真余一家無他長子姪幼孫皆督之讀書習文藝且嗜清閒而恥俗態典衣購書粗營小築啜苦茗以度日取窮之道莫甚於余而不能改雖然世情不諳走入庸腐一途有終身作老蠧魚而妻子飢寒不能自保以全其操於末路者又坐不善讀書之過長公勸蒲正𫝊語不可不思勿以自誤而又誤人也余年十七充邑諸生維時講誦何書遊息何處與事何師羣何友朋氏族面貌宛然記憶如昨日事耳微聞近者膠庠間禮教揖讓少衰於昔新學小生至與先生抗坐不隅行不隨最下者娼優為偶而酒食為囮此豈盡然萬一有之視三十年前有朱絃疏越之歎矣此馮具區先生秀水縣學碑中語也當先生時風俗人心猶未甚壞而不滿之辭至形於碑記已如此博物志載漢公卿送夏侯嬰葬至東都門外馬不前掊地悲鳴得石棺有銘曰佳城鬱鬱二十年見白日吁嗟滕公居此室乃葬之余謂果爾則嬰之葬地必最佳無疑其子若孫應受其庇而弗替矣然按嬰列𫝊𫝊國至於夷竈夷竈子共共子侯頗頗於元鼎二年坐與父御婢奸罪自殺國遂除何傷之易也由是觀之家之興廢亦在後人之賢與不肖而已雖得風水何益張莊懿明進士選某道御史方草七嵗差山東巡按初按臨清三朝行香偶酒家酒標掛低了掣落其紗帽時初到官失去元服人以為非吉兆左右為之失色公恬不為意取紗帽戴了竟去明日知州鎖押此人送察院請罪公徐語曰此是上司過往去處今後酒標須掛得髙些亦不與知州交一言徑遣出其寬大仁恕如此明楊玉峯素剛直為郎署過家時喻子乾為松江太守張燕待之喻頗風流與戲子合喫酒玉峰厲聲曰喻子乾此是何等模樣喻失色玉峰名瑋字伯玉馮開之先生日記有曰初一日晴佛室禮佛禮祖先及參神如常儀云云以余觀之祀祖先禮也至於禮佛參神果何佛何神耶人生在世天地君親而外所不可忘者師耳先生本寒士藉其教以魁南宫號尊宿享湖山詩酒之樂而不聞一拜於孔子之座下余雖譾劣不能不以先生為非元文宗以西僧為帝師師至命朝臣一品以下咸郊迎大臣俯伏進觴帝師不為動惟國子祭酒富珠哩翀舉觴立進曰帝師釋迦之徒天下僧人師也豫孔子之徒天下儒人師也請各不為禮帝師笑而起舉觴卒飲衆為之栗然髙明者溫州瑞安人寓明州櫟社以詞曲自娛因感劉後村之詩死後是非誰管得滿城爭唱蔡中郎之句乃作琵琶記有王四者以學聞則誠與之友善勸之仕登第後即棄其妻而贅於太師不花家則誠悔之因作此記以諷諌名之曰琵琶者取其上四王字為王四云耳元人呼牛為不花故謂之牛太師而伯喈曽附董卓乃以之托名也髙皇帝微時嘗奇此戲及登極召則誠以疾辭使者以記上進上覽之曰五經四書在民間譬諸五榖不可無此記乃珍羞之屬俎豆之間亦不可少也於是捕王四置之極刑余録此欲廣其𫝊庶免蔡中郎無端受屈許魯齊在中書命牙儈雇一僕役特選一應對間禮節者進却之曰止欲老實耳他日引一蓬首垢面而愚騃之人來遂用之儈問其故許曰諺云馬騎上等馬牛用中等牛人使下等人馬上等能致逺牛中等則馴善人下等則易訓使若聰明過我則反為所使矣余偶有收啞童文意亦主此明成化間衢州人盧宗善捕盜而有司署為譏察地有劇盜王泰橫掠人財為民害宗以祕計執之泰赴官反誣宗曰我為盜死亦無悔但所劫掠者多入於汝有司莫能辨二人並繫桎梏宗乃仰天訴曰我為官捕盜本為除害今乃與盜同死何天理乎語畢風雲驟起雷聲一震有巨神持宗臂置於桎梏門外由是釋宗而泰獨棄市福建延平府杜氏兄弟三人輪供一母然三人各事農業寄三婦以侍養焉子既出三婦輒詬悖相勝致姑飦粥不贍姑欲自縊嘉靖辛卯七月中白晝轟雷一聲秖覺電光紅紫眩目三婦皆變為人首而身則一牛一犬一豕人環視如堵以上二事皆載施顯卿奇聞類記見於明二百年間而其一則吾衢事也是時上天之威靈異若是邇來不善之人所在而有乃不聞雷霆之怒奮於一擊以示警而受其譴者惟在於蟲蟻木石之類雖號曰雷亦曠其職而不能整矣明歙庠唐臯字守之每以元魁自擬纍蹶場屋鄉人誚之曰徽州好箇唐臯哥一氣秋闈走十科經魁解元荷包裏爭耐京城翦綹多唐聞之志益勵至正德癸酉甲戍連捷經魁以狀元及第年已五十餘矣有志者事竟成豈不信然幽谷多年滯羽翰泮林今借一枝安世人莫笑頭空白看盡春花雨後殘此明𢎞治時翰林題白頭翁畫詩以送老儒之以貢授教官者果有意致今録於此范希榮者文正公之裔孫也其先有為京官者故居京師嘗與他商行貨道遇暴客問之曰汝非秀才乎希榮曰然吾本范文正公之後暴客曰好人子息也凡舟中之貨悉令認留不取而去明萬厯間有祝仙人者名藉甚曽退如太史約袁中郎及小修同訪中郎復書曰退如但知官慕神仙不知神仙亦慕官也小修書曰今之所謂仙者分之則山人合之則仙也兩先生言可謂雅謔而實足以醒世人之愚吾鄉數年前亦有其人造言荒謬尤堪嗢噱而巨公名流亦有從而信之者今聞其入山為緑林豪客之魁矣其人與前仙人為同姓豈其苗裔耶吳門朱野航葑門老儒也頗工詩在荻匾王氏家教書王亦吳中舊族野航與主人晚酌罷主人入內適月上野航得句云萬事不如杯在手一年幾見月當頭喜極發狂大呼扣扉呼主人起咏此二句主人亦大加擊節取酒更酌興盡而罷明日遍請吳中善詩者賞之大為張具徴戲樂留連數日昔人風流興致有若此者但求主人如王氏者亦何可多得明顧東江清以解元㑹魁登第張莊簡公為吏部侍郎東江首往謁之時尚未考館選莊簡有意欲留吏部語之曰我部中少主事一員今留你在我部中亦好東江曰某是個書生但㑹讀幾句書耳於政體恐有未諳莊簡曰汝但能照書本上行幾曽見錯了昔趙普自謂以半部論語治天下其言未嘗不是但普之行事未能盡照書本不免負却論語耳狄襄武曰偶爾遭際焉敢遽附梁公世之士大夫愧此言者多矣不獨郭崇韜令人齒冷也至於不去其涅以厲將士所見尤逺文人自詡輒云挽三石弓不如識一丁字曽能有此識見否里人陳宜生以病卒巳屬纊妻子焚楮錢環哭將殮矣或捫其胸微暖因灌以藥有頃而蘇距今閲六嵗强健猶昔余每叩其未蘇時得毋苦甚且所見有異於生否陳曰但昏昏如醉夢中耳不甚苦亦無所見也余聽其言為敬異者久之曰陳君正人也其再生也固宜夫病而死死二日而復生在他人必造為冥地之言勾去者何人所歷者何境閻羅鬼判何狀查其簿籍為善若干事陽夀未終然後釋歸粧㸃兩日間情景天花亂墜矣陳君但以昏憒了之其賢於世之搖唇鼓舌而不自恧顔者何啻莛楹哉蓋此等荒謬之言出於文人尤甚姚現聞先生海內巨儒氣節文章可稱山斗獨怪其喜談禪說集中楓吟陵伽諸種皆言竺乾事㸃綴津津至為太夫人轉經禮懴以輪回為果有之事且楓樹堂緣起有云道場既散至次日有孤鶴翔空不去移日始隱又云大祥禮彌陀懴竣碧落中黃雲瀰布作金色世界又忽現紺青殷紅寶色如五色牟尼珠焜耀鑠睛僧衆十四五人皆咄咄歎未曽有吳梅村白母陳孺人墓志銘云吾母朱太淑人奉佛受戒三十餘年其終也三子環侍戒弗哭吾母親見􅜖幢前導諸佛受記而去具載往生録中黃梨洲李是菴𫝊云是菴欲余作𫝊以詩夀老母為贄有不惜淋漓供筆墨恭隨天女散花來之句老母常夢注名玉札為第四名天女降謫人世云云此等言出之方士山人聽者未免掩口諸先生亦作此語耶又屠長卿鴻苞集中記一事尤屬荒唐大約風氣所趨雖賢智亦不能免余何人斯輒敢妄議先輩但恐巨公之書世所遵信將愈流於異端邪教而不可救耳觀過知仁應貰余罪關焦鹿先生謂西門豹投巫一事挽習俗之昏回破老奸之心膽千古快人千古快事當為良吏稱首無疑而史遷竟列之滑稽𫝊內後世小儒固陋無識將遂與優孟優旃齊視書與毛稚黃先生為之稱寃讀史者須具先生眼孔方不至草草看過埋沒古人使老子與韓非同𫝊辛稼軒觴客滕王閣詩人胡時可通謁閽人辭焉呵詈愈甚辛使前曰既稱詩人先賦滕王閣有佳句則預坐即題云滕王髙閣臨江渚衆大笑再書云帝子不來春已暮鶯啼紅樹栁搖風猶是當年舊歌舞遂相與宴而厚賙之又帥浙時朱晦菴張南軒任倉憲使劉改之欲見辛不納二公為之地云每日公宴至後筵便坐君可來門者不納但喧爭之必可入既而改之如所教門外果喧譁辛問故門者以告辛怒甚二公因言改之豪傑也善賦詩可試納之改之至長揖公問能詩乎曰能時方進羊腰腎羮辛命賦之改之對寒甚願乞巵酒酒罷乞韻時飲酒手顫餘瀝流於懷因以流字為韻即吟云拔毫已付管城子爛首曽封關內侯死後不知身外物也隨樽俎伴風流辛大喜命共嘗此羮終席而散厚餽焉其喜親文士也如此唐王起揚歷省寺三任節鎮而昧於理家俸入盡為僕妾所有耆年寒餒至與伶人分月俸以自給明某尚書有清德家貧婦無裩孫女以飢縊死善噉平生不能饜每市蜆為晚食然往往㩦妓泛泊一日不能廢也昔屈建問范會之德于趙武武曰夫子之家事治其祝史不祈坡公謂蒲正𫝊不作活計多買書畫等物常典錢使勸其宜辦歸老之計不可但謂我有賢子孫不消與營産業也夫猥瑣者流守不動尊握長生鐡錢子絹孫行同賈豎誠可為鄙然一味慵放迂誕豪無主持初以曠達而誇錦繡之胸後以飢寒而成乞索之面豈若克勤克儉無奢無嗇富而好禮持身有度貧能自立與世無求可以立德可以養生可以成家可以樹品世故多端豈獨摴蒱場上花栁叢中能蕩然家産哉但不可認作問舍求田如眉公所謂使前語醍醐番成毒藥耳黃九烟先生論取友其略云第一當取有品者其次則有行者又其次則有學者然三者何可多得則取有才者有才者吾愛之但愛其才可矣不必問其品行并不必問其學也又其次則取有情者平居繾綣患難周旋皆情也顧鍾情之人亦未易數見無已則取有禮者往來交接餽問殷勤雖古之聖賢固當受之何論今日嗟乎取友而至不問其品行可謂愈趨愈下矣况又降而在於情與禮乎先生此言殊不可訓而要非先生由衷之論也先生才異氣髙落落難合吕用晦書云九州如許大竟無處安頓一奇男子真可仰天流涕蓋其滿肚皮不合時宜而為此悲憤牢騷之語若虞仲翔所謂死以青蠅為弔客耳不然王修齡苦飢自向謝仁祖索食不須陶胡奴送米而閔仲叔亦不肯以口腹纍安邑先生豈至仰愧前人邵康節有易數一書嘗言天下不可𫝊此者司馬君實章子厚耳且以君實不肯學子厚不可學也臨終焚其書不𫝊蓋溫公於物淡然無所好於學無所不通惟不喜釋老曰其微言不能出吾書其誕吾不信也其見如此豈學術數之書者哉魏鶴山有云自五帝之說興而上帝之尊稱不同妄人小子輒撰名號以䙝天自秦創西畤有白帝之說浸淫為四而漢髙又增黑帝為五帝文帝武帝又有新垣平之五帝又有繆忌之五帝又公玉帶汶上明堂之五帝此五帝所由起也云云余觀帝王等號濫觴至後世妄加于天神地鬼忠義節烈之人不啻斗量車載塑像之千奇百怪于是乎起焉惟明制初建國學革去文廟聖賢塑像皆用木主前代嶽鎮海瀆皆有崇名美號止以山水本名稱其神郡縣城隍歷代忠臣烈士後世溢美之稱悉令革去謝鐸所謂逺過趙宋五事此其一也余以為此等規制真可度越千古後世議禮之家非病狂惑而溺於淫風邪說者必不能改又豈獨超於一代而已哉袁宏作東征賦不道陶公公子胡奴誘之狹室中臨以白刃曰先公勳業如是何相忽略宏窘蹙無計便云我曽大道公何以云無因語曰精金百煉在割能斷功則治民職思靖亂長沙之功為史所讚云云近有一事可以相配所異者啖之暗室餽以百金耳而讃語之妙使人立地成佛逾袁語不啻十倍然則利刃嚇人又不如孔方兄更親熱也要之正以孔方權重嚇人尤甚耳館閣新書淨本有誤處以雌黃塗之常校改字之法刮洗則傷紙紙貼之又易脫粉塗之則字不沒塗數遍方能漫滅惟雌黃一漫則滅仍久而不脫古人謂之鉛黃張藝叟作鳯翔吳生畫記秦少遊作五百羅漢圗記皆法韓退之近則魏禧燎衣圗記汪懋麟唐寅髙士圗記俱一時雅搆而魏作尤勝清波雜志云方務德受知於張全真後每經毗陵必至張之祠堂祭奠修門生之敬洪慶善嘗入梁企道閣學幕府後守番陽企道夫人尚在嵗時亦以大狀稱門生展賀張文節知白在贊桑幕下桑識其必貴祥符中文節為京西曺桑已死奏乞每遇寒食至桑墓拜掃狄武襄青受范忠獻之知每至范氏必拜於家廟入拜夫人甚恭以郎君之禮事其子弟余生而孤又貧甚以諸生受當事諸尊師青眼最多而碌碌無成靡有毫髮之報見以上數公事真堪愧死世之文章有貴而名者有挾科第而名者有挾他伎如書畫之類而名者有中於一時之好而名者有依附先達假吹噓之力而名者有務為大言樹門户而名者有廣引朋輩互相標榜而名者邇來狙儈賈胡以金帛而買名淺夫狂豎欲用詈罵謗訕以脅士大夫而取名可恨哉此王元美先生語也後二者其心愈陋其計愈險尤為正人君子所甚鄙孟獻子以其子不儉囚之七日敬姜以其子不恭逐之五日張湛目痛方損讀書一減思慮二専內視三簡外視四旦晚起五夜早眠六凡此六物熬以神火下以氣篩藴於胸中七日然後納諸方寸修之一時近能數其目睫逺視尺箠之餘長服不已洞見牆壁之外非但明目亦且延年歐陽公手植栁一株於揚州之平山堂故其詞有手種堂前楊栁别來幾度春風之句人謂之歐公栁後薛嗣昌作守相對亦種一株自榜曰薛公栁人莫不嗤之嗣昌既去人遂伐之世人不自度德而妄尊髙者多如此類雖老大者亦犯此病不獨年少無知輩也從來山人方士故挾其技以驕人其大言不慚真如糞土耳不知有何足重而世之巨公名流往往墮其術中而不悟真可怪異宋有史延夀者以善相遊京師貴人多延之視貴賤如一坐輒箕踞爾我人號曰史不拘吕文靖公嘗邀之延夀至怒閽者不開門閽者曰此相公宅雖侍臣亦就客次延夀曰彼來者皆有求於相公我無求相公自欲見我耳不開門我竟還矣閽者走白公開門迎之燕笑録謂其挾術以逰無心於用舍故能自重也如此以余觀之所稱無求於人者必潛踪滅影入山惟恐不深者耳既稱善相而又逰於京師其意安在蓋其面目肺腸言談舉止無非巧於籠罩愚弄世人以遂其所欲者乃謂之無求而列于髙逸之類可乎至於文靖位至宰輔而尚邀此輩於座而迎之惟恐後又將何為甚矣可笑亦可怪也韓昌黎作原道以闢異端為主其諫迎佛骨表義正詞嚴不避犯顔之罪何其壯也及貶潮州位居刺史儘可自安乃表謝乞憐至有作為歌詩薦之郊廟紀泰山之封鏤白玉之牒等語又何與生平所自命者大相反耶他如三上宰相書亦不免北斗泰山聲價略減葬師之言最不可信昔蔡京父葬於平山山為駝形術家謂駝負重則行故作塔於駝峯而其墓以錢塘江為水越之秦望山為案可謂雄矣然富貴既極一旦喪敗幾於覆族而不能復振家之興墜豈風水所能為政乎王維愛孟浩然吟哦風度繪為圖以玩之李洞慕賈島詩名鑄像事之謂之賈老佛張籍取杜詩一帙焚取灰副以膏蜜飲之曰令吾肺腸從此改易潘閬以咏潮著名則有人以輕綃寫其形容謂之潘閬咏潮圗李遵朂宗楊億為文於第中築室塑像晨夕申函丈之禮刻石為記昔之敬禮詩文者専懇若是雖出一時之意見亦由其心甚虛故也試問後世尚有此等性情之人否吾邑趙清獻公宦跡半天下所行事蹟載於昔人筆墨者不能盡録其在成都時人但知其一琴一鶴事耳至於出行部內惟㩦一琴一龜坐則看龜與鼓琴嘗過青城山遇雪舍於逆旅逆旅之人不知也或慢狎之公頽然鼓琴不顧此事見於墨客揮犀亦後人所未盡知也人性好惡偏忌雖中人以上不能變石璞太保冦莊敏左憲年尚書富皆一時顯官重任三人皆不由甲科皆不喜進士石在工部遇觀政進士如無人郎中龎勝言年尚書一日越常規於考滿主事三人各考論一道稍劣者輒叱曰爾進士為此文耶展育御史亦言冦公考進士問刑者詬罵不已至屢有撻辱而遇監生則溫然改容導之此水東日記所載也近日郡侯綏山雷公以乙榜起家亦不喜進士有言及者輒瞪目曰甚麼進士蓋輕之也余謂進士舉監原不必分類顧其人品學問何如耳進士舉監豈盡可重又豈盡可輕者哉蓋過於重進士者固非過於輕進士者亦未為是也蘇東坡在黃即坡之下種稻為田五十畝牧一牛一日牛忽病幾死呼牛醫療之云不識症狀王夫人多智多經涉語坡曰此牛發痘斑法當以青蒿作粥啖之如言而效嘗舉以示章子厚曰我自謫居後便作老農更無樂事豈知老妻猶能接黑牡丹也俗呼牛為黑牡丹子厚曰我更欲留君與語恐人又謂從牛醫兒來姑且去遂大笑而别邵康節與韓公在洛每日晴必同行至僧舍韓公每遇佛寺神祠必躬身致敬康節先生笑曰毋乃為佞乎韓公亦笑自是不為也吕晦叔富彥國皆好佛晦叔為中丞一日報在假館中諸公因問何事在假時劉貢父在座忽大言今日必是十齊日蓋指晦叔好佛也洛中有一僧欲開堂說法司馬公夜過邵堯夫云某聞富彥國吕晦叔欲往聽此甚不可晦叔佞佛已不可勸人亦不怪如何勸得彥國堯夫曰已日暮矣姑任之明日二人果皆往月餘彥國招數客共飯堯夫在焉因問彥國主上以裴晉公之禮起公公何不應命又聞三遣使至公皆卧內見之彥國曰衰病如此其能起否堯夫曰上三命公不起一僧開堂以片紙見呼即出恐亦未是彥國曰弼亦不曾思量至此學者惟客氣與勝心最為誤事少時讀書即聞有朱陸之辨而不知其詳及讀王陽明先生與徐成之書以為晦翁與象山均屬聖人之徒本無甚異而兩家弟子之論若出于求勝求勝則是動於氣也動於氣則於義理之正何啻千里而又何是非之論乎其中反覆論辨情理最明其書具在分門别户者取而讀之當自笑其呶呶之無謂也余謂牛李洛蜀之爭亦坐此病明季之東林亦復不免李沆為相接賓客常寡言外議以為無口瓠沆曰國家大事北有契丹西有夏人日旰條議所以備禦之策非不詳究薦紳如李宗諤趙安仁皆時之英秀與之談皆不能啓發吾意其餘通籍子起坐拜揖尚周章失次即席必自論功最以希寵奬有何策而與接語茍屈意妄言即世所謂籠罩也李公此語未免輕薄然孔子不云侍於君子有三愆乎士君子立身行己自有本末形於言論舉止之間而不得其序其人可知矣不屑與之言皆其自取於李公何尤世有所謂三姑者尼姑道姑卦姑也有謂之六婆者牙婆媒婆師婆䖍婆藥婆穩婆也此外又有繡花娘者以善針刺出入人家因請以教道閨女他日多被誘引成花娘者也有插戴婆者富貴大家婦女赴人之筵席金玉珠翠首飾甚多自不能簮粧則専雇此輩為之插戴者也更有瞎先生者乃雙目瞽女自幼學習小說詞曲彈琵琶為生多有美色精伎藝善笑謔可動人者大家婦女驕奢之極無以度日必招致此輩養之深院靜室晝夜狎集晏飲謂之曰先生如杭之陸先生髙先生周先生之類及南唐女冠耿先生者是也以上數種専以淫詞褻語誆騙人家婦女為其所誘者多致敗壞門風不可收拾留青日札中言之甚詳間有家者見之當不啻如避蛇蝎不容入門方成人家請勒此數行為主持門內之第一義宋李邦彥家起於銀工既貴其母常語昔事諸孫以為恥母曰宰相家出銀工則可羞銀工家出宰相正為佳事何恥焉朝野遺記謂其母殊有髙見而甚不然夫邦彥者非當日所稱浪子宰相乎以蹴毬唱曲之人位至宰輔可鄙極矣安在其為佳事也為之母者當責之以大義勿為諧臣媚子以貽門第羞而其言顧淺陋若是亦不出工匠家婦人之見而已矣焉足取齊家最難事也唐士大夫家禮法最嚴以栁公綽仲郢為稱首仲郢子圭擢為右拾遺𢎞文館學士給事中為給事中駁還曰陛下髙懸爵位本待賢良圭家居不稟于義方奉國豈盡于忠節仲郢上表稱子圭才器庸劣不合塵玷諫垣若誣以不孝即寃屈為甚栁公權又訟侵毁之枉上命免圭官且在家修省以栁氏之門而有子如是况漫無庭訓者乎父兄之教不先子弟之率不謹易曰間有家又曰家人嗃嗃悔厲吉不可以不三復也錦川石之在土中其始一墩耳𫝊之既久忽以為古塜又忽以為郭璞墓又忽以為石將軍墓愈𫝊愈訛愈訛愈怪語云字經三寫烏焉成馬事之久而不可信者大約如是皆起於庸妄無識及好事之徒慮其所為之不善也欲媚鬼神以祈祐而是非真僞俱所不遑計如市井中人酒保則祀杜康屠户則祀樊噲甚而豢牛者以冉伯牛為牛王賣菜者以蔡伯喈為園主鬻茶者以陸羽為茶臣陶其像置煬器間有交易則祭之無則以湯沃之其可笑至此雖然此輩目不知書猶不足怪也乃有峩冠博帶通今博古之名流巨公而亦不免隨波而逐浪焉嘻異哉昔之正人君子類多古道因過録載栁元公善張尚書正甫元公之子仲郢嘗遇張於途去蓋下馬而拜張止之不獲他日張言於元公曰夀郎相逢其謙太過元公作色不應久之張起去元公謂客曰張正甫與公綽往還欲使兒於街中騎馬衝公綽耶此人亦不足與語張聞之拜謝以余觀之夀郎仲郢小字也正甫於其父前直呼之亦已難矣而元公猶以為可怪使其見今之待父執者將何如也噫魏武帝欲用孔明遣使徴之孔明自陳不樂出身則謝之而不相强欲用雲長察其無久留之意使張遼說之羽自陳願歸先主則聽之而不加害楊升菴謂其真有君人之度不止雄於三國而已又其家法迄文帝思王皆不為邪教所惑而見於詩歌論議之間亦不可及其欲用孔明事見抱朴子山隂劉念臺先生有紀過格一曰微過獨知主之二曰隱過七情主之三曰顯過九容主之四曰大過五倫主之五曰叢過百行主之六曰成過為衆惡門以克念終焉其間條分縷析皆吾人最關切最真實之事之理幸於趙玉峯撫臺敬一録中見之學者不可不全録一通置之案頭以自警蘇東坡祖名序故為人作序皆用叙字又以為未安遂改作引而謂字序曰字說張藝叟父名蓋故表中云此乃伏遇云云今人或效之皆非也雙橋隨筆卷六
