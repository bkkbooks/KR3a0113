body:
  text: 雙橋隨筆卷九鳳縣知縣周召撰世人喜談風水每見鉅公名流以及村氓市叟所至皆然惟余不自揣竊以為非然所謂獨拍無聲徒來一握為笑耳已聞蘭江祝子堅先生所見畧同余雖未嘗登其堂讀其文而神交已久往往依之以自壯焉兹見唐翼修曾遺一札於子堅謂其集中有大闢風水篇急宜刪去恐以不純之文而為萬世之口實余竊思之翼修與子堅相得厚且深欲其文之無疵而可傳於後是也而謂其大闢風水之言適足以為累則非也翼修之言曰風水之説非後代始周公美公劉則曰逝彼百泉瞻彼溥原乃陟南岡乃覯於京又謂既景乃岡相其隂陽觀其流泉使堪輿果非信則隨地可居公劉何必既瞻而覯而相而又觀之周公何獨據此以美之乎國風升彼墟矣以望楚矣望楚與堂景山與京美衛文公徙居楚邱詩也使堪輿果無據則隨方可宅衛文何必既升且望而且景哉詩人何獨據此以美之哉又曰文王遷豐武王遷鎬王業由之以大不然文武固愛民惜財者何忍為此勞傷事哉噫嘻翼修之説公劉衛文二詩若此所論文武都豐都鎬之謀又若此其溺於世俗之見而誤窺聖人之心可謂甚矣余雖固陋請為子堅辨之今夫儒者之惡堪輿家豈以世之建都立邑搆室為塋一切宜任運為之而絶不當有經營圖度之事參於其間哉蓋地之為地有隂陽南北之位焉有髙下險易之形焉有剛柔燥濕之性焉有寒温肥瘠之體焉倘如書中所云隨地可居隨方可宅而無事於瞻之覯之相之觀之而且升之望之景之則雖置之於汙坻幽壑箐莽榛荆腥嵐毒霧攅峯飛瀑風饕雨虐中鼪鼯魚鱉之與親而豺狼狐兎之為類而皆可以不計乎恐無是理也竊謂作詩者之美公劉衛文以為建邦啟宇必先定其規模而後從事焉因喜其位置向背之咸宜與水土風物之皆善而歌之咏之非如後世之尋龍步脈所謂八字四元荒唐謬妄之談可以致福利而庇子孫也翼修又曰文王遷豐武王遷鎬王業由之以大云云果若斯言是以周家八百年過歴之天下其得力全在於風水而后稷以來積功累仁之效皆不足道矣况文武視民如傷者也徒以欲大其王業而一旦不愛民不惜財至於勞傷而不顧此與莽操之心腸何異且不聞南宫邊子之折辛櫟乎見説苑至公篇曰昔武周之卜居成周也其命龜曰予一人兼有天下辟就百姓敢無中土乎使予有罪則四方伐之無難得也周公之卜居曲阜也其命龜曰作邑乎山之陽賢則茂昌不賢則速亡是可以知武周之心矣又不聞武成之言乎曰惟先王建邦啟土公劉克篤前烈太王肇基王迹王季其勤王家我文考克成厥勲以撫有方夏予小子其承厥志當是時一戎衣天下大定矣所謂垂拱而天下治矣更何所未慊而謀再徙以圖之至於勞民傷財而不顧乎此可以知武王之無心擇地矣且以文王之服事殷也三分有二而不敢少改人臣之節故孔子以至徳歸之至於甲子之役而武王已及暮年矣止以天人之交迫不得已而後應之是豈有心於得天下者而謂王業皆以遷豐遷鎬而後大以文武之聖而其處心積慮顧如是是盖必無之事也由是觀之文武之遷豐遷鎬也以為不知王業之由此而大無心得之是周之有天下徳所致天所命人所歸也於風水無與也以為豫知其業之由此而大而有意圖之是周之有天下人所謀也風水之力也與其家世徳無與也天命人心亦無與也此於風水之説則張矣顧何以白文武之心於天下後世哉故余以為翼修之説詩溺於俗尚之陋而誤度夫聖人之心也夫喜遵村市中惑人之技而坐聖人以奸雄營算之所為此尤尚論者之所不忍也余所以不得不代為子堅辨且為二聖人辨也錢日礎先生曰子堅風水説引據鑿然但有五經不談風水之語故翼修即以五經折之余不自揣而又即以五經折翼修未知不至深訝否竊謂吾輩既讀聖賢書所言所行必取裁於五經四子而後定而五經四子中實無談及風水者若夫仰觀天文俯察地理之言見於繫辭此聖人用易以財成天地之道輔相天地之宜以左右民之事其道甚大其理甚正堪輿何技而乃引此以為証乎余以翼修此語為尤非敬再質之而并以政於日礎先生以為何如凌與三評陳大士君子創業垂統為可繼也文云翦商肇跡乃後人推算之詞耳古公遷岐正髙宗中興之年從何處可萌鼎隧之心光武初念不過希作執金吾孟徳亦止望作一司𨽻校尉耳况賢侯之克鍾聖子神孫而敢有非分之覬覦耶此言可証唐君之誤附錄於此漢書藝文志有道三十七家九百九十三篇隂陽二十一家三百六十九篇神仙十家二百五卷似有取於異端邪説而然者然其論道家也曰道家者流盖出於史官歴記成敗存亡禍福古今之道然後知秉要執本清虚以自守卑弱以自持此君人南面之術合於堯之克讓易之謙謙一謙而四益此其所長也及放者為之則欲絶去理學兼棄仁義曰獨任清虚可以為治其論隂陽家也曰隂陽家者流盖出於羲和之官敬順昊天歴象日月星辰敬授人時此其所長也及拘者為之則牽於禁忌泥於小數舍人事而任鬼神其論神仙家也曰神仙者所以保性命之真而㳺求於其外者也聊以盪意平心同死生之域而無怵惕於胸中然而或者專以為務則誕欺怪迂之文彌以益多非聖人之所以教也孔子曰索隠行怪後世有述焉吾弗為之矣其立論若此豈如後世之文人學士悖聖教而溺淫辭如飲狂藥而不知其醉者哉古今所傳神鬼仙佛皆街談巷語道聽塗説之類當如坡公所謂姑妄言之姑妄聽之可也而世人好怪皆以為真如東方朔者班孟堅所謂滑稽之雄耳載其事於傳中最詳又慮後世之人之易惑也故傳後云世所傳他事皆非也又賛後云朔之詼諧逢占射覆其事浮淺行於衆庶童兒牧䜿莫不炫耀而後世好事者因取竒言怪語附著之故詳録焉讀孟堅此語知喜崇怪誕在當時已然至於後世而日甚如屠緯真儒家者流而其賛朔也亦有濯衣紫海食桃崑崙等論在他人又何足怪世之皷樓曰譙樓者謂門上為髙楼以望也畫角之曲有三弄乃曹子建所撰初弄曰為君難為臣亦難難又難次弄曰創業難守成亦難難又難三弄曰起家難保家亦難難又難今角音之烏烏者皆難字之曳聲耳所以使人昏曉之間燕息之際聞之有所警發也此見於明胡公儼譙樓畫角三十六弄記夫子建魏之公子又七步八斗才也乃為此警切之語而起家保家之難尤非處豪華雄貴之地之人所能諳者世間紈袴纎兒恃父兄之庇稍充衣食輙至如痴如騃昏昏醉夢中不知自醒讀此曲可以知警便中承書知比日侍奉安佳吾子讀書比復如何只是専一勤苦無不成就第一更切檢束操守不可放逸親近師友莫與不勝己者往來薰染習熟壊了人也景陽想已赴省季章當在家凡百必能盡心苦口切須稟承不可有違諺云成人不自在自在不成人此言雖淺然實切至之論千萬勉之大學説漫納試讀之不曉處可問季章也未即相見千萬為門戸自愛此朱文公與其親戚卑行小柬也見羅景綸鶴林玉露中以為後生晚輩能寫一通置之座側朝夕觀玩何患不做好人誠然誠然景陽許姓名子春季章姓劉名黼皆廬陵醇儒從文公學季章後為特奏第一人姪行年且五十於舉子業可謂苦心矣舉業而入苦心之路其於名理雖或精研而於風調不免沉滯嘗聞先輩舉業三字符曰典淺顯予獨更之曰輕清精然精之一字亦不易得但能輕清而稍加之以秀逸疎爽則百試百中矣嘗謂頭場七篇最為喫𦂳須如行雲之出岫巧燕之穿簾荷葉之擎露栁絮之飄風萬無過思深搆過思深搆必致重滯艱澁於二三場以後並聽姪之蹀躞馳驟出經入史千金之駿絶塵而奔亦無不可者先輩舉業之最如王守溪之渾雄臺閣唐荆川之精純典雅汪青湖之豪爽薛方山之奮躍並所不易得者獨聞韓昌黎有云如駕輕車而就熟路以此攜之為舉業訣可謂最便法門近日兒維寄來北京鄉試七篇姪嘗誇之當為舉業中赤幟予獨疑其太横喜之者什之五而驚且辟易從而厭之者亦什之五而縉兒亦讀之曰但恐落老學官之手當為覆瓿矣今已垂翅傳聞果被以髙年校文者僅於首篇加數㸃後並不及覽何則彼且視之為怪僻不復覽覩矣吾姪之才竒崛魁梧獨恐其一入沉滯便令校文者澁眼縮首千萬放令輕清而加之以秀逸疎爽斯則姪之老馬長途而姑從康莊以策轡而馳亦所以慰我衰颯懸懸之望也此茅鹿門先生與其姪舉人桂書也習舉業者當以為法錄之以示後起錫山王耐軒筆疇足以鍼砭物態時情甚為有益福清林公樞謂其句句皆切己條條皆實用誠處己接人之要道宗伯徐太室歸有園麈談漢陂外史謂其月旦人倫雌黄物理包籠連類取譬搜竒自著一家之書不經人道之語雅謔兼陳醇駁互見二書與眉公先生讀書鏡見聞録安得長者等集皆宜置之案頭時時諷誦勝於飽食煖衣空消白日者幾千萬倍也梁武帝鋭意釋氏天下從風而靡惟韋叡獨不與林靈素作神霄寳籙自公卿以下羣造其廬拜受籙獨李綱傅崧卿曾機移疾不行元富珠哩翀不拜西僧國師偉哉數公近有為宗伯執香爐於道場又有横玉三公而拜狸奴者何其異也後周韋孝寛參麟趾殿學士考校圖籍唐薛仁貴著周易新生本義二卷二公皆勇將而精意經術如此楊升庵云牛馬者家畜也縱之坰野則悍鷹鸇者野鳥也一為繫絆則馴此收放心之説也稱為人而不知學使其心出入無時莫知其鄉其漸入於禽門獸行也宜哉余嘗謂北鄉項山之謬以為項羽未嘗至於此然史遷羽本紀中亦有從其季父項梁避仇吳中事吳中今之湖州也相傳羽為神於湖最烈後為唐狄仁傑采訪江南移檄毁其祠肸蠁遂絶余性不喜談命而邇來姻友相聚輙以五星八字辯難不少休殊厭人耳偶閲陸文裕公燕閒録載張東白先生語可謂中流一砥遂録於左以堅余一偏之見云東白先生張公元禎天順庚辰進士以道學名世嘗為余言自小子登朝見士大夫凡三變初登朝士大夫多講政事遂有好政事意盖指李文達公輩也再登朝士大夫多講文章遂有好文章意盖指李文正公輩也及今次登朝士大夫多講命為之微笑是時靳少卿貴字充道徐侍讀穆字舜和皆好推星而翰林諸先生每會晤間皆喜談五星三命故術士逰京師者多獲名利亦一時之風尚也余素不信其術嘗有數説以闢之同年間每以為抝顧學士鼎臣字九和素善此以為汝不信自不信命自是有范文正公有言士之進退多言命運而不言行業明君在上固當使人以行業而進多言命運是善惡不辨而歸諸天地豈國家之美事哉其論則正大矣文裕公諱深號儼山吾衢之在往代能文者最多如何欽聖獻蘓長公之七言長篇至一千五百餘字公以為佳但因其欲推尊王氏故不甚喜耳然亦遇之未嘗衰也又毛平仲遂初堂書目序亦最條暢非後人手筆所能為兩公行事不概見而二篇之作皆於説郛内得之則其湮沒而不傳者盖亦多矣以是知自古能文之士其姓名之隠顯有幸有不幸焉遂初堂尤延之袤藏書處也文文山樂安老人墓誌有云翁有數事甚異里傳鬼車鳴者未夜相戒滅明屏息戸内翁開樓大呼願見鬼車卒無有有神以禍福驚人翁過其祠持牛炙如常人莫不危恐翁休休如也嘗有所營造忌某星直某方翁曰犯者殆乎請身當之某星迄不騐為子納婦或曰婦不利於長翁不為奪自是諸婚嫁厯家説格不用中年卧疾家人私喚女巫謀為厭勝翁廉知之强起逐之出門未屬纊翁黙自念作其像贊若遠逰者顧左右曰吾死勿事緇黄吾志也醫以藥進麾使去問日入乎曰然反面而逝江南之俗尚鬼而信巫翁能自不惑非由耳傳口授殆一至之性然也孟子功不在禹下非諛語也至於後世乃有訿謷其教至形於詩句以侮之者殊堪髪指明初洪武間欲去其配享尚書錢唐上疏争之先是有㫖諫者當射殺之唐即置棺袒胸當箭太祖見其諫甚切命太醫院療其箭瘡配享得不廢黄南山先生有錢文竒勛之詩曰引棺絶粒箭當胸拚死扶持亞聖公仁義七篇文莫蠧冕旒千載繪仍龍批鱗既奮回天力沒齒終成衛道功那得洪恩遍寰宇泮宫東畔置祠宫唐象山人元末隠而不見年將六旬見四海定於一赴京敷陳王道以詩稱㫖授刑部尚書王思質治其父質庵公之喪其親含殮棺槨靡不誠信然不一雜浮屠及吳俗之禮時人翕然稱之載元美先生自撰思質公行狀中先生喜談禪悦者至為先公狀則其言如是是知聖人之道非異學所可掩雖染指其間者終以不雜浮屠為正而不能為之左袒也頃閲司馬温公語其理尤著今録於此世俗言浮屠誑誘於始死及七七日百日期年再期除喪飯僧設道場或作水陸大㑹寫經造像修建廟塔云為死者㓕彌天罪惡必生天堂受種種快樂不為者必入地獄剉燒舂磨受無邊波叱之味殊不知人生含氣血知痛癢或剪爪剃髪從而燒研之已不知苦况於死者形神相離形則入於黄壤朽腐消㓕與木石等神則飄若風火不知何之借使剉燒舂磨豈復知之且浮屠所謂天堂地獄者計亦以勸善而懲惡也茍不以至公行之雖鬼可得而治乎是以唐廬州刺史李舟與妺書曰天堂無則已有則君子登地獄無則已有則小人入世人親死而禱浮屠是不以其為君子而為積惡有罪之小人也何待其親之不厚哉就使其親實積惡有罪豈賂浮屠所能免乎此則中智所共知而舉世滔滔信奉之何其易惑而難曉也甚者至有傾家破産然後已與其如此曷若早賣田營墓而葬之乎彼天堂地獄若果有之當與天地俱生自佛法未入中國之前人死而復生者亦有之矣何故無一人誤入地獄見閻羅等十王者耶不學者固不足與言讀書知古者亦可以少悟矣張宣公帥江陵道經澧澧之士子十數輩執文書郊迎公喜見鬚眉就馬上長揖索其文視之乃舉劉郡守政蹟公擲其文於地曰諸公之來某意其相與講切義理之是非啟告閭閻之利病有以見教今乃不然是特被十隻冷饅頭使耳躍馬徑去澧守上謁亦不容見魏武帝父子不惑仙術武帝樂府精列篇云造化之陶物莫不有終期賢智不能免何為懐此憂願螭龍之駕思想崑崙居見欺於迂怪志意在蓬萊周孔聖徂落㑹稽以墳邱陶陶誰能度君子以弗憂魏文帝折楊桞歌云彭祖稱七百悠悠安可原老𣆀適西戎於今竟不還王僑假虚詞赤松乘空言達人識真偽愚夫好妄傳追念往古事憒憒千萬端百家多迂怪聖道我所觀二詩不信仙術闢其怪誕誠知道守正之言也曹孟徳之卓識比之後來唐之諸君服金丹渇躁而死者豈不天壤哉曹子建辨道論亦言左慈輩之妄其父子相傳家教如此今之儒者能無愧乎明世宗自號靈霄上清統雷元陽妙一飛元真君又加號九天宏教普濟生靈掌隂陽功過大道思仁紫極仙翁一陽真人元虚元應開化伏魔忠孝帝君又號太上大羅天仙紫極長生聖智昭靈統三元證應玉虚總掌五雷大真人元都境萬夀帝君世宗為有明英主而其所稱號比之唐宋二君尤為可笑邪説之惑人盖至於此蜀岷州俗畏疫辛公義為刺史知其地一人病闔家避之病者多死乃命皆輿置㕔事暑月㕔廊皆滿公義設榻晝夜處其間以秩祿具醫藥身自省問病者既愈召其親戚諭之曰生死有命豈能相染若能相染吾死久矣皆慚謝而去其後人有病者争就使君其家親戚固留始相慈愛風俗遂變隋開皇十二年有司言府藏皆滿無所容積於廊廡於是更闢左藏以受之乃詔曰寧積於人無藏府庫河北河東今年田租三分减一兵减半功調全免范文正公讀書長白山僧舍日惟煮粟米二升作粥一器經宿遂凝以刀畫為四塊早飯取二塊斷虀十數莖醋汁半盂入少鹽暖而㗖之如此者三年蘓文忠自言平生有三不如人謂着棋吃酒唱曲也林和靖亦自謂所不能者擔糞與着碁耳竊以為蘓言果不謬而和靖之語未免近於狂為人取名及字號與題亭堂齋閣扁牓之類皆宜慎重不可易於下筆唐時有揚州帥欲作一書而未得名商於通判鮮于廣廣請立名曰逸居集有牛簽判者謂帥曰此是罵公逸居而無教則近於禽獸耳張士誠之名吳士人所取也有謂之者曰此罵公也士誠問故曰公不讀孟子乎有云士誠小人也非罵公而何兩人事有意無意不可知而皆足以釀禍明知之人何苦如是凡虫入人之耳者用生油灌之可稱妙方載彭乗墨客揮犀古人作文雖一字不安在所必改歐陽公為魏公晝錦堂記其初起句云仕宦至卿相富貴歸故鄉久之索還原本每句加一而字歸之其慎重如此昔人有以更一字而稱為師者奈何輕言脱稿也唐人喜撰小説雖以帝王之尊宜立極以為治者亦造為誕妄之談如開元夢羣仙一記可為千古笑端乃宋人至為立碑勒石建宇塑像設奠致敬香茗之賜不絶此必政和宣和間蔡京輩名其君為教主道宗皇帝時事耳敗家亡國之君前後一轍如此皆白日見鬼症也唐采臣先生一跋可以喚醒痴人之夢其於世道人心關係不淺邪説惑人雖以韓魏公之後冠裳最盛而家𫝊載公一事云右侍監孫勉監元城埽埽多墊䧟費公料勉詢有巨黿穴其下伺其出射殺之數日勉方晝卧為吏迫去為黿所訟當往証之既至一宫闕守衛甚嚴吏云紫府真人宫也仰視真人乃韓魏公也亟俯伏訴公微勞之曰汝當往隂府証事乎勉述殺黿事公取黄誥示之謂曰黿不與人同彼害汝埽殺之汝職也遣之使去出門遂寤事既播揚神皇謂輔臣曰聞説韓為真人事否皆曰未之聞也上具道所以咨嗟久之云云此等事皆好事者之所為使魏公有靈當不勝其怒乃竟載之家傳中人之易惑抑至於此或孫勉子弟欲張先人有射黿事而借魏公以實之亦未可知也唐徳宗初嗣位尚禮法諒闇中召韓王食馬齒羮不設鹽酪皇姨有寡居者持節入宫粧飾稍過帝見之極不悦異日如禮乃加敬焉雙橋隨筆卷九
