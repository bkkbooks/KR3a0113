body:
  text: 雙橋隨筆卷十一鳳縣知縣周召撰晉徐藻妻陳氏與妹劉氏書有云老荘者絶聖棄智渾齊萬物等貴賤忘哀樂非經典所貴名教所取何必輒引以為喻耶陳筓帷弱質也人引老荘以為喻猶然不滿况鬚眉如㦸者四子五經置之不問而日與方外之流説無生話商出世事何其謬乎昔人遺人以巾幗謂其不異婦人耳而不知婦人中固有尊經典而崇名教識見卓卓如是者而峩冠博帶之士所見乃出於其下真不可解也楊炯詩寧為百夫長勝作一書生大凡多事之世兜鍪䟦扈氣壓儒冠遂使人有投筆之嘆敢云挽一石弓不如識一丁字耶吾衢士子當呼天搶地時䘮氣極矣而猶賴制臺李公多方培植之力今夏嵗試既嚴冐籍之禁而新生之進謁者至於命坐賜茶從容欵語夫督府至尊嚴也碧油幢下有若天帝雲君豈容望見而公之優禮士人破格如是擐甲之衆詫以為榮至有遇子衿而讓道以馳者古之大臣擁麾出鎮多事威稜求如公者指難多屈盖兵戈擾攘中鄒魯欲衰之緒藉以維持於不墜其有禆於斯文者非淺鮮矣明三原王公之子自三原來京省公只如貧士止騎騾又公女適宋監生者只乗兩人轎嘗以銀二兩託雲南張鳳知印買寳石叮嚀切勿使公知之其家教如此又河南耿公裕為禮部尚書時嘗曰吾暮自部歸必經過三原之門見其老蒼頭每持秤買油吾自入仕未嘗買油故每過輒面城而行盖媿之也需者事之賊也羅景倫云大凡舉事經㨗則易成繁重則難濟春秋時宋人殺楚使者楚子聞之投袂而起屨及於窒皇劒及於寢門之外車及於蒲胥之市何其輕㨗也又管仲規桓公云人君惟優與不敏為不可優則亡衆不敏不及事余性最喜勤敏常慮兒輩以遲緩廢務令書此語於座以代佩弦江山賊擄一婦入營欲犯之不屈死焉留七言絶六首於壁賊破後有見而録之者僅存其半詩云欲將脆骨扺狂瀾禍到全身死不難寸縷芳魂何所寄一輪秋月照孤巒拌命非無骨肉恩妾身寜肯茍汚存誰憐薄命存家信含淚難禁帶刃吞擡頭猶見燕成窩怨妾無家可若何一死身輕誰為殯好将白骨葬清波婦常山人也當此白刃如霜人人茅靡之際而從容就義出於婦人雖寥寥數語衝口而出堪與日月爭光矣又一女未筓為賊所驅自投於井而死亦常山人一邑二事可謂競爽惜無從稽其氏族俾採風者並旌其閭以慰重泉之意耳雖然亂離以來賊衆狂逞一時貞媛烈士殞命於瀾翻鼎沸之中者不知凡幾又豈獨一二人湮没不𫝊也哉朱文公與慶國卓夫人書云聞尊意欲為五哥經營幹官差遣某竊以為不可人家子弟多因此壊却心性盖其生長富貴本不知艱難一旦仕宦便為此官只有使長一人可相拘轄又多寛厚長者不欲以法度見繩上無職事了辦之責下無吏民繫縶之憂而州縣守令勢反出己下可以陵轢故後生子弟為此官者無不傲慢縱恣觸事懵然愚意以為可且為營一稍在人下職事喫人打罵差遣乃所以成就之若必欲與求幹官乃是置之有過之地誤其終身讀此簡仰見先生愛人以德之心真懇若是後生小子能時時讀之味之其禆於身心不小也屠緯真在京與人書有云遥想江村夕陽漁舟投浦反照入林沙明如雪花下曬網罟酒家白板青帘掩映垂栁老翁挈魚提瓮出柴門絶勝長安騎馬衝泥也又云毎當馬上千騎颯㳫堀堁紛紜僕自逍遥仰視雲空寄興寥廓踟蹰少選而詩成矣又云足下任清淮渡口烟銷月出水緑霞紅距風沙之地萬里而書來侘傺殊不自得何也數言寫景不啻書中有畫但蕭颯之意殊不是戴紗㡌人語先生雖溷跡軟紅塵内而興味清虚有雲中白鶴之致味其言真熱閙塲中一帖清凉散也王陽明少時有童子師督令習走負兩磚於髀間令行十步乆之能勝又各益一磚足背皆腫不令得息腫平痛止去磚而行往來如飛此即陶士行朝夕運甓之意而此師亦非㝷常學究也心知陽明之不凡而慮其筋骨脆弱不堪勞瘁使之習焉而無所畏雖經百折而氣不衰矣圮上老人之於張子房亦然一在斂其鋒稜一在堅其骨力同一意見也黄鐸字希聲永樂中鄉貢舉人授徒崑山從之學者三日不授書惟命以正立必欲堅不動或怪以為問曰讀書易耳為人難茍坐立未當他何望焉識者以為善教明王紳字仲縉學士褘之子年十三宋濓一見奇之曰華川有子蜀王禮聘教授蜀郡痛父遺骸未返丘壟白王走雲南慟哭行求不能得即奠死所仰天一號幾絶滇人感愴稱王孝子雲南布政使張紞重紳孝為作弔王翰林文子稌字叔豐有志行壯力問學性至孝紳痛念父没食不兼味稌遵教子孫相承數十年不變父母喪三年酒肉不入口及卒門人私諡曰孝荘先生人謂之王文節不但有子且有孫凡人家門可表又不在科名勢位之際也霍光欲以女妻雋不疑不疑固辭不肯當乆之病免又欲以女妻劉德德亦固辭慮其盛滿後免為庶人屏居田間當光為大将軍時禍福之權在其掌握氣燄所薫何止炙手一時倚氷附火之輩須其盼睞方且奔走營謀惟恐不得况一旦妻之以女為門中嬌客乎兩公乃於炎炎方熾時避而逺之雖遭屏棄而不悔其髙識逺見何如也范明友誤墜錦繡囊中遂與其禍人生世上盈虛消息之理盖可忽乎哉趙閲道先生諡清獻趙挺之亦諡清獻氏族大全因兩公姓諡之同遂誤以趙明誠為閲道子而曰公二子㞦明誠不知明誠盖挺之子也又云李易安趙抃之子明誠妻也其舛誤至此凡紀載之書如此類者不少不可不知又憶曽於某書中見有分别兩公混𫝊之故者似以挺之之獻為憲恨老人善忘而羣書又散失無可考聊記於此以竢好古者正之明誠夫婦前後金石録序甚佳程伊川葬説云卜其宅兆卜其地之美惡也非隂陽家所謂禍福者也地之美者則其神靈安子孫盛若培擁其根而枝葉茂理固然矣地之惡者則反是然則曷為地之美者土色之光潤草木之茂盛乃其騐也父祖子孫同氣彼安則此安彼危則此危亦其理也而拘忌者或以擇地之方位决日之吉凶不亦泥乎甚者不以奉先為計而専以利後為圖尤非孝子安厝之用心也惟五患者不得不慎須使異日不為道路不為城郭不為溝池不為貴勢所奪不為耕犁所及五患既除則又鑿池必四五丈遇石必更穿之防水潤也既葬則以松脂塗棺石灰封墓門此其大畧也若夫精畫則又在審思慮矣其各葬者出不得已後不可遷就同葬至於年祀寖逺髙曾不辨亦在盡誠各具棺槨葬之不須假夢寐蓍龜而决也葬之穴尊者居中左昭右穆而次後則或東或西亦左右相對而啟穴也出母不合葬亦不合祭棄女還家以殤穴葬之吕和叔喪説云詩曰凡民有喪匍匐救之不謂死者可救而復生謂生者或不救而死也夫孝子之喪親不能食者三日其哭不絶聲既病矣杖而後起問而後言其惻怛之心痛疾之意在不欲生則思慮所及雖大事有不能周之者而况他哉故親戚僚友鄉黨聞之而往者不但弔死而已莫不為之致力焉始則置賻禭以周其急三日則共糜粥以扶其羸毎奠則執其禮将葬則助其事其從柩也少者執紼長者専進止其掩壙也壮者盈坎老者從反哭袒而賵焉不足則贈焉不足則賻焉而凡有事則相焉斯可謂能救之矣故適有喪者之詞不曰願見而曰敢見雖國君之臨亦曰寡君承事他國之使者曰寡君使某毋敢視賓客主人見賓不以尊卑貴賤莫不拜之明所以謝之且自别於常主也賓見主人無有答其拜者所以助之且自别於常賓也自先王之禮壊後世雖𫝊其名數而行之者多失其義喪主之待賓也如常主喪賓之見主人也如常賓如常賓故止於弔哭而莫敢與其事如常主故舍其哀而為衣服飲食以奉之其甚者至於損奉終之禮以謝賓之勤廢弔哀之儀以寛主之費由是則先王之禮意其可以下而已乎今欲行之者雖未得盡如禮至於始喪則哭之有事則奠之又能以力之所及為營喪事之未具者以應其求擇子弟僕𨽻之能幹者以助其役易紙幣壺酒之奠以為禭除供帳饋食之祭以為賵與賻凡喪為之待己者悉以他辭受焉庶幾其可也宋子京治戒云吾没稱家之有無以治喪殮用濯浣之衣鶴氅裘紗㡌綫履三日棺三月𦵏謹無為流俗隂陽拘忌也棺用雜木漆其四㑹三塗即便止數十年足以腊吾骸朽衣巾而已吾之焄然蒿然皦皦有識者還於造物放之太虛可腐敗者合於黄壚下付無窮吾尚何患掘塜深三丈小為冡室劣取容棺及明器左置明水二盆酒二缸右置米麹二奩朝服一稱鞾履自副左刻吾誌右刻吾銘即掩壙惟簡儉無以金銅雜物置塜中吾學不名家文章僅及中人不足垂後為吏在良二千石下猶可容數人無功於國無恵於人不足以請謚於有司不可受贈典又不宜求鉅公作誌及碑塜上植五株栢墳高三尺石翁仲它獸不得用盖自標置者非千載永安計耳毋作道佛二家齋醮此吾生平所志若等不可違命作之違命作之是死吾也是以吾為遂無知也葬之日以繪布纒棺而翣引毋作方相俑人陳列衣服器用累吾之儉吾平生語言無過人者謹無妄編綴作集使後世嗤詆吾也吾侍上講勸凡十七年上頗記吾面目姓名然身後不得丐恩澤為無厭事若等兄弟十四人惟二孺兒未仕此以諉莒公莒公在若等為不孤矣若等兄弟雖有異母者古人謂四海之内皆為兄弟况兄弟之不懷求合他人人詎肯信哉縱陽合之彼應笑且憎也若等視吾事莒公如何莒公犮吾云何可以為法矣人不可以無學至於奏議箋記隨宜為之天分自有所禀不可强也要得數百卷書在胷中則不為人所輕誚矣右録三先生三篇皆人子慎終追逺之語以示兒輩使余異日易簀後兼覔文公家禮斟酌行之大約必以朴儉為主不但我家貧薄無力從時且能順我生平最所厭惡之舉而盡去之九原之下暢快實甚茍讀聖賢書而知遵其訓不落婦人女子販負屠沽之見者必不以余言為可置也王槐野先生諱維楨華隂人也為人戇直朴畧自謂受性已定猶僕之貎修幹廣顙昻首軒眉揭膺闊步皆造化陶冶不可移易又云西子者里之姣好人也一日西子痛心疾乃捧心而顰觀者益以為艶其里婦慕之亦捧心而顰家人見之詫曰此固吾家婦奈何倐而化為鬼也今令僕守吾素即不投俗猶自稱人變之則化為鬼家人駭矣僕即死不願也其自信不移如此故其與浙江趙廵按姜僉事二書因海冦之亂直陳時弊激切痛快皆他人所不能道所不敢道者真救時之藥石也余於范月工架上得其集讀之謂其為文多右正嫉邪揚媺刺惡時抉胷臆以鬯不平曲為引譬以發奇思真所謂擲地有聲入土不蠧者不但詞句之沉雄軼蕩令人避三舍也唐太宗太子冠有司言二月吉請造兵符儀仗太宗曰東作方興宜改用十月蕭瑀奏據隂陽書不若二月太宗曰吉凶在人若動依隂陽不顧禮義吉可得乎循正而行自與吉㑹農時急務不可失也太宗英明其見理若是後世之人圖謀吉利瑣瑣於占時擇日而於禮義有不知為何物者何其昏瞀之甚也宋孟珙屯黄州邊民來歸者日以千數為屋三萬間以居之厚加賑貸又慮軍民雜處因於高阜為齊安鎮淮二砦以居諸軍二事有禆於民生者不淺在今日惟我督臺李公有之既搆屋以處難民又於沿城空地多建營房殘民初集得免鳩居之擾自軍興以來大江以南如杜詩所謂各使蒼生有環堵未有若吾西安者也商鞅立法舍人無騐者坐之及公子䖍之徒告商君欲反發吏捕鞅鞅亡至關下欲舍客舍舍人不知其為鞅也曰商君之法舍人無騐者坐之鞅喟然嘆曰為法自斃一至此哉唐武后命來俊臣鞫周興獄俊臣與興方推事對食謂興曰囚多不承當用何法興曰此甚易耳取大甕以炭四周炙之令囚入其中何事不承俊臣索大甕如興法起謂興曰有内状推兄請入此甕路巖為相宻奏臣下有罪賜死者令使者剔取結喉三寸以進騐其實至賜巖死乃自羅其酷五代時閩薛文傑以古制檻車踈闊更為之形如木櫃攅以鐡鋩内向動輒觸之既成而適以衆怒檻車送文傑於軍前首自入焉武后盛開告宻有魚保家者請鑄銅為匭以受天下宻奏其器一室四隔上各有竅可入不可出后善之未幾其怨家投匭告保家嘗為徐敬業作兵器遂伏誅宋盧多遜貶珠崖李苻知開封府言於趙韓王曰珠崖雖在海外而水土無他惡貶者多生全春州在内地而近至者必死望追改前命亦外示寛貸而置於必死之地趙頷之月餘苻坐事貶宣州行軍司馬上怒未己令再貶嶺外趙具述其事即以苻知春州到郡月餘而卒此六人皆所謂為法自斃者惡人之報如是始快人心始彰天理南唐邊鎬初從查文徽克建州凡所俘獲皆全之建人謂之邊佛子及克潭州市不易肆潭人謂之邊菩薩既而政無紀綱惟日設齋供盛修佛寺潭人失望謂之邊和尚元盧世榮入中書即日奏詔理鈔法之弊自謂其生財有法用其法當賦倍増而民不擾翰林學士董文用謂曰此錢取於右丞家耶将取之民耶取於右丞家則吾不知若取於民則有説矣牧羊者嵗常兩剪其毛今牧人日剪以獻主者固悦其得毛之多然羊無以避寒熱既死且盡毛又可得乎民財有限右丞將盡取之得毋有日剪其毛之患乎世榮不能對從來重賦之喻未有精於此言者雙橋隨筆卷十一
